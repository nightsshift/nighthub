<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>NightHub - Chat</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
    }
    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(to bottom, #F5F5F7, #E5E5EA);
      color: #1C2526;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      padding: 0;
      overflow: hidden;
      position: relative;
      perspective: 500px;
    }
    #particle-canvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -1;
      pointer-events: none;
      opacity: 0.2;
    }
    #app-container {
      flex: 1;
      display: flex;
      flex-direction: column;
      width: 100%;
      height: 100dvh;
      background: transparent;
      padding: 0;
      position: relative;
      z-index: 1;
      overflow: hidden;
    }
    #top-menu {
      display: flex;
      justify-content: center;
      gap: 0.5rem;
      padding: 0.5rem;
      background: rgba(255, 255, 255, 0.95);
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
      transform: translateZ(5px);
      margin: 0.5rem auto;
      max-width: 600px;
    }
    .menu-button {
      width: 40px;
      height: 40px;
      display: flex;
      justify-content: center;
      align-items: center;
      border-radius: 50%;
      background: rgba(0, 122, 255, 0.1);
      color: #007AFF;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 0 10px rgba(0, 122, 255, 0.2);
      transform: translateZ(5px);
    }
    .menu-button:hover {
      transform: translateZ(10px);
      box-shadow: 0 0 15px rgba(0, 122, 255, 0.4);
    }
    .menu-button.active {
      background: #007AFF;
      color: #FFFFFF;
    }
    .top-controls {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.5rem;
      max-width: 600px;
      margin: 0 auto;
      background: rgba(255, 255, 255, 0.95);
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
      transform: translateZ(5px);
    }
    .control-group {
      display: flex;
      gap: 0.5rem;
      align-items: center;
    }
    #connection-indicator {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #FF3B30;
      box-shadow: 0 0 8px rgba(255, 59, 48, 0.5);
      transition: background 0.3s ease, box-shadow 0.3s ease;
      transform: translateZ(10px);
    }
    #connection-indicator.connected {
      background: #34C759;
      box-shadow: 0 0 8px rgba(52, 199, 89, 0.5);
    }
    #safe-mode-toggle {
      display: flex;
      align-items: center;
      font-size: 0.9rem;
      color: #1C2526;
    }
    #safe-mode-toggle input {
      display: none;
    }
    #safe-mode-toggle label {
      cursor: pointer;
      padding: 0.5rem 1rem;
      border-radius: 12px;
      background: #8D8DFF;
      color: #FFFFFF;
      font-weight: 500;
      transition: all 0.3s ease;
      box-shadow: 0 0 10px rgba(141, 141, 255, 0.3);
      transform: translateZ(5px);
    }
    #safe-mode-toggle input:not(:checked) + label {
      background: #FF5252;
      box-shadow: 0 0 10px rgba(255, 82, 82, 0.3);
    }
    #help-icon, #admin-icon, #disconnect-button {
      width: 2rem;
      height: 2rem;
      display: flex;
      justify-content: center;
      align-items: center;
      border-radius: 50%;
      background: rgba(0, 122, 255, 0.1);
      color: #007AFF;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 0 10px rgba(0, 122, 255, 0.2);
      transform: translateZ(10px);
    }
    #disconnect-button {
      background: rgba(255, 59, 48, 0.1);
      color: #FF3B30;
    }
    #help-icon:hover, #admin-icon:hover, #disconnect-button:hover {
      transform: translateZ(15px);
      box-shadow: 0 0 15px rgba(0, 122, 255, 0.4);
    }
    #disconnect-button:hover {
      box-shadow: 0 0 15px rgba(255, 59, 48, 0.4);
    }
    #modal-overlay {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.3);
      z-index: 999;
      animation: fadeInOverlay 0.3s ease;
    }
    @keyframes fadeInOverlay {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    #tags-modal, #contact-modal, #admin-modal, #age-modal {
      display: none;
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) translateZ(20px);
      width: 90%;
      max-width: 500px;
      background: rgba(255, 255, 255, 0.95);
      border-radius: 16px;
      padding: 1.5rem;
      box-shadow: 0 8px 40px rgba(0, 0, 0, 0.15);
      z-index: 1000;
      animation: popIn 0.4s ease-out;
      max-height: 90vh;
      overflow-y: auto;
    }
    @keyframes popIn {
      from { transform: translate(-50%, -50%) translateZ(0) scale(0.95); opacity: 0; }
      to { transform: translate(-50%, -50%) translateZ(20px) scale(1); opacity: 1; }
    }
    #tags-modal h2, #contact-modal h2, #admin-modal h2, #age-modal h2 {
      font-size: 1.2rem;
      color: #007AFF;
      text-align: center;
      font-weight: 600;
      margin-bottom: 1rem;
      transform: translateZ(10px);
    }
    #tags-form, #contact-form, #admin-content, #age-form {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }
    #tags-form input, #contact-form input, #contact-form textarea, #age-form p {
      padding: 0.75rem;
      border: 1px solid #D1D1D6;
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.8);
      color: #1C2526;
      font-size: 0.95rem;
      transition: all 0.3s ease;
      transform: translateZ(5px);
    }
    #tags-form textarea, #contact-form textarea {
      resize: vertical;
      min-height: 100px;
    }
    #tags-form input:focus, #contact-form input:focus, #contact-form textarea:focus {
      outline: none;
      border-color: #007AFF;
      box-shadow: 0 0 10px rgba(0, 122, 255, 0.3);
      transform: translateZ(10px);
    }
    #tags-form button, #contact-form button, #admin-content button, #age-form button {
      padding: 0.75rem;
      border: none;
      border-radius: 12px;
      background: #007AFF;
      color: #FFFFFF;
      font-size: 0.95rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 0 10px rgba(0, 122, 255, 0.3);
      transform: translateZ(5px);
    }
    #tags-form button:hover, #contact-form button:hover, #admin-content button:hover, #age-form button:hover {
      transform: translateZ(10px);
      box-shadow: 0 0 15px rgba(0, 122, 255, 0.5);
    }
    #tags-form .close-button, #contact-form .close-button, #admin-content .close-button, #age-form .close-button {
      background: #FF3B30;
      box-shadow: 0 0 10px rgba(255, 59, 48, 0.3);
    }
    #tags-form .close-button:hover, #contact-form .close-button:hover, #admin-content .close-button:hover, #age-form .close-button:hover {
      box-shadow: 0 0 15px rgba(255, 59, 48, 0.5);
    }
    #trending-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      margin-bottom: 1rem;
    }
    .trending-tag {
      padding: 0.5rem 1rem;
      border-radius: 12px;
      background: rgba(0, 122, 255, 0.1);
      color: #007AFF;
      font-size: 0.85rem;
      cursor: pointer;
      transition: all 0.3s ease;
      transform: translateZ(5px);
    }
    .trending-tag:hover {
      transform: translateZ(10px);
      box-shadow: 0 0 10px rgba(0, 122, 255, 0.3);
    }
    #chat-container {
      flex: 1;
      display: flex;
      flex-direction: column;
      max-width: 600px;
      margin: 0 auto;
      width: 100%;
      position: relative;
      overflow: hidden;
    }
    #chat-log {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 0.3rem;
      overflow-y: auto;
      padding: 0.5rem;
      background: transparent;
      scrollbar-width: thin;
      transform: translateZ(10px);
    }
    #chat-log::-webkit-scrollbar {
      width: 6px;
    }
    #chat-log::-webkit-scrollbar-thumb {
      background: rgba(0, 122, 255, 0.3);
      border-radius: 3px;
    }
    #chat-log p {
      margin: 0;
      padding: 0.5rem 0.8rem;
      border-radius: 12px;
      font-size: 0.9rem;
      max-width: 80%;
      word-wrap: break-word;
      transition: transform 0.3s ease;
      transform: translateZ(5px);
      animation: fadeInBubble 0.3s ease;
    }
    #chat-log p:hover {
      transform: translateZ(10px);
    }
    @keyframes fadeInBubble {
      from { opacity: 0; transform: translateZ(0); }
      to { opacity: 1; transform: translateZ(5px); }
    }
    #chat-log .you {
      background: #34C759;
      color: #FFFFFF;
      margin-left: auto;
      box-shadow: 0 0 5px rgba(52, 199, 89, 0.3);
    }
    #chat-log .stranger {
      background: #007AFF;
      color: #FFFFFF;
      margin-right: auto;
      box-shadow: 0 0 5px rgba(0, 122, 255, 0.3);
    }
    #chat-input-container {
      display: flex;
      align-items: center;
      padding: 0.5rem;
      background: rgba(255, 255, 255, 0.95);
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
      transform: translateZ(5px);
      max-width: 600px;
      margin: 0 auto 0.5rem;
      position: sticky;
      bottom: 0;
      z-index: 10;
    }
    #chat-input {
      flex: 1;
      padding: 0.75rem;
      border: 1px solid #D1D1D6;
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.8);
      color: #1C2526;
      font-size: 0.95rem;
      transition: all 0.3s ease;
      transform: translateZ(5px);
    }
    #chat-input:focus {
      outline: none;
      border-color: #007AFF;
      box-shadow: 0 0 10px rgba(0, 122, 255, 0.3);
      transform: translateZ(10px);
    }
    #send-icon {
      width: 40px;
      height: 40px;
      display: flex;
      justify-content: center;
      align-items: center;
      border-radius: 50%;
      background: #007AFF;
      cursor: pointer;
      margin-left: 0.5rem;
      transition: all 0.3s ease;
      box-shadow: 0 0 10px rgba(0, 122, 255, 0.3);
      transform: translateZ(5px);
    }
    #send-icon:hover {
      transform: translateZ(10px);
      box-shadow: 0 0 15px rgba(0, 122, 255, 0.5);
    }
    #typing-indicator {
      font-size: 0.85rem;
      color: #8E8E93;
      padding: 0.5rem;
      text-align: center;
      transform: translateZ(5px);
    }
    #browser-tab {
      display: none;
      flex: 1;
      max-width: 600px;
      margin: 0 auto;
      width: 100%;
    }
    #browser-frame {
      width: 100%;
      height: 100%;
      border: none;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
      transform: translateZ(5px);
    }
    #admin-content h3 {
      font-size: 1rem;
      color: #1C2526;
      margin: 1rem 0 0.5rem;
    }
    #admin-content ul {
      list-style: none;
      padding: 0;
      margin: 0 0 1rem;
    }
    #admin-content li {
      padding: 0.5rem;
      border-bottom: 1px solid #D1D1D6;
      font-size: 0.9rem;
      color: #1C2526;
    }
    #admin-content button {
      margin: 0.5rem 0;
    }
    @media (max-width: 768px) {
      #app-container {
        border-radius: 0;
      }
      #top-menu, .top-controls, #chat-input-container {
        margin: 0.5rem;
      }
      #chat-log p {
        font-size: 0.85rem;
        padding: 0.4rem 0.7rem;
      }
      #chat-input {
        font-size: 0.9rem;
        padding: 0.6rem;
      }
      #send-icon, #help-icon, #admin-icon, #disconnect-button {
        width: 36px;
        height: 36px;
      }
      #tags-modal, #contact-modal, #admin-modal, #age-modal {
        width: 95%;
        padding: 1rem;
      }
    }
    @media (max-width: 480px) {
      #chat-log p {
        font-size: 0.8rem;
        padding: 0.3rem 0.6rem;
      }
      #chat-input {
        font-size: 0.85rem;
        padding: 0.5rem;
      }
      #send-icon, #help-icon, #admin-icon, #disconnect-button {
        width: 32px;
        height: 32px;
      }
      #tags-modal, #contact-modal, #admin-modal, #age-modal {
        width: 100%;
        border-radius: 0;
      }
    }
  </style>
</head>
<body>
  <canvas id="particle-canvas"></canvas>
  <div id="modal-overlay"></div>
  <div id="age-modal">
    <h2>Age Verification</h2>
    <div id="age-form">
      <p>By proceeding, you confirm you are 13 or older.</p>
      <button id="confirm-age">Confirm</button>
      <button class="close-button" id="close-age">Cancel</button>
    </div>
  </div>
  <div id="tags-modal">
    <h2>Enter Tags</h2>
    <div id="trending-tags"></div>
    <div id="tags-form">
      <input id="tags-input" type="text" placeholder="Enter tags (comma-separated)">
      <button id="submit-tags">Join Chat</button>
      <button class="close-button" id="close-tags">Cancel</button>
    </div>
  </div>
  <div id="contact-modal">
    <h2>Contact Us</h2>
    <div id="contact-form">
      <input id="contact-name" type="text" placeholder="Your Name (optional)">
      <input id="contact-email" type="email" placeholder="Your Email (optional)">
      <textarea id="contact-message" placeholder="Your Message"></textarea>
      <button id="submit-contact">Submit</button>
      <button class="close-button" id="close-contact">Cancel</button>
    </div>
  </div>
  <div id="admin-modal">
    <h2>Admin Console</h2>
    <div id="admin-content">
      <input id="admin-key" type="password" placeholder="Enter Admin Key">
      <button id="admin-login">Login</button>
      <button class="close-button" id="close-admin">Close</button>
    </div>
  </div>
  <div id="app-container">
    <div id="top-menu">
      <a href="#" class="menu-button active" id="chat-menu" title="Chat">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
        </svg>
      </a>
      <a href="#" class="menu-button" id="video-menu" title="Video">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="2" y="4" width="20" height="16" rx="2" ry="2"></rect>
          <polygon points="10 8 16 12 10 16 10 8"></polygon>
        </svg>
      </a>
      <a href="#" class="menu-button" id="browser-menu" title="Browser">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="10"></circle>
          <circle cx="12" cy="12" r="4"></circle>
          <line x1="21.17" y1="8" x2="12" y2="8"></line>
          <line x1="3.95" y1="6.06" x2="8.54" y2="14"></line>
          <line x1="10.88" y1="21.94" x2="15.46" y2="14"></line>
        </svg>
      </a>
      <a href="live.html" class="menu-button" id="live-menu" title="Live">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="4" fill="currentColor"></circle>
        </svg>
      </a>
    </div>
    <div class="top-controls">
      <div class="control-group">
        <span id="connection-indicator"></span>
        <div id="safe-mode-toggle">
          <input type="checkbox" id="safe-mode" checked>
          <label for="safe-mode">Safe Mode</label>
        </div>
      </div>
      <div class="control-group">
        <div id="help-icon" title="Contact Us">?</div>
        <div id="admin-icon" title="Admin">A</div>
        <div id="disconnect-button" title="Disconnect">X</div>
      </div>
    </div>
    <div id="chat-container">
      <div id="chat-log"></div>
      <div id="typing-indicator"></div>
      <div id="chat-input-container">
        <input id="chat-input" type="text" placeholder="Type a message...">
        <div id="send-icon">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#FFFFFF" stroke-width="2">
            <line x1="22" y1="2" x2="11" y2="13"></line>
            <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
          </svg>
        </div>
      </div>
    </div>
    <div id="browser-tab">
      <iframe id="browser-frame" src="https://www.example.com"></iframe>
    </div>
  </div>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.5/socket.io.min.js"></script>
  <script>
    // Particle background
    const canvas = document.getElementById('particle-canvas');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    const particles = [];
    const particleCount = 50;

    class Particle {
      constructor() {
        this.x = Math.random() * canvas.width;
        this.y = Math.random() * canvas.height;
        this.size = Math.random() * 2 + 1;
        this.speedX = Math.random() * 0.2 - 0.1;
        this.speedY = Math.random() * 0.2 - 0.1;
        this.opacity = Math.random() * 0.3 + 0.2;
      }
      update() {
        this.x += this.speedX;
        this.y += this.speedY;
        if (this.x < 0 || this.x > canvas.width) this.speedX *= -1;
        if (this.y < 0 || this.y > canvas.height) this.speedY *= -1;
      }
      draw() {
        ctx.fillStyle = `rgba(0, 122, 255, ${this.opacity})`;
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        ctx.fill();
      }
    }

    function initParticles() {
      for (let i = 0; i < particleCount; i++) {
        particles.push(new Particle());
      }
    }

    function animateParticles() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      particles.forEach(particle => {
        particle.update();
        particle.draw();
      });
      requestAnimationFrame(animateParticles);
    }

    window.addEventListener('resize', () => {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    });

    initParticles();
    animateParticles();

    // Socket.IO connection
    const socket = io('https://nighthub-backend.onrender.com', {
      transports: ['websocket'],
      reconnectionAttempts: 5
    });

    // DOM elements
    const modalOverlay = document.getElementById('modal-overlay');
    const ageModal = document.getElementById('age-modal');
    const confirmAge = document.getElementById('confirm-age');
    const closeAge = document.getElementById('close-age');
    const tagsModal = document.getElementById('tags-modal');
    const tagsInput = document.getElementById('tags-input');
    const submitTags = document.getElementById('submit-tags');
    const closeTags = document.getElementById('close-tags');
    const trendingTags = document.getElementById('trending-tags');
    const contactModal = document.getElementById('contact-modal');
    const contactName = document.getElementById('contact-name');
    const contactEmail = document.getElementById('contact-email');
    const contactMessage = document.getElementById('contact-message');
    const submitContact = document.getElementById('submit-contact');
    const closeContact = document.getElementById('close-contact');
    const adminModal = document.getElementById('admin-modal');
    const adminKey = document.getElementById('admin-key');
    const adminLogin = document.getElementById('admin-login');
    const closeAdmin = document.getElementById('close-admin');
    const adminContent = document.getElementById('admin-content');
    const chatMenu = document.getElementById('chat-menu');
    const videoMenu = document.getElementById('video-menu');
    const browserMenu = document.getElementById('browser-menu');
    const connectionIndicator = document.getElementById('connection-indicator');
    const safeModeToggle = document.getElementById('safe-mode');
    const helpIcon = document.getElementById('help-icon');
    const adminIcon = document.getElementById('admin-icon');
    const disconnectButton = document.getElementById('disconnect-button');
    const chatContainer = document.getElementById('chat-container');
    const chatLog = document.getElementById('chat-log');
    const chatInput = document.getElementById('chat-input');
    const sendIcon = document.getElementById('send-icon');
    const typingIndicator = document.getElementById('typing-indicator');
    const browserTab = document.getElementById('browser-tab');
    const browserFrame = document.getElementById('browser-frame');

    // State
    let pairId = null;
    let messageHistory = [];
    let userId = null;

    // Chat log management
    function updateChatLog() {
      chatLog.innerHTML = '';
      messageHistory.forEach(msg => {
        const p = document.createElement('p');
        p.className = msg.sender === 'you' ? 'you' : 'stranger';
        p.textContent = msg.text;
        chatLog.appendChild(p);
      });
      chatLog.scrollTop = chatLog.scrollHeight;
    }

    // Socket.IO event handlers
    socket.on('connect', () => {
      console.log('Connected to backend');
      userId = socket.id;
      connectionIndicator.classList.add('connected');
      ageModal.style.display = 'block';
      modalOverlay.style.display = 'block';
    });

    socket.on('paired', (newPairId) => {
      pairId = newPairId;
      connectionIndicator.classList.add('connected');
      chatInput.disabled = false;
      messageHistory = [];
      updateChatLog();
      new Audio('/assets/Notification.mp3').play();
    });

    socket.on('rejoin', () => {
      socket.emit('join', tagsInput.value.split(',').map(tag => tag.trim()).filter(tag => tag));
    });

    socket.on('message', (msg) => {
      messageHistory.push({ sender: 'stranger', text: msg });
      updateChatLog();
      new Audio('/assets/Notification.mp3').play();
    });

    socket.on('typing', (isTyping) => {
      typingIndicator.textContent = isTyping ? 'Stranger is typing...' : '';
    });

    socket.on('disconnected', () => {
      connectionIndicator.classList.remove('connected');
      chatInput.disabled = true;
      messageHistory = [];
      updateChatLog();
      pairId = null;
      socket.emit('join', tagsInput.value.split(',').map(tag => tag.trim()).filter(tag => tag));
    });

    socket.on('request_success', (msg) => {
      alert(msg);
      contactModal.style.display = 'none';
      modalOverlay.style.display = 'none';
      contactName.value = '';
      contactEmail.value = '';
      contactMessage.value = '';
    });

    socket.on('trending_tags', (tags) => {
      trendingTags.innerHTML = '';
      tags.forEach(tag => {
        const span = document.createElement('span');
        span.className = 'trending-tag';
        span.textContent = tag;
        span.addEventListener('click', () => {
          const currentTags = tagsInput.value.split(',').map(t => t.trim()).filter(t => t);
          if (!currentTags.includes(tag)) {
            tagsInput.value = [...currentTags, tag].join(', ');
          }
        });
        trendingTags.appendChild(span);
      });
    });

    socket.on('admin_data', (data) => {
      adminContent.innerHTML = `
        <h3>Stats</h3>
        <ul>
          <li>Online Users: ${data.onlineUsers}</li>
          <li>Active Chats: ${data.activeChats}</li>
          <li>Messages Sent: ${data.messagesSent}</li>
          <li>Reports Filed: ${data.reportsFiled}</li>
        </ul>
        <h3>Users</h3>
        <ul>
          ${data.users.map(user => `
            <li>
              User ID: ${user.userId.slice(0, 8)}...
              Reports: ${user.reports}
              ${user.isBanned ? `Banned until ${new Date(user.banEnd).toLocaleString()}` : ''}
              <button onclick="banUser('${user.userId}', 30 * 60 * 1000)">Ban 30m</button>
              <button onclick="banUser('${user.userId}', Infinity)">Ban Permanent</button>
              ${user.isBanned ? `<button onclick="unbanUser('${user.userId}')">Unban</button>` : ''}
            </li>
          `).join('')}
        </ul>
        <h3>Chats</h3>
        <ul>
          ${data.chats.map(chat => `
            <li>
              Pair ID: ${chat.pairId.slice(0, 8)}...
              Users: ${chat.userIds.map(id => id.slice(0, 8)).join(', ')}
              Reports: ${chat.reports}
              <button onclick="observeChat('${chat.pairId}')">Observe</button>
              <button onclick="leaveChat('${chat.pairId}')">Stop Observing</button>
            </li>
          `).join('')}
        </ul>
        <h3>Live Streams</h3>
        <ul>
          ${data.liveStreams.map(stream => `
            <li>
              User ID: ${stream.userId.slice(0, 8)}...
              Title: ${stream.title}
              Viewers: ${stream.viewers}
              ${stream.isBanned ? `Banned` : ''}
              <button onclick="banLive('${stream.userId}', 30 * 60 * 1000)">Ban 30m</button>
              <button onclick="banLive('${stream.userId}', Infinity)">Ban Permanent</button>
              ${stream.isBanned ? `<button onclick="unbanLive('${stream.userId}')">Unban</button>` : ''}
            </li>
          `).join('')}
        </ul>
        <button class="close-button" id="close-admin">Close</button>
      `;
      document.getElementById('close-admin').addEventListener('click', () => {
        adminModal.style.display = 'none';
        modalOverlay.style.display = 'none';
      });
    });

    socket.on('admin_message', ({ pairId, userId: senderId, message }) => {
      alert(`Chat ${pairId.slice(0, 8)}...: ${senderId.slice(0, 8)} said: ${message}`);
    });

    socket.on('error', (msg) => {
      alert(`Error: ${msg}`);
    });

    // DOM event listeners
    confirmAge.addEventListener('click', () => {
      ageModal.style.display = 'none';
      modalOverlay.style.display = 'none';
      tagsModal.style.display = 'block';
      socket.emit('get_trending_tags');
    });

    closeAge.addEventListener('click', () => {
      window.location.href = 'https://www.example.com';
    });

    submitTags.addEventListener('click', () => {
      const tags = tagsInput.value.split(',').map(tag => tag.trim()).filter(tag => tag);
      if (tags.length > 0) {
        socket.emit('join', tags);
        tagsModal.style.display = 'none';
        modalOverlay.style.display = 'none';
      } else {
        alert('Please enter at least one tag');
      }
    });

    closeTags.addEventListener('click', () => {
      tagsModal.style.display = 'none';
      modalOverlay.style.display = 'none';
      window.location.href = 'https://www.example.com';
    });

    submitContact.addEventListener('click', () => {
      socket.emit('submit_request', {
        name: contactName.value,
        email: contactEmail.value,
        message: contactMessage.value
      });
    });

    closeContact.addEventListener('click', () => {
      contactModal.style.display = 'none';
      modalOverlay.style.display = 'none';
      contactName.value = '';
      contactEmail.value = '';
      contactMessage.value = '';
    });

    adminLogin.addEventListener('click', () => {
      socket.emit('admin_login', { key: adminKey.value });
      adminKey.value = '';
    });

    closeAdmin.addEventListener('click', () => {
      adminModal.style.display = 'none';
      modalOverlay.style.display = 'none';
    });

    modalOverlay.addEventListener('click', () => {
      ageModal.style.display = 'none';
      tagsModal.style.display = 'none';
      contactModal.style.display = 'none';
      adminModal.style.display = 'none';
      modalOverlay.style.display = 'none';
      contactName.value = '';
      contactEmail.value = '';
      contactMessage.value = '';
    });

    chatMenu.addEventListener('click', (e) => {
      e.preventDefault();
      chatMenu.classList.add('active');
      videoMenu.classList.remove('active');
      browserMenu.classList.remove('active');
      chatContainer.style.display = 'flex';
      browserTab.style.display = 'none';
    });

    videoMenu.addEventListener('click', (e) => {
      e.preventDefault();
      if (pairId) {
        window.location.href = `video.html?pairId=${pairId}`;
      } else {
        alert('You must be paired with a user to start a video call');
      }
    });

    browserMenu.addEventListener('click', (e) => {
      e.preventDefault();
      chatMenu.classList.remove('active');
      videoMenu.classList.remove('active');
      browserMenu.classList.add('active');
      chatContainer.style.display = 'none';
      browserTab.style.display = 'flex';
    });

    safeModeToggle.addEventListener('change', () => {
      socket.emit('safe_mode', safeModeToggle.checked);
    });

    helpIcon.addEventListener('click', () => {
      contactModal.style.display = 'block';
      modalOverlay.style.display = 'block';
    });

    adminIcon.addEventListener('click', () => {
      adminModal.style.display = 'block';
      modalOverlay.style.display = 'block';
    });

    disconnectButton.addEventListener('click', () => {
      if (pairId) {
        socket.emit('leave');
      }
    });

    chatInput.addEventListener('input', () => {
      socket.emit('typing', true);
      clearTimeout(chatInput.typingTimeout);
      chatInput.typingTimeout = setTimeout(() => {
        socket.emit('typing', false);
      }, 1000);
    });

    sendIcon.addEventListener('click', () => {
      if (chatInput.value.trim()) {
        socket.emit('message', chatInput.value);
        messageHistory.push({ sender: 'you', text: chatInput.value });
        updateChatLog();
        chatInput.value = '';
        socket.emit('typing', false);
      }
    });

    chatInput.addEventListener('keypress', (e) => {
      if (e.key === 'Enter' && chatInput.value.trim()) {
        socket.emit('message', chatInput.value);
        messageHistory.push({ sender: 'you', text: chatInput.value });
        updateChatLog();
        chatInput.value = '';
        socket.emit('typing', false);
      }
    });

    // Admin functions
    function banUser(userId, duration) {
      socket.emit('admin_ban', { userId, duration });
    }

    function unbanUser(userId) {
      socket.emit('admin_unban', { userId });
    }

    function banLive(userId, duration) {
      socket.emit('admin_ban_live', { userId, duration });
    }

    function unbanLive(userId) {
      socket.emit('admin_unban_live', { userId });
    }

    function observeChat(pairId) {
      socket.emit('admin_observe_chat', { pairId });
    }

    function leaveChat(pairId) {
      socket.emit('admin_leave_chat', { pairId });
    }
  </script>
</body>
</html>
