<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>NightHub - Anonymous Chat</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
    }
    body {
      font-family: 'Inter', sans-serif;
      background: #0A0A0A;
      color: #E0E0E0;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      padding: 0;
      overflow: hidden;
      position: relative;
    }
    #stars-canvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -1;
      pointer-events: none;
    }
    #app-container {
      flex: 1;
      display: flex;
      flex-direction: column;
      width: 100%;
      max-width: 600px;
      margin: 0 auto;
      height: 100dvh;
      background: rgba(255, 255, 255, 0.05);
      border-radius: 0;
      padding: 1rem;
      backdrop-filter: blur(10px);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
      position: relative;
      z-index: 1;
    }
    h1 {
      font-size: 1.5rem;
      color: #8D8DFF;
      text-align: center;
      letter-spacing: 1px;
      margin-bottom: 0.5rem;
      text-shadow: 0 0 8px rgba(141, 141, 255, 0.3);
    }
    .top-controls {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.5rem;
      position: sticky;
      top: 0;
      z-index: 10;
      background: rgba(10, 10, 10, 0.8);
      backdrop-filter: blur(5px);
    }
    .control-group {
      display: flex;
      gap: 0.5rem;
      align-items: center;
    }
    #connection-indicator {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #FF5252;
      transition: background 0.3s ease;
    }
    #connection-indicator.connected {
      background: #4CAF50;
    }
    #safe-mode-toggle {
      display: flex;
      align-items: center;
      font-size: 0.9rem;
      color: #E0E0E0;
    }
    #safe-mode-toggle input {
      display: none;
    }
    #safe-mode-toggle label {
      cursor: pointer;
      padding: 0.5rem 1rem;
      border-radius: 20px;
      background: #8D8DFF;
      transition: all 0.3s ease;
      box-shadow: 0 0 8px rgba(141, 141, 255, 0.2);
      font-weight: 500;
    }
    #safe-mode-toggle input:not(:checked) + label {
      background: #FF5252;
      box-shadow: 0 0 8px rgba(255, 82, 82, 0.2);
    }
    #help-icon {
      width: 2rem;
      height: 2rem;
      display: flex;
      justify-content: center;
      align-items: center;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.1);
      color: #8D8DFF;
      font-size: 1rem;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 0 8px rgba(141, 141, 255, 0.2);
    }
    #help-icon:hover {
      transform: scale(1.1);
      box-shadow: 0 0 12px rgba(141, 141, 255, 0.4);
    }
    #modal-overlay {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(10, 10, 10, 0.8);
      z-index: 999;
      backdrop-filter: blur(5px);
      animation: fadeInOverlay 0.3s ease;
    }
    @keyframes fadeInOverlay {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    #tags-modal, #contact-modal, #admin-modal {
      display: none;
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 90%;
      max-width: 500px;
      background: rgba(255, 255, 255, 0.05);
      border-radius: 24px;
      padding: 1.5rem;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
      backdrop-filter: blur(10px);
      z-index: 1000;
      animation: popIn 0.4s ease-out;
      max-height: 90vh;
      overflow-y: auto;
    }
    @keyframes popIn {
      from { transform: translate(-50%, -50%) scale(0.9); opacity: 0; }
      to { transform: translate(-50%, -50%) scale(1); opacity: 1; }
    }
    #tags-modal h2, #contact-modal h2, #admin-modal h2 {
      font-size: 1.2rem;
      color: #8D8DFF;
      text-align: center;
      margin-bottom: 1rem;
      text-shadow: 0 0 8px rgba(141, 141, 255, 0.3);
    }
    #tags-form, #contact-form, #admin-content {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }
    #tags-form input, #contact-form input, #contact-form textarea {
      padding: 0.75rem;
      border: 1px solid #8D8DFF;
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.05);
      color: #E0E0E0;
      font-size: 0.95rem;
      transition: all 0.3s ease;
    }
    #tags-form textarea, #contact-form textarea {
      resize: vertical;
      min-height: 100px;
    }
    #tags-form input:focus, #contact-form input:focus, #contact-form textarea:focus {
      outline: none;
      border-color: #4B0082;
      box-shadow: 0 0 12px rgba(75, 0, 130, 0.4);
    }
    #tags-form button, #contact-form button, #admin-content button {
      padding: 0.75rem;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      background: rgba(141, 141, 255, 0.2);
      color: #E0E0E0;
      font-size: 0.95rem;
      font-weight: 500;
      transition: all 0.3s ease;
      box-shadow: 0 0 8px rgba(141, 141, 255, 0.2);
    }
    #tags-form button:hover, #contact-form button:hover, #admin-content button:hover {
      transform: scale(1.05);
      box-shadow: 0 0 12px rgba(141, 141, 255, 0.4);
    }
    #tags-form .close-button, #contact-form .close-button, #admin-content .close-button {
      background: rgba(255, 82, 82, 0.2);
    }
    #tags-form .close-button:hover, #contact-form .close-button:hover, #admin-content .close-button:hover {
      box-shadow: 0 0 12px rgba(255, 82, 82, 0.4);
    }
    #trending-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      margin-bottom: 1rem;
    }
    .trending-tag {
      padding: 0.5rem 1rem;
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.1);
      color: #E0E0E0;
      font-size: 0.85rem;
      cursor: pointer;
      transition: all 0.3s ease;
    }
    .trending-tag:hover {
      transform: scale(1.05);
      box-shadow: 0 0 8px rgba(141, 141, 255, 0.3);
    }
    #chat-log {
      flex: 1;
      overflow-y: auto;
      padding: 1rem;
      scrollbar-width: none;
      -webkit-overflow-scrolling: touch;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }
    #chat-log::-webkit-scrollbar {
      display: none;
    }
    #chat-log p {
      margin: 0;
      padding: 0.75rem 1rem;
      border-radius: 16px;
      animation: fadeInBubble 0.3s ease forwards;
      font-size: 0.95rem;
      position: relative;
      max-width: 75%;
      display: inline-block;
      word-wrap: break-word;
      transition: transform 0.2s ease;
    }
    @keyframes fadeInBubble {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    #chat-log .you {
      background: #D3D3D3;
      color: #0A0A0A;
      margin-left: auto;
      box-shadow: 0 0 8px rgba(211, 211, 211, 0.3);
      text-align: left;
    }
    #chat-log .stranger {
      background: #8D8DFF;
      color: #FFFFFF;
      margin-right: auto;
      box-shadow: 0 0 8px rgba(141, 141, 255, 0.4);
    }
    .reaction-bubble {
      display: none;
      position: absolute;
      top: -40px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(5px);
      border-radius: 12px;
      padding: 0.5rem;
      box-shadow: 0 0 8px rgba(141, 141, 255, 0.2);
      z-index: 10;
    }
    #chat-log p:hover .reaction-bubble {
      display: flex;
      gap: 0.5rem;
    }
    .reaction-emoji {
      cursor: pointer;
      font-size: 1rem;
      transition: transform 0.2s ease;
      user-select: none;
      touch-action: manipulation;
    }
    .reaction-emoji:hover {
      transform: scale(1.2);
    }
    .reaction-display {
      position: absolute;
      right: -1.5rem;
      top: 50%;
      transform: translateY(-50%);
      background: rgba(255, 255, 255, 0.2);
      border-radius: 50%;
      width: 1.5rem;
      height: 1.5rem;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.9rem;
      box-shadow: 0 0 4px rgba(141, 141, 255, 0.2);
    }
    #typing-indicator {
      font-size: 0.85rem;
      color: #8D8DFF;
      margin: 0.5rem 1rem;
      display: none;
      animation: pulse 1.5s infinite;
    }
    @keyframes pulse {
      0% { opacity: 1; }
      50% { opacity: 0.5; }
      100% { opacity: 1; }
    }
    #countdown-timer {
      display: none;
      text-align: center;
      font-size: 0.9rem;
      color: #FF5252;
      margin: 0.5rem 0;
      text-shadow: 0 0 8px rgba(255, 82, 82, 0.3);
    }
    #input-container {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.5rem;
      background: rgba(255, 255, 255, 0.05);
      border-top: 1px solid #8D8DFF;
      position: sticky;
      bottom: 0;
      z-index: 5;
    }
    #chat-input {
      flex: 1;
      padding: 0.75rem 1rem;
      border: 1px solid #8D8DFF;
      border-radius: 20px;
      background: rgba(255, 255, 255, 0.05);
      color: #E0E0E0;
      font-size: 0.95rem;
      transition: all 0.3s ease;
      box-shadow: 0 0 8px rgba(141, 141, 255, 0.2);
    }
    #chat-input:focus {
      outline: none;
      border-color: #4B0082;
      box-shadow: 0 0 12px rgba(75, 0, 130, 0.4);
      animation: pulseInput 1s infinite;
    }
    @keyframes pulseInput {
      0% { box-shadow: 0 0 8px rgba(75, 0, 130, 0.4); }
      50% { box-shadow: 0 0 12px rgba(75, 0, 130, 0.6); }
      100% { box-shadow: 0 0 8px rgba(75, 0, 130, 0.4); }
    }
    #send-icon {
      width: 2rem;
      height: 2rem;
      display: flex;
      justify-content: center;
      align-items: center;
      border-radius: 50%;
      background: rgba(141, 141, 255, 0.2);
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 0 8px rgba(141, 141, 255, 0.2);
    }
    #send-icon:hover {
      transform: scale(1.1);
      box-shadow: 0 0 12px rgba(141, 141, 255, 0.4);
    }
    #button-container {
      display: flex;
      gap: 0.5rem;
      padding: 0.5rem;
      background: rgba(255, 255, 255, 0.05);
      border-top: 1px solid #8D8DFF;
      position: sticky;
      bottom: 0;
      z-index: 5;
      justify-content: center;
    }
    button {
      padding: 0.75rem 1rem;
      border: none;
      border-radius: 20px;
      cursor: pointer;
      background: rgba(141, 141, 255, 0.2);
      color: #E0E0E0;
      font-size: 0.95rem;
      font-weight: 500;
      transition: all 0.3s ease;
      box-shadow: 0 0 8px rgba(141, 141, 255, 0.2);
      flex: 1;
      max-width: 150px;
    }
    button:hover {
      transform: scale(1.05);
      box-shadow: 0 0 12px rgba(141, 141, 255, 0.4);
    }
    button:active {
      transform: scale(0.95);
    }
    #cancel-disconnect, #report-user {
      background: rgba(255, 82, 82, 0.2);
    }
    #cancel-disconnect:hover, #report-user:hover {
      box-shadow: 0 0 12px rgba(255, 82, 82, 0.4);
    }
    #admin-content table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.9rem;
    }
    #admin-content th, #admin-content td {
      padding: 0.5rem;
      border: 1px solid #8D8DFF;
      text-align: left;
    }
    #admin-content th {
      background: rgba(141, 141, 255, 0.2);
      color: #E0E0E0;
    }
    #admin-content td {
      background: rgba(255, 255, 255, 0.05);
    }
    #admin-content .ban-button {
      background: rgba(255, 82, 82, 0.2);
    }
    #admin-content .unban-button {
      background: rgba(76, 175, 80, 0.2);
    }
    #admin-content .observe-button {
      background: rgba(141, 141, 255, 0.2);
    }
    #admin-content .flagged {
      background: rgba(255, 82, 82, 0.2);
    }
    #admin-chat-log {
      height: 200px;
      overflow-y: auto;
      background: rgba(255, 255, 255, 0.05);
      border-radius: 16px;
      padding: 1rem;
      margin: 1rem 0;
      border: 1px solid #8D8DFF;
      scrollbar-width: none;
    }
    #admin-chat-log::-webkit-scrollbar {
      display: none;
    }
    #admin-chat-log p {
      margin: 0.5rem 0;
      font-size: 0.9rem;
      color: #E0E0E0;
    }
    #stats-section {
      display: flex;
      flex-wrap: wrap;
      gap: 1rem;
      margin-bottom: 1rem;
    }
    .stat-card {
      flex: 1;
      min-width: 120px;
      background: rgba(255, 255, 255, 0.05);
      padding: 1rem;
      border-radius: 16px;
      border: 1px solid #8D8DFF;
      text-align: center;
      font-size: 0.9rem;
    }
    .stat-card h3 {
      color: #8D8DFF;
      margin-bottom: 0.5rem;
      font-size: 1rem;
    }
    @media (max-width: 768px) {
      #app-container {
        max-width: 100%;
        padding: 0;
        border-radius: 0;
      }
      h1 {
        font-size: 1.2rem;
        margin-bottom: 0.3rem;
      }
      #chat-log {
        padding: 0.5rem;
      }
      #chat-log p {
        font-size: 0.85rem;
        padding: 0.5rem 0.75rem;
        max-width: 80%;
      }
      #chat-input {
        font-size: 0.9rem;
        padding: 0.6rem;
      }
      #button-container {
        flex-direction: row;
        flex-wrap: wrap;
        padding: 0.3rem;
      }
      button {
        font-size: 0.85rem;
        padding: 0.6rem;
        max-width: 100%;
      }
      .top-controls {
        padding: 0.3rem;
      }
      #safe-mode-toggle label {
        font-size: 0.8rem;
        padding: 0.4rem 0.8rem;
      }
      #help-icon {
        width: 1.8rem;
        height: 1.8rem;
        font-size: 0.9rem;
      }
      #tags-modal, #contact-modal, #admin-modal {
        width: 100%;
        height: 100%;
        max-height: 100%;
        border-radius: 0;
        padding: 1rem;
      }
      #tags-modal h2, #contact-modal h2, #admin-modal h2 {
        font-size: 1rem;
      }
      #tags-form input, #contact-form input, #contact-form textarea {
        font-size: 0.85rem;
        padding: 0.6rem;
      }
      #tags-form button, #contact-form button, #admin-content button {
        font-size: 0.85rem;
        padding: 0.6rem;
      }
      .trending-tag {
        font-size: 0.8rem;
        padding: 0.4rem 0.8rem;
      }
      #admin-content table {
        font-size: 0.8rem;
      }
      .stat-card {
        min-width: 100px;
        font-size: 0.8rem;
      }
      .reaction-display {
        right: -1.2rem;
        width: 1.2rem;
        height: 1.2rem;
        font-size: 0.8rem;
      }
      #input-container, #button-container {
        padding: 0.3rem;
      }
    }
    @media (max-width: 480px) {
      h1 {
        font-size: 1rem;
      }
      #chat-input {
        font-size: 0.85rem;
      }
      #safe-mode-toggle label {
        font-size: 0.75rem;
        padding: 0.3rem 0.7rem;
      }
      #help-icon {
        width: 1.6rem;
        height: 1.6rem;
        font-size: 0.8rem;
      }
      button {
        font-size: 0.8rem;
        padding: 0.5rem;
      }
    }
  </style>
</head>
<body>
  <canvas id="stars-canvas"></canvas>
  <div id="modal-overlay"></div>
  <div id="tags-modal">
    <h2>Select Your Interests</h2>
    <div id="tags-form">
      <div id="trending-tags"></div>
      <input id="tags-input" type="text" placeholder="Enter tags (e.g., coding, movies)">
      <button id="submit-tags">Join Chat</button>
      <button class="close-button" id="close-tags">Close</button>
    </div>
  </div>
  <div id="contact-modal">
    <h2>Contact Us</h2>
    <div id="contact-form">
      <input type="text" id="contact-name" placeholder="Name (optional)">
      <input type="email" id="contact-email" placeholder="Email (optional)">
      <textarea id="contact-message" placeholder="Your message"></textarea>
      <button id="submit-contact">Submit</button>
      <button class="close-button" id="close-contact">Close</button>
    </div>
  </div>
  <div id="admin-modal">
    <h2>Admin Dashboard</h2>
    <div id="admin-content">
      <div id="stats-section">
        <div class="stat-card">
          <h3>Online Users</h3>
          <p id="online-users">0</p>
        </div>
        <div class="stat-card">
          <h3>Active Chats</h3>
          <p id="active-chats">0</p>
        </div>
        <div class="stat-card">
          <h3>Messages Sent</h3>
          <p id="messages-sent">0</p>
        </div>
        <div class="stat-card">
          <h3>Reports Filed</h3>
          <p id="reports-filed">0</p>
        </div>
      </div>
      <h3>User Management</h3>
      <table id="user-table">
        <thead>
          <tr>
            <th>User ID</th>
            <th>Socket ID</th>
            <th>Reports</th>
            <th>Ban Status</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="user-table-body"></tbody>
      </table>
      <h3>Live Chats</h3>
      <table id="chat-table">
        <thead>
          <tr>
            <th>Pair ID</th>
            <th>User IDs</th>
            <th>Reports</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="chat-table-body"></tbody>
      </table>
      <div id="admin-chat-log"></div>
      <button class="close-button" id="close-admin">Close</button>
    </div>
  </div>
  <div id="app-container">
    <h1>NightHub</h1>
    <div class="top-controls">
      <div class="control-group">
        <div id="connection-indicator"></div>
        <div id="help-icon" title="Contact Us">?</div>
      </div>
      <div class="control-group">
        <div id="safe-mode-toggle">
          <input type="checkbox" id="safe-mode" checked>
          <label for="safe-mode">Safe Mode</label>
        </div>
      </div>
    </div>
    <div id="chat-log"></div>
    <div id="typing-indicator">Stranger is typing...</div>
    <div id="countdown-timer">Disconnecting in <span id="countdown">5</span> seconds...</div>
    <div id="input-container">
      <input id="chat-input" type="text" placeholder="Type your message..." disabled>
      <div id="send-icon">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#8D8DFF" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="22" y1="2" x2="11" y2="13"></line>
          <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
        </svg>
      </div>
    </div>
    <div id="button-container">
      <button id="start-chat">Start Chat</button>
      <button id="end-chat" style="display:none;">End Chat</button>
      <button id="report-user" style="display:none;">Report User</button>
      <button id="cancel-disconnect" style="display:none;">Cancel Disconnect</button>
    </div>
  </div>
  <audio id="message-sound" src="/assets/Notification.mp3"></audio>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.5/socket.io.js"></script>
  <script>
    // Stars and shooting stars background
    const canvas = document.getElementById('stars-canvas');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    const stars = [];
    const starCount = 100;
    const shootingStars = [];

    class Star {
      constructor() {
        this.x = Math.random() * canvas.width;
        this.y = Math.random() * canvas.height;
        this.size = Math.random() * 1.5 + 0.5;
        this.speedX = Math.random() * 0.05 - 0.025;
        this.speedY = Math.random() * 0.05 - 0.025;
        this.opacity = Math.random() * 0.5 + 0.3;
      }
      update() {
        this.x += this.speedX;
        this.y += this.speedY;
        if (this.x < 0 || this.x > canvas.width) this.speedX *= -1;
        if (this.y < 0 || this.y > canvas.height) this.speedY *= -1;
      }
      draw() {
        ctx.fillStyle = `rgba(255, 255, 255, ${this.opacity})`;
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        ctx.fill();
      }
    }

    class ShootingStar {
      constructor() {
        this.x = Math.random() * canvas.width;
        this.y = Math.random() * canvas.height / 2;
        this.length = Math.random() * 20 + 10;
        this.speed = Math.random() * 5 + 2;
        this.opacity = 1;
      }
      update() {
        this.x += this.speed;
        this.y += this.speed;
        this.opacity -= 0.02;
        if (this.opacity <= 0) {
          shootingStars.splice(shootingStars.indexOf(this), 1);
        }
      }
      draw() {
        ctx.strokeStyle = `rgba(141, 141, 255, ${this.opacity})`;
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(this.x, this.y);
        ctx.lineTo(this.x - this.length, this.y - this.length);
        ctx.stroke();
      }
    }

    function initStars() {
      for (let i = 0; i < starCount; i++) {
        stars.push(new Star());
      }
    }

    function animateStars() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      const gradient = ctx.createLinearGradient(0, 0, canvas.width, canvas.height);
      gradient.addColorStop(0, '#4B0082');
      gradient.addColorStop(0.5, '#2F0047');
      gradient.addColorStop(1, '#008B8B');
      ctx.fillStyle = gradient;
      ctx.globalAlpha = 0.1;
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.globalAlpha = 1;

      stars.forEach(star => {
        star.update();
        star.draw();
      });
      shootingStars.forEach(star => {
        star.update();
        star.draw();
      });
      if (Math.random() < 0.01) {
        shootingStars.push(new ShootingStar());
      }
      requestAnimationFrame(animateStars);
    }

    window.addEventListener('resize', () => {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    });

    initStars();
    animateStars();

    // Socket.IO connection
    const socket = io('https://nighthub-backend.onrender.com', {
      transports: ['websocket'],
      reconnectionAttempts: 5
    });

    // DOM elements
    const chatLog = document.getElementById('chat-log');
    const chatInput = document.getElementById('chat-input');
    const sendIcon = document.getElementById('send-icon');
    const startChatBtn = document.getElementById('start-chat');
    const endChatBtn = document.getElementById('end-chat');
    const reportUserBtn = document.getElementById('report-user');
    const cancelDisconnectBtn = document.getElementById('cancel-disconnect');
    const typingIndicator = document.getElementById('typing-indicator');
    const countdownSpan = document.getElementById('countdown');
    const countdownTimer = document.getElementById('countdown-timer');
    const messageSound = document.getElementById('message-sound');
    const safeModeToggle = document.getElementById('safe-mode');
    const safeModeLabel = document.querySelector('#safe-mode-toggle label');
    const helpIcon = document.getElementById('help-icon');
    const connectionIndicator = document.getElementById('connection-indicator');
    const tagsModal = document.getElementById('tags-modal');
    const contactModal = document.getElementById('contact-modal');
    const adminModal = document.getElementById('admin-modal');
    const modalOverlay = document.getElementById('modal-overlay');
    const tagsForm = document.getElementById('tags-form');
    const contactForm = document.getElementById('contact-form');
    const tagsInput = document.getElementById('tags-input');
    const submitTags = document.getElementById('submit-tags');
    const closeTags = document.getElementById('close-tags');
    const contactName = document.getElementById('contact-name');
    const contactEmail = document.getElementById('contact-email');
    const contactMessage = document.getElementById('contact-message');
    const submitContact = document.getElementById('submit-contact');
    const closeContact = document.getElementById('close-contact');
    const closeAdmin = document.getElementById('close-admin');
    const userTableBody = document.getElementById('user-table-body');
    const chatTableBody = document.getElementById('chat-table-body');
    const adminChatLog = document.getElementById('admin-chat-log');
    const onlineUsers = document.getElementById('online-users');
    const activeChats = document.getElementById('active-chats');
    const messagesSent = document.getElementById('messages-sent');
    const reportsFiled = document.getElementById('reports-filed');
    const trendingTags = document.getElementById('trending-tags');

    // State
    let isTyping = false;
    let typingTimeout;
    let currentObservedPairId = null;

    // Update Safe Mode label
    function updateSafeModeLabel() {
      safeModeLabel.textContent = safeModeToggle.checked ? 'Safe Mode' : 'NSFW Mode';
    }
    safeModeToggle.addEventListener('change', updateSafeModeLabel);
    updateSafeModeLabel();

    // Sanitize input
    function sanitizeInput(input) {
      const div = document.createElement('div');
      div.textContent = input;
      return div.innerHTML;
    }

    // Fetch trending tags
    function fetchTrendingTags() {
      socket.emit('get_trending_tags');
    }

    // Render trending tags
    socket.on('trending_tags', (tags) => {
      trendingTags.innerHTML = '';
      tags.forEach(tag => {
        const tagBtn = document.createElement('div');
        tagBtn.className = 'trending-tag';
        tagBtn.textContent = tag;
        tagBtn.addEventListener('click', () => {
          const currentTags = tagsInput.value.split(',').map(t => t.trim()).filter(t => t);
          if (!currentTags.includes(tag)) {
            tagsInput.value = [...currentTags, tag].join(', ');
          }
        });
        trendingTags.appendChild(tagBtn);
      });
    });

    // Render admin dashboard
    function renderAdminDashboard(data) {
      onlineUsers.textContent = data.onlineUsers;
      activeChats.textContent = data.activeChats;
      messagesSent.textContent = data.messagesSent;
      reportsFiled.textContent = data.reportsFiled;

      userTableBody.innerHTML = '';
      data.users.forEach(user => {
        const row = document.createElement('tr');
        row.innerHTML = `
          <td>${sanitizeInput(user.userId)}</td>
          <td>${sanitizeInput(user.socketId)}</td>
          <td>${user.reports}</td>
          <td>${user.isBanned ? `Banned (${user.banDuration === Infinity ? 'Permanent' : `${Math.ceil((user.banEnd - Date.now()) / 60000)} min`})` : 'Not Banned'}</td>
          <td>
            <button class="ban-button" data-userid="${sanitizeInput(user.userId)}" ${user.isBanned ? 'disabled' : ''}>Ban</button>
            <button class="unban-button" data-userid="${sanitizeInput(user.userId)}" ${!user.isBanned ? 'disabled' : ''}>Unban</button>
          </td>
        `;
        userTableBody.appendChild(row);
      });

      chatTableBody.innerHTML = '';
      data.chats.forEach(chat => {
        const row = document.createElement('tr');
        row.className = chat.reports >= 5 ? 'flagged' : '';
        row.innerHTML = `
          <td>${sanitizeInput(chat.pairId)}</td>
          <td>${sanitizeInput(chat.userIds.join(', '))}</td>
          <td>${chat.reports}</td>
          <td>
            <button class="observe-button" data-pairid="${sanitizeInput(chat.pairId)}">Observe</button>
          </td>
        `;
        chatTableBody.appendChild(row);
      });

      document.querySelectorAll('.ban-button').forEach(btn => {
        btn.addEventListener('click', () => {
          const userId = btn.dataset.userid;
          socket.emit('admin_ban', { userId, duration: 30 * 60 * 1000 });
        });
      });
      document.querySelectorAll('.unban-button').forEach(btn => {
        btn.addEventListener('click', () => {
          const userId = btn.dataset.userid;
          socket.emit('admin_unban', { userId });
        });
      });
      document.querySelectorAll('.observe-button').forEach(btn => {
        btn.addEventListener('click', () => {
          const pairId = btn.dataset.pairid;
          if (currentObservedPairId) {
            socket.emit('admin_leave_chat', { pairId: currentObservedPairId });
          }
          socket.emit('admin_observe_chat', { pairId });
          currentObservedPairId = pairId;
          adminChatLog.innerHTML = `<p>Observing chat ${sanitizeInput(pairId)}...</p>`;
        });
      });
    }

    // Socket.IO event handlers
    socket.on('connect', () => {
      console.log('Connected to backend, Socket ID:', socket.id);
      connectionIndicator.classList.add('connected');
      fetchTrendingTags();
    });

    socket.on('connect_error', (err) => {
      console.error('Connection error:', err.message);
      connectionIndicator.classList.remove('connected');
      chatLog.innerHTML += `<p style="color: #FF5252;">Error: Failed to connect to server - ${err.message}</p>`;
      chatLog.scrollTop = chatLog.scrollHeight;
    });

    socket.on('message', (msg) => {
      console.log('Received message:', msg, 'Socket ID:', socket.id);
      const msgElement = document.createElement('p');
      msgElement.className = 'stranger';
      msgElement.innerHTML = `<strong>Stranger:</strong> ${sanitizeInput(msg)}<div class="reaction-bubble">😊😢😭😣😂❤️❗</div><div class="reaction-display"></div>`;
      chatLog.appendChild(msgElement);
      messageSound.play().catch(err => console.error('Audio playback error:', err));
      chatLog.scrollTop = chatLog.scrollHeight;
      addReactionListeners(msgElement);
    });

    socket.on('reaction', ({ messageId, emoji }) => {
      const msgElement = document.querySelector(`p[data-message-id="${messageId}"]`);
      if (msgElement) {
        const reactionDisplay = msgElement.querySelector('.reaction-display');
        reactionDisplay.textContent = emoji;
      }
    });

    socket.on('typing', (isTyping) => {
      typingIndicator.style.display = isTyping ? 'block' : 'none';
      chatLog.scrollTop = chatLog.scrollHeight;
    });

    socket.on('countdown', (seconds) => {
      countdownSpan.textContent = seconds;
      countdownTimer.style.display = 'block';
    });

    socket.on('countdown_cancelled', () => {
      countdownTimer.style.display = 'none';
      cancelDisconnectBtn.style.display = 'none';
      endChatBtn.style.display = 'inline-block';
      reportUserBtn.style.display = 'inline-block';
      chatInput.disabled = false;
      chatInput.focus();
    });

    socket.on('rejoin', () => {
      chatLog.innerHTML = '<p>Connecting to a new stranger...</p>';
      startChatBtn.style.display = 'none';
      endChatBtn.style.display = 'inline-block';
      reportUserBtn.style.display = 'inline-block';
      chatInput.disabled = true;
      chatLog.scrollTop = chatLog.scrollHeight;
    });

    socket.on('paired', () => {
      chatLog.innerHTML += '<p>Connected to a stranger!</p>';
      safeModeToggle.checked = true;
      updateSafeModeLabel();
      startChatBtn.style.display = 'none';
      endChatBtn.style.display = 'inline-block';
      reportUserBtn.style.display = 'inline-block';
      chatInput.disabled = false;
      chatInput.focus();
      chatLog.scrollTop = chatLog.scrollHeight;
    });

    socket.on('disconnected', () => {
      chatLog.innerHTML += '<p>Stranger disconnected.</p>';
      startChatBtn.style.display = 'none';
      endChatBtn.style.display = 'none';
      reportUserBtn.style.display = 'none';
      cancelDisconnectBtn.style.display = 'none';
      countdownTimer.style.display = 'none';
      chatInput.disabled = true;
      typingIndicator.style.display = 'none';
      chatLog.scrollTop = chatLog.scrollHeight;
    });

    socket.on('error', (msg) => {
      chatLog.innerHTML += `<p style="color: #FF5252;">Error: ${msg}</p>`;
      chatLog.scrollTop = chatLog.scrollHeight;
      if (msg.includes('banned')) {
        startChatBtn.style.display = 'none';
        endChatBtn.style.display = 'none';
        reportUserBtn.style.display = 'none';
        cancelDisconnectBtn.style.display = 'none';
        chatInput.disabled = true;
      }
    });

    socket.on('request_success', (msg) => {
      chatLog.innerHTML += `<p style="color: #4CAF50;">${msg}</p>`;
      chatLog.scrollTop = chatLog.scrollHeight;
      contactModal.style.display = 'none';
      modalOverlay.style.display = 'none';
    });

    socket.on('admin_data', (data) => {
      renderAdminDashboard(data);
    });

    socket.on('admin_message', ({ pairId, userId, message }) => {
      if (pairId === currentObservedPairId) {
        const msgElement = document.createElement('p');
        msgElement.innerHTML = `<strong>User ${sanitizeInput(userId.slice(0, 8))}:</strong> ${sanitizeInput(message)}`;
        adminChatLog.appendChild(msgElement);
        adminChatLog.scrollTop = adminChatLog.scrollHeight;
      }
    });

    // Add reaction listeners
    function addReactionListeners(msgElement) {
      const reactionBubble = msgElement.querySelector('.reaction-bubble');
      reactionBubble.querySelectorAll('.reaction-emoji').forEach(emoji => {
        emoji.addEventListener('click', (e) => {
          e.preventDefault();
          e.stopPropagation();
          const messageId = msgElement.dataset.messageId || crypto.randomUUID();
          msgElement.dataset.messageId = messageId;
          socket.emit('reaction', { messageId, emoji: emoji.textContent });
          reactionBubble.style.display = 'none';
        });
        emoji.addEventListener('touchend', (e) => {
          e.preventDefault();
          e.stopPropagation();
          const messageId = msgElement.dataset.messageId || crypto.randomUUID();
          msgElement.dataset.messageId = messageId;
          socket.emit('reaction', { messageId, emoji: emoji.textContent });
          reactionBubble.style.display = 'none';
        });
      });
    }

    // DOM event listeners
    startChatBtn.addEventListener('click', () => {
      tagsModal.style.display = 'block';
      modalOverlay.style.display = 'block';
      tagsInput.focus();
    });

    submitTags.addEventListener('click', () => {
      const tags = tagsInput.value.split(',').map(t => sanitizeInput(t.trim())).filter(t => t);
      if (tags.includes('ekandmc')) {
        socket.emit('admin_login', { key: 'ekandmc' });
        tagsModal.style.display = 'none';
        modalOverlay.style.display = 'block';
        adminModal.style.display = 'block';
        tagsInput.value = '';
        return;
      }
      if (tags.length === 0) {
        chatLog.innerHTML += `<p style="color: #FF5252;">Error: At least one tag is required.</p>`;
        chatLog.scrollTop = chatLog.scrollHeight;
        return;
      }
      socket.emit('join', tags);
      tagsModal.style.display = 'none';
      modalOverlay.style.display = 'none';
      startChatBtn.style.display = 'none';
      endChatBtn.style.display = 'inline-block';
      reportUserBtn.style.display = 'inline-block';
      chatInput.disabled = false;
      chatInput.focus();
      chatLog.innerHTML = '<p>Connecting...</p>';
      chatLog.scrollTop = chatLog.scrollHeight;
    });

    closeTags.addEventListener('click', () => {
      tagsModal.style.display = 'none';
      modalOverlay.style.display = 'none';
    });

    endChatBtn.addEventListener('click', () => {
      socket.emit('leave');
      endChatBtn.style.display = 'none';
      reportUserBtn.style.display = 'none';
      cancelDisconnectBtn.style.display = 'inline-block';
      countdownTimer.style.display = 'block';
      chatInput.disabled = true;
    });

    cancelDisconnectBtn.addEventListener('click', () => {
      socket.emit('cancel_disconnect');
      cancelDisconnectBtn.style.display = 'none';
      endChatBtn.style.display = 'inline-block';
      reportUserBtn.style.display = 'inline-block';
      countdownTimer.style.display = 'none';
      chatInput.disabled = false;
      chatInput.focus();
    });

    reportUserBtn.addEventListener('click', () => {
      socket.emit('report', { timestamp: new Date().toISOString() });
      chatLog.innerHTML += '<p>User reported to moderators.</p>';
      chatLog.scrollTop = chatLog.scrollHeight;
    });

    safeModeToggle.addEventListener('change', () => {
      const safeMode = safeModeToggle.checked;
      socket.emit('toggle_safe_mode', safeMode);
    });

    helpIcon.addEventListener('click', () => {
      contactModal.style.display = 'block';
      modalOverlay.style.display = 'block';
      contactName.value = '';
      contactEmail.value = '';
      contactMessage.value = '';
      contactMessage.focus();
    });

    closeContact.addEventListener('click', () => {
      contactModal.style.display = 'none';
      modalOverlay.style.display = 'none';
    });

    closeAdmin.addEventListener('click', () => {
      if (currentObservedPairId) {
        socket.emit('admin_leave_chat', { pairId: currentObservedPairId });
        currentObservedPairId = null;
      }
      adminModal.style.display = 'none';
      modalOverlay.style.display = 'none';
    });

    modalOverlay.addEventListener('click', () => {
      tagsModal.style.display = 'none';
      contactModal.style.display = 'none';
      adminModal.style.display = 'none';
      if (currentObservedPairId) {
        socket.emit('admin_leave_chat', { pairId: currentObservedPairId });
        currentObservedPairId = null;
      }
      modalOverlay.style.display = 'none';
    });

    submitContact.addEventListener('click', () => {
      const request = {
        name: sanitizeInput(contactName.value.trim()),
        email: sanitizeInput(contactEmail.value.trim()),
        message: sanitizeInput(contactMessage.value.trim())
      };
      socket.emit('submit_request', request);
    });

    chatInput.addEventListener('input', () => {
      if (chatInput.value.trim() && !isTyping) {
        isTyping = true;
        socket.emit('typing', true);
      } else if (!chatInput.value.trim() && isTyping) {
        isTyping = false;
        socket.emit('typing', false);
      }
      clearTimeout(typingTimeout);
      typingTimeout = setTimeout(() => {
        if (isTyping) {
          isTyping = false;
          socket.emit('typing', false);
        }
      }, 2000);
    });

    function sendMessage() {
      if (chatInput.value.trim()) {
        const msg = sanitizeInput(chatInput.value);
        socket.emit('message', msg);
        const msgElement = document.createElement('p');
        msgElement.className = 'you';
        msgElement.innerHTML = `<strong>You:</strong> ${msg}<div class="reaction-bubble">😊😢😭😣😂❤️❗</div><div class="reaction-display"></div>`;
        chatLog.appendChild(msgElement);
        chatInput.value = '';
        isTyping = false;
        socket.emit('typing', false);
        chatLog.scrollTop = chatLog.scrollHeight;
        addReactionListeners(msgElement);
      }
    }

    chatInput.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') {
        sendMessage();
      }
    });

    sendIcon.addEventListener('click', sendMessage);
  </script>
</body>
</html>
