<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>NightHub - Chat</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
    }
    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(to bottom, #F5F5F7, #E5E5EA);
      color: #1C2526;
      min-height: 100dvh;
      display: flex;
      overflow: hidden;
      position: relative;
      perspective: 500px;
    }
    #particle-canvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -1;
      pointer-events: none;
      opacity: 0.2;
    }
    #sidebar {
      width: 250px;
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(5px);
      height: 100dvh;
      position: fixed;
      left: 0;
      top: 0;
      display: flex;
      flex-direction: column;
      padding: 1rem;
      z-index: 100;
      box-shadow: 2px 0 5px rgba(0, 0, 0, 0.1);
      transform: translateZ(20px);
    }
    #mobile-menu {
      display: none;
    }
    #hamburger {
      display: none;
    }
    #mobile-menu-content {
      display: none;
      position: fixed;
      top: 0;
      right: 0;
      width: 50%;
      height: 100dvh;
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(5px);
      z-index: 101;
      flex-direction: column;
      padding: 1rem;
      transform: translateZ(20px);
      transition: transform 0.3s ease;
    }
    #mobile-menu-content.active {
      transform: translateX(0);
    }
    #logo {
      font-size: 1.5rem;
      font-weight: 700;
      color: #007AFF;
      margin-bottom: 2rem;
      transform: translateZ(10px);
    }
    .menu-item {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.75rem;
      font-size: 1rem;
      font-weight: 500;
      color: #1C2526;
      text-decoration: none;
      border-radius: 8px;
      margin-bottom: 0.5rem;
      transition: all 0.3s ease;
      transform: translateZ(10px);
    }
    .menu-item:hover {
      background: rgba(0, 122, 255, 0.1);
      color: #007AFF;
      transform: translateZ(15px);
    }
    .menu-item.active {
      background: #007AFF;
      color: #FFFFFF;
    }
    .menu-item.bottom {
      margin-top: auto;
    }
    #content {
      flex: 1;
      margin-left: 250px;
      padding: 1rem;
      display: flex;
      flex-direction: column;
      transform: translateZ(5px);
    }
    #chat-container {
      flex: 1;
      display: none;
      flex-direction: column;
      max-width: 600px;
      margin: 0 auto;
      transform: translateZ(5px);
    }
    #loading-container {
      flex: 1;
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      transform: translateZ(5px);
    }
    #loading-circle {
      width: 60px;
      height: 60px;
      border-radius: 50%;
      background: #007AFF;
      animation: pulse 1.5s infinite;
      box-shadow: 0 0 20px rgba(0, 122, 255, 0.5);
      transform: translateZ(10px);
    }
    @keyframes pulse {
      0% { transform: scale(1) translateZ(10px); opacity: 1; }
      100% { transform: scale(1.5) translateZ(10px); opacity: 0.3; }
    }
    #loading-text {
      margin-top: 1rem;
      font-size: 1.2rem;
      color: #007AFF;
      font-weight: 500;
      transform: translateZ(5px);
    }
    #chat-log {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 0.3rem;
      overflow-y: auto;
      padding: 0.5rem;
      background: rgba(255, 255, 255, 0.95);
      border-radius: 12px;
      margin-bottom: 0.5rem;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
      scrollbar-width: thin;
      transform: translateZ(5px);
    }
    #chat-log::-webkit-scrollbar {
      width: 6px;
    }
    #chat-log::-webkit-scrollbar-thumb {
      background: rgba(0, 122, 255, 0.3);
      border-radius: 3px;
    }
    #chat-log p {
      margin: 0;
      padding: 0.5rem 0.8rem;
      border-radius: 12px;
      font-size: 0.9rem;
      max-width: 80%;
      word-wrap: break-word;
      transition: transform 0.3s ease;
      transform: translateZ(5px);
      animation: fadeInBubble 0.3s ease;
    }
    #chat-log p:hover {
      transform: translateZ(10px);
    }
    @keyframes fadeInBubble {
      from { opacity: 0; transform: translateZ(0); }
      to { opacity: 1; transform: translateZ(5px); }
    }
    #chat-log .you {
      background: #34C759;
      color: #FFFFFF;
      margin-left: auto;
      box-shadow: 0 0 5px rgba(52, 199, 89, 0.3);
    }
    #chat-log .stranger {
      background: #007AFF;
      color: #FFFFFF;
      margin-right: auto;
      box-shadow: 0 0 5px rgba(0, 122, 255, 0.3);
    }
    #chat-input-container {
      display: flex;
      align-items: center;
      padding: 0.5rem;
      background: rgba(255, 255, 255, 0.95);
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
      transform: translateZ(5px);
    }
    #chat-input {
      flex: 1;
      padding: 0.75rem;
      border: 1px solid #D1D1D6;
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.8);
      color: #1C2526;
      font-size: 0.95rem;
      transition: all 0.3s ease;
      transform: translateZ(5px);
    }
    #chat-input:focus {
      outline: none;
      border-color: #007AFF;
      box-shadow: 0 0 10px rgba(0, 122, 255, 0.3);
      transform: translateZ(10px);
    }
    #send-icon {
      width: 40px;
      height: 40px;
      display: flex;
      justify-content: center;
      align-items: center;
      border-radius: 50%;
      background: #007AFF;
      cursor: pointer;
      margin-left: 0.5rem;
      transition: all 0.3s ease;
      box-shadow: 0 0 10px rgba(0, 122, 255, 0.3);
      transform: translateZ(5px);
    }
    #send-icon:hover {
      transform: translateZ(10px);
      box-shadow: 0 0 15px rgba(0, 122, 255, 0.5);
    }
    #control-buttons {
      display: flex;
      gap: 0.5rem;
      margin-top: 0.5rem;
      justify-content: center;
      transform: translateZ(5px);
    }
    .control-button {
      padding: 0.75rem 1.5rem;
      border: none;
      border-radius: 12px;
      font-size: 0.95rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.3s ease;
      transform: translateZ(5px);
    }
    #end-chat {
      background: #FF3B30;
      color: #FFFFFF;
    }
    #start-video {
      background: #007AFF;
      color: #FFFFFF;
    }
    .control-button:hover {
      transform: translateZ(10px);
      box-shadow: 0 0 15px rgba(0, 0, 0, 0.3);
    }
    #modal-overlay {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.3);
      z-index: 999;
      animation: fadeInOverlay 0.3s ease;
    }
    @keyframes fadeInOverlay {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    #age-modal, #tags-modal {
      display: none;
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) translateZ(20px);
      width: 90%;
      max-width: 500px;
      background: rgba(255, 255, 255, 0.95);
      border-radius: 16px;
      padding: 1.5rem;
      box-shadow: 0 8px 40px rgba(0, 0, 0, 0.15);
      z-index: 1000;
      animation: popIn 0.4s ease-out;
      max-height: 90vh;
      overflow-y: auto;
    }
    @keyframes popIn {
      from { transform: translate(-50%, -50%) translateZ(0) scale(0.95); opacity: 0; }
      to { transform: translate(-50%, -50%) translateZ(20px) scale(1); opacity: 1; }
    }
    #age-modal h2, #tags-modal h2 {
      font-size: 1.2rem;
      color: #007AFF;
      text-align: center;
      font-weight: 600;
      margin-bottom: 1rem;
      transform: translateZ(10px);
    }
    #age-form, #tags-form {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }
    #tags-form input, #age-form p {
      padding: 0.75rem;
      border: 1px solid #D1D1D6;
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.8);
      color: #1C2526;
      font-size: 0.95rem;
      transition: all 0.3s ease;
      transform: translateZ(5px);
    }
    #tags-form input:focus {
      outline: none;
      border-color: #007AFF;
      box-shadow: 0 0 10px rgba(0, 122, 255, 0.3);
      transform: translateZ(10px);
    }
    #tags-form button, #age-form button {
      padding: 0.75rem;
      border: none;
      border-radius: 12px;
      background: #007AFF;
      color: #FFFFFF;
      font-size: 0.95rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.3s ease;
      transform: translateZ(5px);
    }
    #tags-form button:hover, #age-form button:hover {
      transform: translateZ(10px);
      box-shadow: 0 0 15px rgba(0, 122, 255, 0.5);
    }
    #tags-form .close-button, #age-form .close-button {
      background: #FF3B30;
      box-shadow: 0 0 10px rgba(255, 59, 48, 0.3);
    }
    #tags-form .close-button:hover, #age-form .close-button:hover {
      box-shadow: 0 0 15px rgba(255, 59, 48, 0.5);
    }
    #trending-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      margin-bottom: 1rem;
    }
    .trending-tag {
      padding: 0.5rem 1rem;
      border-radius: 12px;
      background: rgba(0, 122, 255, 0.1);
      color: #007AFF;
      font-size: 0.85rem;
      cursor: pointer;
      transition: all 0.3s ease;
      transform: translateZ(5px);
    }
    .trending-tag:hover {
      transform: translateZ(10px);
      box-shadow: 0 0 10px rgba(0, 122, 255, 0.3);
    }
    @media (max-width: 768px) {
      #sidebar {
        display: none;
      }
      #mobile-menu {
        display: flex;
        justify-content: space-between;
        align-items: center;
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(5px);
        padding: 0.5rem 1rem;
        z-index: 100;
        box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
        transform: translateZ(20px);
      }
      #hamburger {
        display: block;
        width: 30px;
        height: 30px;
        cursor: pointer;
        transform: translateZ(10px);
      }
      #mobile-menu-content {
        display: flex;
        transform: translateX(100%);
      }
      #content {
        margin-left: 0;
        padding: 1rem;
      }
      #chat-log {
        max-height: 70vh;
      }
      #chat-log p {
        font-size: 0.85rem;
        padding: 0.4rem 0.7rem;
      }
      #chat-input {
        font-size: 0.9rem;
        padding: 0.6rem;
      }
      #send-icon {
        width: 36px;
        height: 36px;
      }
      .control-button {
        font-size: 0.9rem;
        padding: 0.6rem 1.2rem;
      }
      #age-modal, #tags-modal {
        width: 95%;
        padding: 1rem;
      }
    }
    @media (max-width: 480px) {
      #chat-log {
        max-height: 60vh;
      }
      #chat-log p {
        font-size: 0.8rem;
        padding: 0.3rem 0.6rem;
      }
      #chat-input {
        font-size: 0.85rem;
        padding: 0.5rem;
      }
      #send-icon {
        width: 32px;
        height: 32px;
      }
      .control-button {
        font-size: 0.85rem;
        padding: 0.5rem 1rem;
      }
      #age-modal, #tags-modal {
        width: 100%;
        border-radius: 0;
      }
    }
  </style>
</head>

          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#FFFFFF" stroke-width="2">
            <line x1="22" y1="2" x2="11" y2="13"></line>
            <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
          </svg>
        </div>
      </div>
      <div id="control-buttons">
        <button id="end-chat" class="control-button">End Chat</button>
        <button id="start-video" class="control-button">Start Video</button>
      </div>
    </div>
  </div>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.5/socket.io.min.js"></script>
  <script>
    // Particle background
    const canvas = document.getElementById('particle-canvas');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    const particles = [];
    const particleCount = 50;

    class Particle {
      constructor() {
        this.x = Math.random() * canvas.width;
        this.y = Math.random() * canvas.height;
        this.size = Math.random() * 2 + 1;
        this.speedX = Math.random() * 0.2 - 0.1;
        this.speedY = Math.random() * 0.2 - 0.1;
        this.opacity = Math.random() * 0.3 + 0.2;
      }
      update() {
        this.x += this.speedX;
        this.y += this.speedY;
        if (this.x < 0 || this.x > canvas.width) this.speedX *= -1;
        if (this.y < 0 || this.y > canvas.height) this.speedY *= -1;
      }
      draw() {
        ctx.fillStyle = `rgba(0, 122, 255, ${this.opacity})`;
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        ctx.fill();
      }
    }

    function initParticles() {
      for (let i = 0; i < particleCount; i++) {
        particles.push(new Particle());
      }
    }

    function animateParticles() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      particles.forEach(particle => {
        particle.update();
        particle.draw();
      });
      requestAnimationFrame(animateParticles);
    }

    window.addEventListener('resize', () => {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    });

    initParticles();
    animateParticles();

    // Socket.IO connection
    const socket = io('https://nighthub-backend.onrender.com', {
      transports: ['websocket'],
      reconnectionAttempts: 5
    });

    // DOM elements
    const modalOverlay = document.getElementById('modal-overlay');
    const ageModal = document.getElementById('age-modal');
    const confirmAge = document.getElementById('confirm-age');
    const closeAge = document.getElementById('close-age');
    const tagsModal = document.getElementById('tags-modal');
    const tagsInput = document.getElementById('tags-input');
    const submitTags = document.getElementById('submit-tags');
    const closeTags = document.getElementById('close-tags');
    const trendingTags = document.getElementById('trending-tags');
    const chatContainer = document.getElementById('chat-container');
    const loadingContainer = document.getElementById('loading-container');
    const chatLog = document.getElementById('chat-log');
    const chatInput = document.getElementById('chat-input');
    const sendIcon = document.getElementById('send-icon');
    const endChat = document.getElementById('end-chat');
    const startVideo = document.getElementById('start-video');
    const hamburger = document.getElementById('hamburger');
    const mobileMenuContent = document.getElementById('mobile-menu-content');

    // State
    let pairId = null;
    let messageHistory = [];

    // Chat log management
    function updateChatLog() {
      chatLog.innerHTML = '';
      if (messageHistory.length === 0) return;
      messageHistory.forEach(msg => {
        const p = document.createElement('p');
        p.className = msg.sender === 'you' ? 'you' : 'stranger';
        p.textContent = msg.text;
        chatLog.appendChild(p);
      });
      chatLog.scrollTop = chatLog.scrollHeight;
    }

    // End chat handler
    function endChatHandler() {
      messageHistory = [];
      updateChatLog();
      chatContainer.style.display = 'none';
      loadingContainer.style.display = 'flex';
      socket.emit('leave');
      socket.emit('start_random_chat');
    }

    // Socket.IO event handlers
    socket.on('connect', () => {
      console.log('Connected to backend');
      ageModal.style.display = 'block';
      modalOverlay.style.display = 'block';
    });

    socket.on('paired', (newPairId) => {
      pairId = newPairId;
      chatContainer.style.display = 'flex';
      loadingContainer.style.display = 'none';
      new Audio('/assets/Notification.mp3').play();
    });

    socket.on('waiting_for_pair', () => {
      loadingContainer.style.display = 'flex';
    });

    socket.on('start_chat', (newPairId) => {
      pairId = newPairId;
      chatContainer.style.display = 'flex';
      loadingContainer.style.display = 'none';
    });

    socket.on('message', (msg) => {
      messageHistory.push({ sender: 'stranger', text: msg });
      updateChatLog();
      new Audio('/assets/Notification.mp3').play();
    });

    socket.on('disconnected', () => {
      endChatHandler();
    });

    socket.on('trending_tags', (tags) => {
      trendingTags.innerHTML = '';
      tags.forEach(tag => {
        const span = document.createElement('span');
        span.className = 'trending-tag';
        span.textContent = tag;
        span.addEventListener('click', () => {
          const currentTags = tagsInput.value.split(',').map(t => t.trim()).filter(t => t);
          if (!currentTags.includes(tag)) {
            tagsInput.value = [...currentTags, tag].join(', ');
          }
        });
        trendingTags.appendChild(span);
      });
    });

    socket.on('error', (msg) => {
      alert(`Error: ${msg}`);
      endChatHandler();
    });

    socket.on('announcement', (text) => {
      alert(`Announcement: ${text}`);
    });

    // DOM event listeners
    confirmAge.addEventListener('click', () => {
      ageModal.style.display = 'none';
      modalOverlay.style.display = 'none';
      const urlParams = new URLSearchParams(window.location.search);
      const pairIdFromUrl = urlParams.get('pairId');
      if (pairIdFromUrl) {
        pairId = pairIdFromUrl;
        socket.emit('start_chat', { pairId });
      } else {
        tagsModal.style.display = 'block';
        modalOverlay.style.display = 'block';
        socket.emit('get_trending_tags');
      }
    });

    closeAge.addEventListener('click', () => {
      window.location.href = 'https://www.example.com';
    });

    submitTags.addEventListener('click', () => {
      const tags = tagsInput.value.split(',').map(tag => tag.trim()).filter(tag => tag);
      if (tags.length > 0) {
        socket.emit('join', tags);
        socket.emit('start_random_chat');
        tagsModal.style.display = 'none';
        modalOverlay.style.display = 'none';
      } else {
        alert('Please enter at least one tag');
      }
    });

    closeTags.addEventListener('click', () => {
      tagsModal.style.display = 'none';
      modalOverlay.style.display = 'none';
      window.location.href = 'https://www.example.com';
    });

    modalOverlay.addEventListener('click', () => {
      ageModal.style.display = 'none';
      tagsModal.style.display = 'none';
      modalOverlay.style.display = 'none';
      mobileMenuContent.classList.remove('active');
    });

    sendIcon.addEventListener('click', () => {
      if (chatInput.value.trim()) {
        socket.emit('message', chatInput.value);
        messageHistory.push({ sender: 'you', text: chatInput.value });
        updateChatLog();
        chatInput.value = '';
      }
    });

    chatInput.addEventListener('keypress', (e) => {
      if (e.key === 'Enter' && chatInput.value.trim()) {
        socket.emit('message', chatInput.value);
        messageHistory.push({ sender: 'you', text: chatInput.value });
        updateChatLog();
        chatInput.value = '';
      }
    });

    endChat.addEventListener('click', endChatHandler);

    startVideo.addEventListener('click', () => {
      window.location.href = `video.html?pairId=${pairId}`;
    });

    hamburger.addEventListener('click', () => {
      mobileMenuContent.classList.toggle('active');
    });
  </script>
</body>
</html>
