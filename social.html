<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>NightHub - Social</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
    }
    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(to bottom, #F5F5F7, #E5E5EA);
      color: #1C2526;
      min-height: 100dvh;
      display: flex;
      overflow: hidden;
      position: relative;
      perspective: 500px;
    }
    #particle-canvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -1;
      pointer-events: none;
      opacity: 0.2;
    }
    #sidebar {
      width: 250px;
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(5px);
      height: 100dvh;
      position: fixed;
      left: 0;
      top: 0;
      display: flex;
      flex-direction: column;
      padding: 1rem;
      z-index: 100;
      box-shadow: 2px 0 5px rgba(0, 0, 0, 0.1);
      transform: translateZ(20px);
    }
    #mobile-menu {
      display: none;
    }
    #hamburger {
      display: none;
    }
    #mobile-menu-content {
      display: none;
      position: fixed;
      top: 0;
      right: 0;
      width: 50%;
      height: 100dvh;
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(5px);
      z-index: 101;
      flex-direction: column;
      padding: 1rem;
      transform: translateZ(20px);
      transition: transform 0.3s ease;
    }
    #mobile-menu-content.active {
      transform: translateX(0);
    }
    #logo {
      font-size: 1.5rem;
      font-weight: 700;
      color: #007AFF;
      margin-bottom: 2rem;
      transform: translateZ(10px);
    }
    .menu-item {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.75rem;
      font-size: 1rem;
      font-weight: 500;
      color: #1C2526;
      text-decoration: none;
      border-radius: 8px;
      margin-bottom: 0.5rem;
      transition: all 0.3s ease;
      transform: translateZ(10px);
    }
    .menu-item:hover {
      background: rgba(0, 122, 255, 0.1);
      color: #007AFF;
      transform: translateZ(15px);
    }
    .menu-item.active {
      background: #007AFF;
      color: #FFFFFF;
    }
    .menu-item.bottom {
      margin-top: auto;
    }
    #content {
      flex: 1;
      margin-left: 250px;
      padding: 1rem;
      display: flex;
      flex-direction: column;
      transform: translateZ(5px);
    }
    #social-container {
      flex: 1;
      max-width: 600px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      transform: translateZ(5px);
    }
    #tabs {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 1rem;
      transform: translateZ(10px);
    }
    .tab {
      padding: 0.5rem 1rem;
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.95);
      color: #1C2526;
      font-size: 0.95rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.3s ease;
      transform: translateZ(5px);
    }
    .tab:hover {
      transform: translateZ(10px);
      box-shadow: 0 0 10px rgba(0, 122, 255, 0.3);
    }
    .tab.active {
      background: #007AFF;
      color: #FFFFFF;
      transform: translateZ(10px);
    }
    #post-input-container {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      margin-bottom: 1rem;
      padding: 0.5rem;
      background: rgba(255, 255, 255, 0.95);
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
      transform: translateZ(5px);
    }
    #post-input {
      padding: 0.75rem;
      border: 1px solid #D1D1D6;
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.8);
      color: #1C2526;
      font-size: 0.95rem;
      resize: none;
      transition: all 0.3s ease;
      transform: translateZ(5px);
    }
    #post-input:focus {
      outline: none;
      border-color: #007AFF;
      box-shadow: 0 0 10px rgba(0, 122, 255, 0.3);
      transform: translateZ(10px);
    }
    #post-button {
      padding: 0.75rem;
      border: none;
      border-radius: 12px;
      background: #007AFF;
      color: #FFFFFF;
      font-size: 0.95rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.3s ease;
      transform: translateZ(5px);
    }
    #post-button:hover {
      transform: translateZ(10px);
      box-shadow: 0 0 15px rgba(0, 122, 255, 0.5);
    }
    #posts {
      flex: 1;
      overflow-y: auto;
      scrollbar-width: thin;
      transform: translateZ(5px);
    }
    #posts::-webkit-scrollbar {
      width: 6px;
    }
    #posts::-webkit-scrollbar-thumb {
      background: rgba(0, 122, 255, 0.3);
      border-radius: 3px;
    }
    .post {
      background: rgba(255, 255, 255, 0.95);
      border-radius: 12px;
      padding: 0.75rem;
      margin-bottom: 0.5rem;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
      transform: translateZ(5px);
      transition: transform 0.3s ease;
    }
    .post:hover {
      transform: translateZ(10px);
    }
    .post-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 0.5rem;
      transform: translateZ(5px);
    }
    .post-anonymous-id {
      font-size: 0.85rem;
      color: #007AFF;
      font-weight: 500;
    }
    .post-time {
      font-size: 0.8rem;
      color: #8E8E93;
    }
    .post-content {
      font-size: 0.95rem;
      color: #1C2526;
      margin-bottom: 0.5rem;
      word-wrap: break-word;
      transform: translateZ(5px);
    }
    .post-content a {
      color: #007AFF;
      text-decoration: none;
    }
    .post-content a:hover {
      text-decoration: underline;
    }
    .post-actions {
      display: flex;
      gap: 0.5rem;
      transform: translateZ(5px);
    }
    .action-button {
      display: flex;
      align-items: center;
      gap: 0.3rem;
      padding: 0.5rem;
      border-radius: 8px;
      background: rgba(0, 122, 255, 0.1);
      color: #007AFF;
      font-size: 0.85rem;
      cursor: pointer;
      transition: all 0.3s ease;
      transform: translateZ(5px);
    }
    .action-button:hover {
      background: rgba(0, 122, 255, 0.2);
      transform: translateZ(10px);
    }
    .comment-section {
      margin-top: 0.5rem;
      padding-left: 1rem;
      transform: translateZ(5px);
    }
    .comment-input-container {
      display: flex;
      gap: 0.5rem;
      margin-top: 0.5rem;
      transform: translateZ(5px);
    }
    .comment-input {
      flex: 1;
      padding: 0.5rem;
      border: 1px solid #D1D1D6;
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.8);
      color: #1C2526;
      font-size: 0.9rem;
      transition: all 0.3s ease;
      transform: translateZ(5px);
    }
    .comment-input:focus {
      outline: none;
      border-color: #007AFF;
      box-shadow: 0 0 10px rgba(0, 122, 255, 0.3);
      transform: translateZ(10px);
    }
    .comment-button {
      padding: 0.5rem 1rem;
      border: none;
      border-radius: 12px;
      background: #007AFF;
      color: #FFFFFF;
      font-size: 0.9rem;
      cursor: pointer;
      transition: all 0.3s ease;
      transform: translateZ(5px);
    }
    .comment-button:hover {
      transform: translateZ(10px);
      box-shadow: 0 0 15px rgba(0, 122, 255, 0.5);
    }
    .comment {
      background: rgba(255, 255, 255, 0.8);
      border-radius: 12px;
      padding: 0.5rem;
      margin-bottom: 0.3rem;
      transform: translateZ(5px);
      transition: transform 0.3s ease;
    }
    .comment:hover {
      transform: translateZ(10px);
    }
    .comment-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 0.8rem;
      margin-bottom: 0.3rem;
      transform: translateZ(5px);
    }
    .comment-anonymous-id {
      color: #007AFF;
      font-weight: 500;
    }
    .comment-time {
      color: #8E8E93;
    }
    .comment-content {
      font-size: 0.9rem;
      color: #1C2526;
      transform: translateZ(5px);
    }
    .comment-actions {
      display: flex;
      gap: 0.3rem;
      margin-top: 0.3rem;
      transform: translateZ(5px);
    }
    #modal-overlay {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.3);
      z-index: 999;
      animation: fadeInOverlay 0.3s ease;
    }
    @keyframes fadeInOverlay {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    #age-modal {
      display: none;
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) translateZ(20px);
      width: 90%;
      max-width: 500px;
      background: rgba(255, 255, 255, 0.95);
      border-radius: 16px;
      padding: 1.5rem;
      box-shadow: 0 8px 40px rgba(0, 0, 0, 0.15);
      z-index: 1000;
      animation: popIn 0.4s ease-out;
    }
    @keyframes popIn {
      from { transform: translate(-50%, -50%) translateZ(0) scale(0.95); opacity: 0; }
      to { transform: translate(-50%, -50%) translateZ(20px) scale(1); opacity: 1; }
    }
    #age-modal h2 {
      font-size: 1.2rem;
      color: #007AFF;
      text-align: center;
      font-weight: 600;
      margin-bottom: 1rem;
      transform: translateZ(10px);
    }
    #age-form {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }
    #age-form p {
      padding: 0.75rem;
      border: 1px solid #D1D1D6;
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.8);
      color: #1C2526;
      font-size: 0.95rem;
      transform: translateZ(5px);
    }
    #age-form button {
      padding: 0.75rem;
      border: none;
      border-radius: 12px;
      background: #007AFF;
      color: #FFFFFF;
      font-size: 0.95rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.3s ease;
      transform: translateZ(5px);
    }
    #age-form button:hover {
      transform: translateZ(10px);
      box-shadow: 0 0 15px rgba(0, 122, 255, 0.5);
    }
    #age-form .close-button {
      background: #FF3B30;
      box-shadow: 0 0 10px rgba(255, 59, 48, 0.3);
    }
    #age-form .close-button:hover {
      box-shadow: 0 0 15px rgba(255, 59, 48, 0.5);
    }
    @media (max-width: 768px) {
      #sidebar {
        display: none;
      }
      #mobile-menu {
        display: flex;
        justify-content: space-between;
        align-items: center;
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(5px);
        padding: 0.5rem 1rem;
        z-index: 100;
        box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
        transform: translateZ(20px);
      }
      #hamburger {
        display: block;
        width: 30px;
        height: 30px;
        cursor: pointer;
        transform: translateZ(10px);
      }
      #mobile-menu-content {
        display: flex;
        transform: translateX(100%);
      }
      #content {
        margin-left: 0;
        padding: 1rem;
      }
      #social-container {
        max-width: 100%;
      }
      .post {
        padding: 0.6rem;
      }
      .post-content {
        font-size: 0.9rem;
      }
      .post-anonymous-id {
        font-size: 0.8rem;
      }
      .post-time {
        font-size: 0.75rem;
      }
      .action-button {
        font-size: 0.8rem;
        padding: 0.4rem;
      }
      .comment {
        padding: 0.4rem;
      }
      .comment-content {
        font-size: 0.85rem;
      }
      .comment-anonymous-id {
        font-size: 0.75rem;
      }
      .comment-time {
        font-size: 0.7rem;
      }
      #post-input {
        font-size: 0.9rem;
        padding: 0.6rem;
      }
      #post-button {
        font-size: 0.9rem;
        padding: 0.6rem;
      }
      .comment-input {
        font-size: 0.85rem;
        padding: 0.4rem;
      }
      .comment-button {
        font-size: 0.85rem;
        padding: 0.4rem 0.8rem;
      }
      #age-modal {
        width: 95%;
        padding: 1rem;
      }
    }
    @media (max-width: 480px) {
      .post {
        padding: 0.5rem;
      }
      .post-content {
        font-size: 0.85rem;
      }
      .post-anonymous-id {
        font-size: 0.75rem;
      }
      .post-time {
        font-size: 0.7rem;
      }
      .action-button {
        font-size: 0.75rem;
        padding: 0.3rem;
      }
      .comment {
        padding: 0.3rem;
      }
      .comment-content {
        font-size: 0.8rem;
      }
      .comment-anonymous-id {
        font-size: 0.7rem;
      }
      .comment-time {
        font-size: 0.65rem;
      }
      #post-input {
        font-size: 0.85rem;
        padding: 0.5rem;
      }
      #post-button {
        font-size: 0.85rem;
        padding: 0.5rem;
      }
      .comment-input {
        font-size: 0.8rem;
        padding: 0.3rem;
      }
      .comment-button {
        font-size: 0.8rem;
        padding: 0.3rem 0.6rem;
      }
      #age-modal {
        width: 100%;
        border-radius: 0;
      }
    }
  </style>
</head>

      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#1C2526" stroke-width="2">
        <circle cx="12" cy="12" r="3"></circle>
        <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l-.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l-.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
      </svg>
      Settings
    </a>
  </div>
  <div id="content">
    <div id="social-container">
      <div id="tabs">
        <div class="tab active" data-tab="trending">Trending</div>
        <div class="tab" data-tab="randos">Randos</div>
        <div class="tab" data-tab="new">New</div>
      </div>
      <div id="post-input-container">
        <textarea id="post-input" placeholder="What's on your mind?" rows="3"></textarea>
        <button id="post-button">Post</button>
      </div>
      <div id="posts"></div>
    </div>
  </div>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.5/socket.io.min.js"></script>
  <script>
    // Particle background
    const canvas = document.getElementById('particle-canvas');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    const particles = [];
    const particleCount = 50;

    class Particle {
      constructor() {
        this.x = Math.random() * canvas.width;
        this.y = Math.random() * canvas.height;
        this.size = Math.random() * 2 + 1;
        this.speedX = Math.random() * 0.2 - 0.1;
        this.speedY = Math.random() * 0.2 - 0.1;
        this.opacity = Math.random() * 0.3 + 0.2;
      }
      update() {
        this.x += this.speedX;
        this.y += this.speedY;
        if (this.x < 0 || this.x > canvas.width) this.speedX *= -1;
        if (this.y < 0 || this.y > canvas.height) this.speedY *= -1;
      }
      draw() {
        ctx.fillStyle = `rgba(0, 122, 255, ${this.opacity})`;
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        ctx.fill();
      }
    }

    function initParticles() {
      for (let i = 0; i < particleCount; i++) {
        particles.push(new Particle());
      }
    }

    function animateParticles() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      particles.forEach(particle => {
        particle.update();
        particle.draw();
      });
      requestAnimationFrame(animateParticles);
    }

    window.addEventListener('resize', () => {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    });

    initParticles();
    animateParticles();

    // Socket.IO connection
    const socket = io('https://nighthub-backend.onrender.com', {
      transports: ['websocket'],
      reconnectionAttempts: 5
    });

    // DOM elements
    const modalOverlay = document.getElementById('modal-overlay');
    const ageModal = document.getElementById('age-modal');
    const confirmAge = document.getElementById('confirm-age');
    const closeAge = document.getElementById('close-age');
    const tabs = document.querySelectorAll('.tab');
    const postInput = document.getElementById('post-input');
    const postButton = document.getElementById('post-button');
    const postsContainer = document.getElementById('posts');
    const hamburger = document.getElementById('hamburger');
    const mobileMenuContent = document.getElementById('mobile-menu-content');

    // State
    let currentTab = 'trending';
    let posts = [];

    // Utility functions
    function formatTime(timestamp) {
      const date = new Date(timestamp);
      return date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    }

    function sanitizeHTML(str) {
      const div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }

    // Render posts
    function renderPosts() {
      postsContainer.innerHTML = '';
      let filteredPosts = posts;
      if (currentTab === 'trending') {
        filteredPosts = posts.filter(p => p.likes >= 5).sort((a, b) => b.likes - a.likes);
      } else if (currentTab === 'new') {
        filteredPosts = posts.sort((a, b) => b.timestamp - a.timestamp);
      } else if (currentTab === 'randos') {
        filteredPosts = posts.sort(() => Math.random() - 0.5);
      }
      filteredPosts.forEach(post => {
        const postElement = document.createElement('div');
        postElement.className = 'post';
        postElement.innerHTML = `
          <div class="post-header">
            <span class="post-anonymous-id">User_${post.anonymousId}</span>
            <span class="post-time">${formatTime(post.timestamp)}</span>
          </div>
          <div class="post-content">${sanitizeHTML(post.content)}</div>
          <div class="post-actions">
            <div class="action-button" data-action="like" data-post-id="${post.id}">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#007AFF" stroke-width="2">
                <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path>
              </svg>
              <span>${post.likes}</span>
            </div>
            <div class="action-button" data-action="comment" data-post-id="${post.id}">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#007AFF" stroke-width="2">
                <path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"></path>
              </svg>
              <span>${post.comments.length}</span>
            </div>
          </div>
          <div class="comment-section" id="comments-${post.id}"></div>
          <div class="comment-input-container">
            <input class="comment-input" placeholder="Add a comment..." data-post-id="${post.id}">
            <button class="comment-button" data-post-id="${post.id}">Comment</button>
          </div>
        `;
        const commentSection = postElement.querySelector(`#comments-${post.id}`);
        post.comments.forEach(comment => {
          const commentElement = document.createElement('div');
          commentElement.className = 'comment';
          commentElement.innerHTML = `
            <div class="comment-header">
              <span class="comment-anonymous-id">User_${comment.anonymousId}</span>
              <span class="comment-time">${formatTime(comment.timestamp)}</span>
            </div>
            <div class="comment-content">${sanitizeHTML(comment.content)}</div>
            <div class="comment-actions">
              <div class="action-button" data-action="like-comment" data-comment-id="${comment.id}" data-post-id="${post.id}">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#007AFF" stroke-width="2">
                  <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path>
                </svg>
                <span>${comment.likes}</span>
              </div>
            </div>
          `;
          commentSection.appendChild(commentElement);
        });
        postsContainer.appendChild(postElement);
      });
    }

    // Socket.IO event handlers
    socket.on('connect', () => {
      console.log('Connected to backend');
      ageModal.style.display = 'block';
      modalOverlay.style.display = 'block';
    });

    socket.on('posts', (receivedPosts) => {
      posts = receivedPosts;
      renderPosts();
    });

    socket.on('new_post', (post) => {
      posts.push(post);
      renderPosts();
    });

    socket.on('new_comment', ({ postId, comment }) => {
      const post = posts.find(p => p.id === postId);
      if (post) {
        post.comments.push(comment);
        renderPosts();
      }
    });

    socket.on('like_post', ({ postId, likes }) => {
      const post = posts.find(p => p.id === postId);
      if (post) {
        post.likes = likes;
        renderPosts();
      }
    });

    socket.on('like_comment', ({ postId, commentId, likes }) => {
      const post = posts.find(p => p.id === postId);
      if (post) {
        const comment = post.comments.find(c => c.id === commentId);
        if (comment) {
          comment.likes = likes;
          renderPosts();
        }
      }
    });

    socket.on('error', (msg) => {
      alert(`Error: ${msg}`);
    });

    socket.on('announcement', (text) => {
      alert(`Announcement: ${text}`);
    });

    // DOM event listeners
    confirmAge.addEventListener('click', () => {
      ageModal.style.display = 'none';
      modalOverlay.style.display = 'none';
      socket.emit('get_posts');
    });

    closeAge.addEventListener('click', () => {
      window.location.href = 'https://www.example.com';
    });

    modalOverlay.addEventListener('click', () => {
      ageModal.style.display = 'none';
      modalOverlay.style.display = 'none';
      mobileMenuContent.classList.remove('active');
    });

    tabs.forEach(tab => {
      tab.addEventListener('click', () => {
        tabs.forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
        currentTab = tab.dataset.tab;
        renderPosts();
      });
    });

    postButton.addEventListener('click', () => {
      if (postInput.value.trim()) {
        socket.emit('create_post', postInput.value);
        postInput.value = '';
      }
    });

    postsContainer.addEventListener('click', (e) => {
      const target = e.target.closest('.action-button');
      if (target) {
        const action = target.dataset.action;
        const postId = target.dataset.postId;
        const commentId = target.dataset.commentId;
        if (action === 'like') {
          socket.emit('like_post', postId);
        } else if (action === 'like-comment') {
          socket.emit('like_comment', { postId, commentId });
        } else if (action === 'comment') {
          const commentInput = document.querySelector(`.comment-input[data-post-id="${postId}"]`);
          commentInput.focus();
        }
      }
      const commentButton = e.target.closest('.comment-button');
      if (commentButton) {
        const postId = commentButton.dataset.postId;
        const commentInput = document.querySelector(`.comment-input[data-post-id="${postId}"]`);
        if (commentInput.value.trim()) {
          socket.emit('create_comment', { postId, content: commentInput.value });
          commentInput.value = '';
        }
      }
    });

    hamburger.addEventListener('click', () => {
      mobileMenuContent.classList.toggle('active');
    });
  </script>
</body>
</html>
