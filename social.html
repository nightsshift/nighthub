<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>NightHub - Social</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
    }
    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(to bottom, #F5F5F7, #E5E5EA);
      color: #1C2526;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow-x: hidden;
      position: relative;
      perspective: 500px;
    }
    #particle-canvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -1;
      pointer-events: none;
      opacity: 0.2;
    }
    #menu {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(5px);
      padding: 0.5rem 1rem;
      display: flex;
      justify-content: center;
      gap: 1.5rem;
      z-index: 100;
      box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
      transform: translateZ(20px);
    }
    .menu-item {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 1rem;
      font-weight: 500;
      color: #1C2526;
      text-decoration: none;
      transition: all 0.3s ease;
      transform: translateZ(10px);
    }
    .menu-item:hover {
      color: #007AFF;
      transform: translateZ(15px);
    }
    .menu-item.active {
      color: #007AFF;
      border-bottom: 2px solid #007AFF;
    }
    #tabs {
      margin-top: 4rem;
      display: flex;
      justify-content: center;
      gap: 1rem;
      padding: 0.5rem;
      background: rgba(255, 255, 255, 0.3);
      backdrop-filter: blur(5px);
      z-index: 10;
      transform: translateZ(15px);
    }
    .tab {
      padding: 0.5rem 1rem;
      font-size: 1rem;
      font-weight: 500;
      color: #1C2526;
      cursor: pointer;
      border-radius: 12px;
      transition: all 0.3s ease;
      transform: translateZ(10px);
    }
    .tab:hover {
      background: rgba(0, 122, 255, 0.1);
      transform: translateZ(15px);
    }
    .tab.active {
      background: #007AFF;
      color: #FFFFFF;
      transform: translateZ(15px);
    }
    #post-input-container {
      margin: 1rem auto;
      max-width: 600px;
      padding: 0.5rem;
      background: rgba(255, 255, 255, 0.95);
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
      transform: translateZ(10px);
    }
    #post-input {
      width: 100%;
      padding: 0.75rem;
      border: 1px solid #D1D1D6;
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.8);
      color: #1C2526;
      font-size: 0.95rem;
      resize: none;
      transition: all 0.3s ease;
      transform: translateZ(5px);
    }
    #post-input:focus {
      outline: none;
      border-color: #007AFF;
      box-shadow: 0 0 10px rgba(0, 122, 255, 0.3);
      transform: translateZ(10px);
    }
    #post-submit {
      display: block;
      margin: 0.5rem auto 0;
      padding: 0.75rem 1.5rem;
      border: none;
      border-radius: 12px;
      background: #007AFF;
      color: #FFFFFF;
      font-size: 0.95rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.3s ease;
      transform: translateZ(5px);
    }
    #post-submit:hover {
      transform: translateZ(10px);
      box-shadow: 0 0 15px rgba(0, 122, 255, 0.5);
    }
    #post-container, #trending-container {
      max-width: 600px;
      margin: 0 auto;
      padding: 1rem;
      display: flex;
      flex-direction: column;
      gap: 1rem;
      transform: translateZ(5px);
    }
    .post, .comment {
      background: rgba(255, 255, 255, 0.95);
      border-radius: 12px;
      padding: 1rem;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
      transform: translateZ(5px);
      animation: fadeIn 0.3s ease;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateZ(0); }
      to { opacity: 1; transform: translateZ(5px); }
    }
    .post:hover, .comment:hover {
      transform: translateZ(10px);
    }
    .post-header, .comment-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 0.5rem;
    }
    .post-author, .comment-author {
      font-weight: 500;
      color: #007AFF;
    }
    .admin-id {
      font-size: 0.8rem;
      color: #FF3B30;
      display: none;
    }
    .post-content, .comment-content {
      margin-bottom: 0.5rem;
      font-size: 0.95rem;
      word-wrap: break-word;
    }
    .post-actions, .comment-actions {
      display: flex;
      gap: 0.5rem;
      align-items: center;
    }
    .vote-button {
      width: 32px;
      height: 32px;
      display: flex;
      justify-content: center;
      align-items: center;
      border-radius: 50%;
      cursor: pointer;
      transition: all 0.3s ease;
      transform: translateZ(5px);
    }
    .upvote {
      background: #34C759;
    }
    .downvote {
      background: #FF3B30;
    }
    .vote-button:hover {
      transform: translateZ(10px);
      box-shadow: 0 0 10px rgba(0, 0, 0, 0.3);
    }
    .vote-count {
      font-size: 0.85rem;
      color: #1C2526;
    }
    .comment-button, .reply-button {
      padding: 0.5rem 1rem;
      border: none;
      border-radius: 12px;
      background: #007AFF;
      color: #FFFFFF;
      font-size: 0.85rem;
      cursor: pointer;
      transition: all 0.3s ease;
      transform: translateZ(5px);
    }
    .comment-button:hover, .reply-button:hover {
      transform: translateZ(10px);
      box-shadow: 0 0 10px rgba(0, 122, 255, 0.3);
    }
    .comment-input-container {
      display: none;
      margin-top: 0.5rem;
    }
    .comment-input {
      width: 100%;
      padding: 0.75rem;
      border: 1px solid #D1D1D6;
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.8);
      color: #1C2526;
      font-size: 0.95rem;
      resize: none;
      transition: all 0.3s ease;
      transform: translateZ(5px);
    }
    .comment-input:focus {
      outline: none;
      border-color: #007AFF;
      box-shadow: 0 0 10px rgba(0, 122, 255, 0.3);
      transform: translateZ(10px);
    }
    .comment-submit {
      margin-top: 0.5rem;
      padding: 0.5rem 1rem;
      border: none;
      border-radius: 12px;
      background: #007AFF;
      color: #FFFFFF;
      font-size: 0.85rem;
      cursor: pointer;
      transition: all 0.3s ease;
      transform: translateZ(5px);
    }
    .comment-submit:hover {
      transform: translateZ(10px);
      box-shadow: 0 0 10px rgba(0, 122, 255, 0.3);
    }
    .comments {
      margin-top: 1rem;
      padding-left: 1rem;
      border-left: 2px solid #D1D1D6;
    }
    .comment {
      margin-bottom: 0.5rem;
      padding: 0.75rem;
    }
    .trending-item {
      padding: 0.5rem 1rem;
      border-radius: 12px;
      background: rgba(0, 122, 255, 0.1);
      color: #007AFF;
      font-size: 0.9rem;
      cursor: pointer;
      transition: all 0.3s ease;
      transform: translateZ(5px);
    }
    .trending-item:hover {
      transform: translateZ(10px);
      box-shadow: 0 0 10px rgba(0, 122, 255, 0.3);
    }
    #refresh-randos {
      padding: 0.5rem 1rem;
      border: none;
      border-radius: 12px;
      background: #007AFF;
      color: #FFFFFF;
      font-size: 0.85rem;
      cursor: pointer;
      margin: 1rem auto;
      display: block;
      transition: all 0.3s ease;
      transform: translateZ(5px);
    }
    #refresh-randos:hover {
      transform: translateZ(10px);
      box-shadow: 0 0 10px rgba(0, 122, 255, 0.3);
    }
    #modal-overlay {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.3);
      z-index: 999;
      animation: fadeInOverlay 0.3s ease;
    }
    @keyframes fadeInOverlay {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    #age-modal, #admin-ban-modal {
      display: none;
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) translateZ(20px);
      width: 90%;
      max-width: 500px;
      background: rgba(255, 255, 255, 0.95);
      border-radius: 16px;
      padding: 1.5rem;
      box-shadow: 0 8px 40px rgba(0, 0, 0, 0.15);
      z-index: 1000;
      animation: popIn 0.4s ease-out;
      max-height: 90vh;
      overflow-y: auto;
    }
    @keyframes popIn {
      from { transform: translate(-50%, -50%) translateZ(0) scale(0.95); opacity: 0; }
      to { transform: translate(-50%, -50%) translateZ(20px) scale(1); opacity: 1; }
    }
    #age-modal h2, #admin-ban-modal h2 {
      font-size: 1.2rem;
      color: #007AFF;
      text-align: center;
      font-weight: 600;
      margin-bottom: 1rem;
      transform: translateZ(10px);
    }
    #age-form, #admin-ban-form {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }
    #age-form p {
      padding: 0.75rem;
      border: 1px solid #D1D1D6;
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.8);
      color: #1C2526;
      font-size: 0.95rem;
      transform: translateZ(5px);
    }
    #age-form button, #admin-ban-form button {
      padding: 0.75rem;
      border: none;
      border-radius: 12px;
      background: #007AFF;
      color: #FFFFFF;
      font-size: 0.95rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.3s ease;
      transform: translateZ(5px);
    }
    #age-form button:hover, #admin-ban-form button:hover {
      transform: translateZ(10px);
      box-shadow: 0 0 15px rgba(0, 122, 255, 0.5);
    }
    .close-button {
      background: #FF3B30;
      box-shadow: 0 0 10px rgba(255, 59, 48, 0.3);
    }
    .close-button:hover {
      box-shadow: 0 0 15px rgba(255, 59, 48, 0.5);
    }
    #admin-ban-input {
      padding: 0.75rem;
      border: 1px solid #D1D1D6;
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.8);
      color: #1C2526;
      font-size: 0.95rem;
      transform: translateZ(5px);
    }
    #admin-ban-input:focus {
      outline: none;
      border-color: #007AFF;
      box-shadow: 0 0 10px rgba(0, 122, 255, 0.3);
      transform: translateZ(10px);
    }
    @media (max-width: 768px) {
      #menu {
        gap: 1rem;
        padding: 0.5rem;
      }
      .menu-item {
        font-size: 0.9rem;
      }
      #tabs {
        flex-direction: column;
        align-items: center;
      }
      .tab {
        width: 100%;
        text-align: center;
      }
      #post-input-container {
        margin: 0.5rem;
      }
      .vote-button {
        width: 28px;
        height: 28px;
      }
      .post, .comment {
        padding: 0.75rem;
      }
    }
    @media (max-width: 480px) {
      #menu {
        gap: 0.5rem;
        padding: 0.5rem;
      }
      .menu-item {
        font-size: 0.85rem;
      }
      .menu-item svg {
        width: 16px;
        height: 16px;
      }
      #tabs {
        margin-top: 3.5rem;
      }
      .tab {
        font-size: 0.9rem;
        padding: 0.4rem 0.8rem;
      }
      .vote-button {
        width: 24px;
        height: 24px;
      }
      .post-content, .comment-content {
        font-size: 0.9rem;
      }
      .comment-button, .reply-button, .comment-submit {
        font-size: 0.8rem;
        padding: 0.4rem 0.8rem;
      }
      #age-modal, #admin-ban-modal {
        width: 100%;
        border-radius: 0;
        padding: 1rem;
      }
    }
  </style>
</head>
<body>
  <canvas id="particle-canvas"></canvas>
  <div id="modal-overlay"></div>
  <div id="age-modal">
    <h2>Age Verification</h2>
    <div id="age-form">
      <p>By proceeding, you confirm you are 13 or older.</p>
      <button id="confirm-age">Confirm</button>
      <button class="close-button" id="close-age">Cancel</button>
    </div>
  </div>
  <div id="admin-ban-modal">
    <h2>Ban User</h2>
    <div id="admin-ban-form">
      <input id="admin-ban-input" type="text" placeholder="Enter user ID to ban" readonly>
      <button id="admin-ban-submit">Ban User</button>
      <button class="close-button" id="admin-ban-close">Cancel</button>
    </div>
  </div>
  <div id="menu">
    <a href="video.html" class="menu-item">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#1C2526" stroke-width="2">
        <polygon points="5 3 19 12 5 21 5 3"></polygon>
      </svg>
      Video
    </a>
    <a href="chat.html" class="menu-item">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#1C2526" stroke-width="2">
        <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
      </svg>
      Chat
    </a>
    <a href="social.html" class="menu-item active">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="#007AFF" stroke="#1C2526" stroke-width="2">
        <path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"></path>
      </svg>
      Social
    </a>
    <a href="live.html" class="menu-item">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#1C2526" stroke-width="2">
        <circle cx="12" cy="12" r="10"></circle>
        <polygon points="10 8 16 12 10 16 10 8"></polygon>
      </svg>
      Live
    </a>
  </div>
  <div id="tabs">
    <div class="tab active" data-tab="trending">Trending</div>
    <div class="tab" data-tab="randos">Randos</div>
    <div class="tab" data-tab="new">New</div>
  </div>
  <div id="post-input-container">
    <textarea id="post-input" rows="4" placeholder="Share your thoughts (max 100 words)"></textarea>
    <button id="post-submit">Post</button>
  </div>
  <div id="trending-container"></div>
  <div id="post-container"></div>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.5/socket.io.min.js"></script>
  <script>
    // Particle background
    const canvas = document.getElementById('particle-canvas');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    const particles = [];
    const particleCount = 50;

    class Particle {
      constructor() {
        this.x = Math.random() * canvas.width;
        this.y = Math.random() * canvas.height;
        this.size = Math.random() * 2 + 1;
        this.speedX = Math.random() * 0.2 - 0.1;
        this.speedY = Math.random() * 0.2 - 0.1;
        this.opacity = Math.random() * 0.3 + 0.2;
      }
      update() {
        this.x += this.speedX;
        this.y += this.speedY;
        if (this.x < 0 || this.x > canvas.width) this.speedX *= -1;
        if (this.y < 0 || this.y > canvas.height) this.speedY *= -1;
      }
      draw() {
        ctx.fillStyle = `rgba(0, 122, 255, ${this.opacity})`;
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        ctx.fill();
      }
    }

    function initParticles() {
      for (let i = 0; i < particleCount; i++) {
        particles.push(new Particle());
      }
    }

    function animateParticles() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      particles.forEach(particle => {
        particle.update();
        particle.draw();
      });
      requestAnimationFrame(animateParticles);
    }

    window.addEventListener('resize', () => {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    });

    initParticles();
    animateParticles();

    // Socket.IO connection
    const socket = io('https://nighthub-backend.onrender.com', {
      transports: ['websocket'],
      reconnectionAttempts: 5
    });

    // DOM elements
    const modalOverlay = document.getElementById('modal-overlay');
    const ageModal = document.getElementById('age-modal');
    const confirmAge = document.getElementById('confirm-age');
    const closeAge = document.getElementById('close-age');
    const adminBanModal = document.getElementById('admin-ban-modal');
    const adminBanInput = document.getElementById('admin-ban-input');
    const adminBanSubmit = document.getElementById('admin-ban-submit');
    const adminBanClose = document.getElementById('admin-ban-close');
    const tabs = document.querySelectorAll('.tab');
    const postInput = document.getElementById('post-input');
    const postSubmit = document.getElementById('post-submit');
    const postContainer = document.getElementById('post-container');
    const trendingContainer = document.getElementById('trending-container');

    // State
    let currentTab = 'trending';
    let isAdmin = false; // Set by server
    let randosInterval, newPostsInterval;

    // NSFW filter
    const nsfwRegex = /\b(sex|porn|fuck|shit|asshole|nude|xxx)\b/i;

    // Render post
    function renderPost(post, parent = postContainer) {
      const div = document.createElement('div');
      div.className = 'post';
      div.dataset.postId = post.id;
      div.innerHTML = `
        <div class="post-header">
          <span class="post-author">Anonymous</span>
          <span class="admin-id" style="display: ${isAdmin ? 'inline' : 'none'}">${post.userId}</span>
        </div>
        <div class="post-content">${post.text}</div>
        <div class="post-actions">
          <div class="vote-button upvote" data-type="post" data-id="${post.id}">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#FFFFFF" stroke-width="2">
              <path d="M12 19V5M5 12l7-7 7 7"></path>
            </svg>
          </div>
          <span class="vote-count">${post.upvotes - post.downvotes}</span>
          <div class="vote-button downvote" data-type="post" data-id="${post.id}">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#FFFFFF" stroke-width="2">
              <path d="M12 5v14M19 12l-7 7-7-7"></path>
            </svg>
          </div>
          <button class="comment-button">Comment</button>
          ${isAdmin ? `<button class="admin-ban-button">Ban User</button>` : ''}
        </div>
        <div class="comment-input-container">
          <textarea class="comment-input" rows="2" placeholder="Add a comment..."></textarea>
          <button class="comment-submit">Submit</button>
        </div>
        <div class="comments"></div>
      `;
      parent.appendChild(div);
      renderComments(post.comments, div.querySelector('.comments'));
    }

    // Render comment
    function renderComment(comment, parent) {
      const div = document.createElement('div');
      div.className = 'comment';
      div.dataset.commentId = comment.id;
      div.innerHTML = `
        <div class="comment-header">
          <span class="comment-author">Anonymous</span>
          <span class="admin-id" style="display: ${isAdmin ? 'inline' : 'none'}">${comment.userId}</span>
        </div>
        <div class="comment-content">${comment.text}</div>
        <div class="comment-actions">
          <div class="vote-button upvote" data-type="comment" data-id="${comment.id}">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#FFFFFF" stroke-width="2">
              <path d="M12 19V5M5 12l7-7 7 7"></path>
            </svg>
          </div>
          <span class="vote-count">${comment.upvotes - comment.downvotes}</span>
          <div class="vote-button downvote" data-type="comment" data-id="${comment.id}">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#FFFFFF" stroke-width="2">
              <path d="M12 5v14M19 12l-7 7-7-7"></path>
            </svg>
          </div>
          <button class="reply-button">Reply</button>
          ${isAdmin ? `<button class="admin-ban-button">Ban User</button>` : ''}
        </div>
        <div class="comment-input-container">
          <textarea class="comment-input" rows="2" placeholder="Add a reply..."></textarea>
          <button class="comment-submit">Submit</button>
        </div>
        <div class="comments"></div>
      `;
      parent.appendChild(div);
      renderComments(comment.replies, div.querySelector('.comments'));
    }

    // Render comments
    function renderComments(comments, parent) {
      comments.forEach(comment => renderComment(comment, parent));
    }

    // Render trending hashtags
    function renderTrending(hashtags) {
      trendingContainer.innerHTML = '';
      hashtags.forEach(hashtag => {
        const div = document.createElement('div');
        div.className = 'trending-item';
        div.textContent = `#${hashtag}`;
        div.addEventListener('click', () => {
          socket.emit('get_hashtag_posts', hashtag);
          currentTab = 'hashtag';
          tabs.forEach(tab => tab.classList.remove('active'));
          postContainer.innerHTML = '';
        });
        trendingContainer.appendChild(div);
      });
    }

    // Switch tabs
    tabs.forEach(tab => {
      tab.addEventListener('click', () => {
        currentTab = tab.dataset.tab;
        tabs.forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
        postContainer.innerHTML = '';
        trendingContainer.style.display = currentTab === 'trending' ? 'block' : 'none';
        clearInterval(randosInterval);
        clearInterval(newPostsInterval);
        if (currentTab === 'trending') {
          socket.emit('get_trending');
        } else if (currentTab === 'randos') {
          socket.emit('get_randos');
          const refreshButton = document.createElement('button');
          refreshButton.id = 'refresh-randos';
          refreshButton.textContent = 'New Randos';
          postContainer.prepend(refreshButton);
          randosInterval = setInterval(() => socket.emit('get_randos'), 60000);
        } else if (currentTab === 'new') {
          socket.emit('get_new');
          newPostsInterval = setInterval(() => socket.emit('get_new'), 1000);
        }
      });
    });

    // Socket.IO event handlers
    socket.on('connect', () => {
      ageModal.style.display = 'block';
      modalOverlay.style.display = 'block';
    });

    socket.on('admin_status', (status) => {
      isAdmin = status;
    });

    socket.on('post', (post) => {
      if (currentTab === 'new' || currentTab === 'randos') {
        renderPost(post);
      }
    });

    socket.on('comment', ({ postId, comment }) => {
      const post = document.querySelector(`.post[data-post-id="${postId}"]`);
      if (post) {
        const comments = post.querySelector('.comments');
        renderComment(comment, comments);
      }
    });

    socket.on('vote_update', ({ type, id, upvotes, downvotes }) => {
      const element = document.querySelector(`.${type}[data-${type}-id="${id}"]`);
      if (element) {
        const voteCount = element.querySelector('.vote-count');
        voteCount.textContent = upvotes - downvotes;
      }
    });

    socket.on('trending_update', (hashtags) => {
      if (currentTab === 'trending') {
        renderTrending(hashtags);
      }
    });

    socket.on('randos_update', (posts) => {
      if (currentTab === 'randos') {
        postContainer.innerHTML = '';
        const refreshButton = document.createElement('button');
        refreshButton.id = 'refresh-randos';
        refreshButton.textContent = 'New Randos';
        postContainer.appendChild(refreshButton);
        posts.forEach(post => renderPost(post));
      }
    });

    socket.on('new_posts', (posts) => {
      if (currentTab === 'new') {
        postContainer.innerHTML = '';
        posts.forEach(post => renderPost(post));
      }
    });

    socket.on('hashtag_posts', (posts) => {
      postContainer.innerHTML = '';
      posts.forEach(post => renderPost(post));
    });

    socket.on('banned', () => {
      alert('You have been banned for inappropriate content.');
      window.location.href = 'https://www.example.com';
    });

    socket.on('error', (msg) => {
      alert(`Error: ${msg}`);
    });

    // DOM event listeners
    confirmAge.addEventListener('click', () => {
      ageModal.style.display = 'none';
      modalOverlay.style.display = 'none';
      socket.emit('get_trending');
    });

    closeAge.addEventListener('click', () => {
      window.location.href = 'https://www.example.com';
    });

    modalOverlay.addEventListener('click', () => {
      ageModal.style.display = 'none';
      adminBanModal.style.display = 'none';
      modalOverlay.style.display = 'none';
    });

    postSubmit.addEventListener('click', () => {
      const text = postInput.value.trim();
      const words = text.split(/\s+/).filter(w => w).length;
      if (words > 100) {
        alert('Post cannot exceed 100 words.');
        return;
      }
      if (nsfwRegex.test(text)) {
        alert('Post contains inappropriate content.');
        return;
      }
      if (text) {
        socket.emit('new_post', text);
        postInput.value = '';
      }
    });

    postContainer.addEventListener('click', (e) => {
      const target = e.target;
      if (target.classList.contains('comment-button') || target.classList.contains('reply-button')) {
        const inputContainer = target.closest('.post, .comment').querySelector('.comment-input-container');
        inputContainer.style.display = inputContainer.style.display === 'block' ? 'none' : 'block';
      } else if (target.classList.contains('comment-submit')) {
        const input = target.previousElementSibling;
        const text = input.value.trim();
        if (nsfwRegex.test(text)) {
          alert('Comment contains inappropriate content.');
          return;
        }
        if (text) {
          const post = target.closest('.post');
          const parentComment = target.closest('.comment');
          if (post) {
            socket.emit('new_comment', { postId: post.dataset.postId, text });
          } else if (parentComment) {
            socket.emit('new_comment', { postId: parentComment.closest('.post').dataset.postId, parentId: parentComment.dataset.commentId, text });
          }
          input.value = '';
          target.parentElement.style.display = 'none';
        }
      } else if (target.classList.contains('vote-button')) {
        const type = target.dataset.type;
        const id = target.dataset.id;
        const vote = target.classList.contains('upvote') ? 'up' : 'down';
        socket.emit(`vote_${type}`, { id, vote });
      } else if (target.classList.contains('admin-ban-button') && isAdmin) {
        const userId = target.closest('.post, .comment').querySelector('.admin-id').textContent;
        adminBanInput.value = userId;
        adminBanModal.style.display = 'block';
        modalOverlay.style.display = 'block';
      } else if (target.id === 'refresh-randos') {
        socket.emit('get_randos');
      }
    });

    adminBanSubmit.addEventListener('click', () => {
      const userId = adminBanInput.value;
      socket.emit('admin_ban', userId);
      adminBanModal.style.display = 'none';
      modalOverlay.style.display = 'none';
    });

    adminBanClose.addEventListener('click', () => {
      adminBanModal.style.display = 'none';
      modalOverlay.style.display = 'none';
    });
  </script>
</body>
</html>
