<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>NightHub - Live</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
    }
    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(to bottom, #F5F5F7, #E5E5EA);
      color: #FFFFFF;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      padding: 0;
      overflow: hidden;
      position: relative;
      perspective: 500px;
    }
    #particle-canvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -1;
      pointer-events: none;
      opacity: 0.2;
    }
    #live-container {
      flex: 1;
      position: relative;
      width: 100%;
      height: 100dvh;
      overflow: hidden;
      background: #000000;
    }
    #live-stream {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: 1;
      transform: translateZ(5px);
    }
    #top-overlay, #bottom-overlay {
      position: absolute;
      left: 0;
      width: 100%;
      z-index: 2;
      pointer-events: none;
    }
    #top-overlay {
      top: 0;
      height: 150px;
      background: linear-gradient(to bottom, rgba(0, 0, 0, 0.7), rgba(0, 0, 0, 0));
    }
    #bottom-overlay {
      bottom: 0;
      height: 200px;
      background: linear-gradient(to top, rgba(0, 0, 0, 0.7), rgba(0, 0, 0, 0));
    }
    #live-info {
      position: absolute;
      top: 1rem;
      left: 1rem;
      z-index: 3;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      pointer-events: none;
      transform: translateZ(10px);
    }
    #live-user-id, #live-title, #viewer-count {
      font-size: 1rem;
      font-weight: 500;
      color: #FFFFFF;
      background: rgba(0, 0, 0, 0.5);
      padding: 0.3rem 0.8rem;
      border-radius: 12px;
      transform: translateZ(5px);
    }
    #live-comment-log {
      position: absolute;
      bottom: 120px;
      right: 1rem;
      width: 70%;
      max-height: 50%;
      overflow: hidden;
      z-index: 3;
      display: flex;
      flex-direction: column-reverse;
      gap: 0.3rem;
      pointer-events: none;
      transform: translateZ(10px);
    }
    .comment {
      font-size: 0.9rem;
      color: #FFFFFF;
      background: rgba(0, 0, 0, 0.5);
      padding: 0.3rem 0.8rem;
      border-radius: 12px;
      animation: slideUp 5s linear forwards;
      opacity: 0;
      transform: translateZ(5px);
    }
    @keyframes slideUp {
      0% { transform: translateY(0) translateZ(5px); opacity: 1; }
      80% { transform: translateY(-100px) translateZ(5px); opacity: 1; }
      100% { transform: translateY(-150px) translateZ(5px); opacity: 0; }
    }
    #live-comment-input {
      position: absolute;
      bottom: 70px;
      left: 1rem;
      width: calc(100% - 100px);
      padding: 0.75rem;
      border: 1px solid #D1D1D6;
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.9);
      color: #1C2526;
      font-size: 0.95rem;
      z-index: 3;
      pointer-events: auto;
      transform: translateZ(10px);
      transition: all 0.3s ease;
    }
    #live-comment-input:focus {
      outline: none;
      border-color: #007AFF;
      box-shadow: 0 0 10px rgba(0, 122, 255, 0.3);
      transform: translateZ(15px);
    }
    #send-comment {
      position: absolute;
      bottom: 70px;
      right: 1rem;
      width: 40px;
      height: 40px;
      display: flex;
      justify-content: center;
      align-items: center;
      border-radius: 50%;
      background: #007AFF;
      cursor: pointer;
      z-index: 3;
      pointer-events: auto;
      transition: all 0.3s ease;
      box-shadow: 0 0 10px rgba(0, 122, 255, 0.3);
      transform: translateZ(10px);
    }
    #send-comment:hover {
      transform: translateZ(15px);
      box-shadow: 0 0 15px rgba(0, 122, 255, 0.5);
    }
    #like-button, #start-live, #close-live {
      position: absolute;
      right: 1rem;
      width: 40px;
      height: 40px;
      display: flex;
      justify-content: center;
      align-items: center;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.9);
      cursor: pointer;
      z-index: 3;
      pointer-events: auto;
      transition: all 0.3s ease;
      box-shadow: 0 0 10px rgba(0, 0, 0, 0.3);
      transform: translateZ(10px);
    }
    #like-button {
      bottom: 200px;
    }
    #start-live {
      bottom: 250px;
      background: #34C759;
    }
    #close-live {
      top: 1rem;
      background: #FF3B30;
    }
    #like-button:hover, #start-live:hover, #close-live:hover {
      transform: translateZ(15px);
      box-shadow: 0 0 15px rgba(0, 0, 0, 0.5);
    }
    #no-streams {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) translateZ(10px);
      font-size: 1.2rem;
      color: #FFFFFF;
      text-align: center;
      z-index: 3;
      display: none;
    }
    #modal-overlay {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.3);
      z-index: 999;
      animation: fadeInOverlay 0.3s ease;
    }
    @keyframes fadeInOverlay {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    #title-modal {
      display: none;
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) translateZ(20px);
      width: 90%;
      max-width: 400px;
      background: rgba(255, 255, 255, 0.95);
      border-radius: 16px;
      padding: 1.5rem;
      box-shadow: 0 8px 40px rgba(0, 0, 0, 0.15);
      z-index: 1000;
      animation: popIn 0.4s ease-out;
    }
    @keyframes popIn {
      from { transform: translate(-50%, -50%) translateZ(0) scale(0.95); opacity: 0; }
      to { transform: translate(-50%, -50%) translateZ(20px) scale(1); opacity: 1; }
    }
    #title-modal h2 {
      font-size: 1.2rem;
      color: #007AFF;
      text-align: center;
      font-weight: 600;
      margin-bottom: 1rem;
      transform: translateZ(10px);
    }
    #title-form {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }
    #stream-title-input {
      padding: 0.75rem;
      border: 1px solid #D1D1D6;
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.8);
      color: #1C2526;
      font-size: 0.95rem;
      transition: all 0.3s ease;
      transform: translateZ(5px);
    }
    #stream-title-input:focus {
      outline: none;
      border-color: #007AFF;
      box-shadow: 0 0 10px rgba(0, 122, 255, 0.3);
      transform: translateZ(10px);
    }
    #title-form button {
      padding: 0.75rem;
      border: none;
      border-radius: 12px;
      background: #007AFF;
      color: #FFFFFF;
      font-size: 0.95rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 0 10px rgba(0, 122, 255, 0.3);
      transform: translateZ(5px);
    }
    #title-form button:hover {
      transform: translateZ(10px);
      box-shadow: 0 0 15px rgba(0, 122, 255, 0.5);
    }
    #title-form .close-button {
      background: #FF3B30;
      box-shadow: 0 0 10px rgba(255, 59, 48, 0.3);
    }
    #title-form .close-button:hover {
      box-shadow: 0 0 15px rgba(255, 59, 48, 0.5);
    }
    @media (max-width: 768px) {
      #live-user-id, #live-title, #viewer-count {
        font-size: 0.9rem;
        padding: 0.25rem 0.7rem;
      }
      #live-comment-log {
        width: 80%;
      }
      .comment {
        font-size: 0.85rem;
        padding: 0.25rem 0.7rem;
      }
      #live-comment-input {
        font-size: 0.9rem;
        padding: 0.7rem;
        width: calc(100% - 80px);
      }
      #send-comment, #like-button, #start-live, #close-live {
        width: 36px;
        height: 36px;
      }
      #no-streams {
        font-size: 1rem;
      }
      #title-modal {
        width: 95%;
        padding: 1rem;
      }
      #title-modal h2 {
        font-size: 1rem;
      }
      #stream-title-input {
        font-size: 0.9rem;
        padding: 0.6rem;
      }
      #title-form button {
        font-size: 0.9rem;
        padding: 0.6rem;
      }
    }
    @media (max-width: 480px) {
      #live-user-id, #live-title, #viewer-count {
        font-size: 0.85rem;
        padding: 0.2rem 0.6rem;
      }
      #live-comment-log {
        width: 90%;
      }
      .comment {
        font-size: 0.8rem;
        padding: 0.2rem 0.6rem;
      }
      #live-comment-input {
        font-size: 0.85rem;
        padding: 0.6rem;
        width: calc(100% - 70px);
      }
      #send-comment, #like-button, #start-live, #close-live {
        width: 32px;
        height: 32px;
      }
      #no-streams {
        font-size: 0.9rem;
      }
      #title-modal {
        width: 100%;
        border-radius: 0;
      }
    }
  </style>
</head>
<body>
  <canvas id="particle-canvas"></canvas>
  <div id="modal-overlay"></div>
  <div id="title-modal">
    <h2>Start Live Stream</h2>
    <div id="title-form">
      <input id="stream-title-input" type="text" placeholder="Enter stream title (e.g., Gaming Live)">
      <button id="submit-title">Go Live</button>
      <button class="close-button" id="close-title">Cancel</button>
    </div>
  </div>
  <div id="live-container">
    <video id="live-stream" autoplay></video>
    <div id="top-overlay"></div>
    <div id="bottom-overlay"></div>
    <div id="live-info">
      <span id="live-user-id">No Stream</span>
      <span id="live-title">Live Stream</span>
      <span id="viewer-count">0 Viewers</span>
    </div>
    <div id="live-comment-log"></div>
    <input id="live-comment-input" type="text" placeholder="Add a comment...">
    <div id="send-comment">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#FFFFFF" stroke-width="2">
        <line x1="22" y1="2" x2="11" y2="13"></line>
        <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
      </svg>
    </div>
    <div id="like-button" title="Like">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#FF3B30" stroke-width="2">
        <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path>
      </svg>
    </div>
    <div id="start-live" title="Go Live">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#FFFFFF" stroke-width="2">
        <circle cx="12" cy="12" r="4" fill="#FFFFFF"></circle>
      </svg>
    </div>
    <div id="close-live" title="Close">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#FFFFFF" stroke-width="2">
        <line x1="18" y1="6" x2="6" y2="18"></line>
        <line x1="6" y1="6" x2="18" y2="18"></line>
      </svg>
    </div>
    <div id="no-streams">No live streams available.</div>
  </div>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.5/socket.io.min.js"></script>
  <script src="https://unpkg.com/simple-peer@9.11.0/simple-peer.min.js"></script>
  <script>
    // Particle background
    const canvas = document.getElementById('particle-canvas');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    const particles = [];
    const particleCount = 50;

    class Particle {
      constructor() {
        this.x = Math.random() * canvas.width;
        this.y = Math.random() * canvas.height;
        this.size = Math.random() * 2 + 1;
        this.speedX = Math.random() * 0.2 - 0.1;
        this.speedY = Math.random() * 0.2 - 0.1;
        this.opacity = Math.random() * 0.3 + 0.2;
      }
      update() {
        this.x += this.speedX;
        this.y += this.speedY;
        if (this.x < 0 || this.x > canvas.width) this.speedX *= -1;
        if (this.y < 0 || this.y > canvas.height) this.speedY *= -1;
      }
      draw() {
        ctx.fillStyle = `rgba(0, 122, 255, ${this.opacity})`;
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        ctx.fill();
      }
    }

    function initParticles() {
      for (let i = 0; i < particleCount; i++) {
        particles.push(new Particle());
      }
    }

    function animateParticles() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      particles.forEach(particle => {
        particle.update();
        particle.draw();
      });
      requestAnimationFrame(animateParticles);
    }

    window.addEventListener('resize', () => {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    });

    initParticles();
    animateParticles();

    // Socket.IO connection
    const socket = io('https://nighthub-backend.onrender.com', {
      transports: ['websocket'],
      reconnectionAttempts: 5
    });

    // DOM elements
    const liveContainer = document.getElementById('live-container');
    const liveStream = document.getElementById('live-stream');
    const liveUserId = document.getElementById('live-user-id');
    const liveTitle = document.getElementById('live-title');
    const viewerCount = document.getElementById('viewer-count');
    const liveCommentLog = document.getElementById('live-comment-log');
    const liveCommentInput = document.getElementById('live-comment-input');
    const sendComment = document.getElementById('send-comment');
    const likeButton = document.getElementById('like-button');
    const startLive = document.getElementById('start-live');
    const closeLive = document.getElementById('close-live');
    const noStreams = document.getElementById('no-streams');
    const modalOverlay = document.getElementById('modal-overlay');
    const titleModal = document.getElementById('title-modal');
    const streamTitleInput = document.getElementById('stream-title-input');
    const submitTitle = document.getElementById('submit-title');
    const closeTitle = document.getElementById('close-title');

    // State
    let liveStreams = [];
    let currentStreamIndex = 0;
    let isBroadcasting = false;
    let peer = null;
    let localStream = null;
    let currentLiveId = null;
    let userId = null;

    // Swipe detection
    let touchStartY = 0;
    let touchEndY = 0;

    function handleSwipe() {
      const deltaY = touchStartY - touchEndY;
      if (Math.abs(deltaY) > 50) {
        if (deltaY > 0) {
          nextStream();
        } else {
          prevStream();
        }
      }
    }

    liveContainer.addEventListener('touchstart', (e) => {
      touchStartY = e.changedTouches[0].screenY;
    });

    liveContainer.addEventListener('touchend', (e) => {
      touchEndY = e.changedTouches[0].screenY;
      handleSwipe();
    });

    liveContainer.addEventListener('mousedown', (e) => {
      touchStartY = e.screenY;
    });

    liveContainer.addEventListener('mouseup', (e) => {
      touchEndY = e.screenY;
      handleSwipe();
    });

    // Stream navigation
    function nextStream() {
      if (liveStreams.length === 0) return;
      currentStreamIndex = (currentStreamIndex + 1) % liveStreams.length;
      joinStream(liveStreams[currentStreamIndex].userId);
    }

    function prevStream() {
      if (liveStreams.length === 0) return;
      currentStreamIndex = (currentStreamIndex - 1 + liveStreams.length) % liveStreams.length;
      joinStream(liveStreams[currentStreamIndex].userId);
    }

    // Start broadcasting
    async function startBroadcast(title) {
      try {
        localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
        liveStream.srcObject = localStream;
        liveStream.muted = true;

        peer = new SimplePeer({
          initiator: true,
          stream: localStream,
          trickle: false
        });

        peer.on('signal', data => {
          socket.emit('webrtc_signal', { liveId: userId, signal: data });
        });

        peer.on('error', err => {
          console.error('WebRTC error:', err);
          cleanupBroadcast();
        });

        socket.emit('start_live', { userId, title });
        isBroadcasting = true;
        currentLiveId = userId;
        liveUserId.textContent = `You (Live)`;
        liveTitle.textContent = title || 'Live Stream';
        viewerCount.textContent = `0 Viewers`;
        startLive.style.display = 'none';
        closeLive.style.display = 'block';
        likeButton.style.display = 'none';
        liveCommentInput.disabled = true;
        sendComment.style.display = 'none';
      } catch (err) {
        console.error('Media error:', err);
        alert('Unable to access camera/mic');
      }
    }

    // Join a stream
    function joinStream(liveId) {
      if (isBroadcasting || !liveId || liveId === userId) return;
      if (currentLiveId) {
        socket.emit('leave_live', { liveId: currentLiveId });
      }
      currentLiveId = liveId;
      liveStream.srcObject = null;

      peer = new SimplePeer({
        initiator: false,
        trickle: false
      });

      peer.on('signal', data => {
        socket.emit('webrtc_signal', { liveId, signal: data });
      });

      peer.on('stream', stream => {
        liveStream.srcObject = stream;
      });

      peer.on('error', err => {
        console.error('WebRTC error:', err);
        cleanupStream();
      });

      socket.emit('join_live', { liveId });
      const stream = liveStreams.find(s => s.userId === liveId);
      liveUserId.textContent = `User ${liveId.slice(0, 8)}`;
      liveTitle.textContent = stream ? stream.title : 'Live Stream';
      startLive.style.display = 'block';
      closeLive.style.display = 'block';
      likeButton.style.display = 'block';
      liveCommentInput.disabled = false;
      sendComment.style.display = 'block';
      liveCommentLog.innerHTML = '';
    }

    // Cleanup
    function cleanupBroadcast() {
      if (localStream) {
        localStream.getTracks().forEach(track => track.stop());
        localStream = null;
      }
      if (peer) {
        peer.destroy();
        peer = null;
      }
      liveStream.srcObject = null;
      if (isBroadcasting) {
        socket.emit('leave_live', { liveId: userId });
        isBroadcasting = false;
        currentLiveId = null;
        liveUserId.textContent = 'No Stream';
        liveTitle.textContent = 'Live Stream';
        viewerCount.textContent = '0 Viewers';
        startLive.style.display = 'block';
        closeLive.style.display = 'block';
        likeButton.style.display = 'block';
        liveCommentInput.disabled = false;
        sendComment.style.display = 'block';
        if (liveStreams.length > 0) {
          joinStream(liveStreams[currentStreamIndex].userId);
        } else {
          noStreams.style.display = 'block';
        }
      }
    }

    function cleanupStream() {
      if (peer) {
        peer.destroy();
        peer = null;
      }
      liveStream.srcObject = null;
      if (currentLiveId) {
        socket.emit('leave_live', { liveId: currentLiveId });
        currentLiveId = null;
      }
      liveUserId.textContent = 'No Stream';
      liveTitle.textContent = 'Live Stream';
      viewerCount.textContent = '0 Viewers';
      liveCommentLog.innerHTML = '';
      if (liveStreams.length > 0) {
        joinStream(liveStreams[currentStreamIndex].userId);
      } else {
        noStreams.style.display = 'block';
      }
    }

    // Socket.IO event handlers
    socket.on('connect', () => {
      console.log('Connected to backend, Socket ID:', socket.id);
      userId = socket.id;
      socket.emit('get_live_list');
    });

    socket.on('live_list', (streams) => {
      liveStreams = streams.filter(s => s.userId !== userId);
      if (liveStreams.length === 0) {
        noStreams.style.display = 'block';
        liveUserId.textContent = 'No Stream';
        liveTitle.textContent = 'Live Stream';
        viewerCount.textContent = '0 Viewers';
        liveStream.srcObject = null;
        liveCommentLog.innerHTML = '';
        if (!isBroadcasting) {
          cleanupStream();
        }
      } else {
        noStreams.style.display = 'none';
        if (!isBroadcasting && !currentLiveId) {
          currentStreamIndex = 0;
          joinStream(liveStreams[0].userId);
        }
      }
    });

    socket.on('viewer_count', (count) => {
      viewerCount.textContent = `${count} Viewer${count === 1 ? '' : 's'}`;
    });

    socket.on('live_comment', ({ userId: commenterId, comment }) => {
      const commentElement = document.createElement('div');
      commentElement.className = 'comment';
      commentElement.textContent = `${commenterId.slice(0, 8)}: ${comment}`;
      liveCommentLog.appendChild(commentElement);
      setTimeout(() => commentElement.remove(), 5000);
    });

    socket.on('webrtc_signal', ({ signal }) => {
      if (peer) {
        peer.signal(signal);
      }
    });

    socket.on('live_ended', () => {
      if (!isBroadcasting) {
        cleanupStream();
        socket.emit('get_live_list');
      }
    });

    socket.on('error', (msg) => {
      alert(`Error: ${msg}`);
      if (msg.includes('banned')) {
        cleanupBroadcast();
        titleModal.style.display = 'none';
        modalOverlay.style.display = 'none';
      }
    });

    // DOM event listeners
    startLive.addEventListener('click', () => {
      if (!isBroadcasting) {
        titleModal.style.display = 'block';
        modalOverlay.style.display = 'block';
        streamTitleInput.focus();
      }
    });

    submitTitle.addEventListener('click', () => {
      const title = streamTitleInput.value.trim();
      startBroadcast(title);
      titleModal.style.display = 'none';
      modalOverlay.style.display = 'none';
      streamTitleInput.value = '';
    });

    closeTitle.addEventListener('click', () => {
      titleModal.style.display = 'none';
      modalOverlay.style.display = 'none';
      streamTitleInput.value = '';
    });

    modalOverlay.addEventListener('click', () => {
      titleModal.style.display = 'none';
      modalOverlay.style.display = 'none';
      streamTitleInput.value = '';
    });

    closeLive.addEventListener('click', () => {
      if (isBroadcasting) {
        cleanupBroadcast();
      } else {
        cleanupStream();
        socket.emit('get_live_list');
      }
    });

    sendComment.addEventListener('click', () => {
      if (liveCommentInput.value.trim() && currentLiveId) {
        socket.emit('live_comment', { liveId: currentLiveId, comment: liveCommentInput.value.trim() });
        liveCommentInput.value = '';
      }
    });

    liveCommentInput.addEventListener('keypress', (e) => {
      if (e.key === 'Enter' && liveCommentInput.value.trim() && currentLiveId) {
        socket.emit('live_comment', { liveId: currentLiveId, comment: liveCommentInput.value.trim() });
        liveCommentInput.value = '';
      }
    });

    likeButton.addEventListener('click', () => {
      alert('Like feature coming soon!');
    });
  </script>
</body>
</html>
