<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>NightHub</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
    }
    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(to bottom, #F5F5F7, #E5E5EA);
      color: #1C2526;
      min-height: 100dvh;
      display: flex;
      overflow: hidden;
      position: relative;
      perspective: 500px;
    }
    #particle-canvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -1;
      pointer-events: none;
      opacity: 0.2;
    }
    #sidebar {
      width: 250px;
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(5px);
      height: 100dvh;
      position: fixed;
      left: 0;
      top: 0;
      display: flex;
      flex-direction: column;
      padding: 1rem;
      z-index: 100;
      box-shadow: 2px 0 5px rgba(0, 0, 0, 0.1);
      transform: translateZ(20px);
    }
    #mobile-menu {
      display: none;
    }
    #hamburger {
      display: none;
    }
    #mobile-menu-content {
      display: none;
      position: fixed;
      top: 0;
      right: 0;
      width: 50%;
      height: 100dvh;
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(5px);
      z-index: 101;
      flex-direction: column;
      padding: 1rem;
      transform: translateZ(20px);
      transition: transform 0.3s ease;
    }
    #mobile-menu-content.active {
      transform: translateX(0);
    }
    #logo {
      font-size: 1.5rem;
      font-weight: 700;
      color: #007AFF;
      margin-bottom: 2rem;
      transform: translateZ(10px);
    }
    .menu-item {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.75rem;
      font-size: 1rem;
      font-weight: 500;
      color: #1C2526;
      text-decoration: none;
      border-radius: 8px;
      margin-bottom: 0.5rem;
      transition: all 0.3s ease;
      transform: translateZ(10px);
    }
    .menu-item:hover {
      background: rgba(0, 122, 255, 0.1);
      color: #007AFF;
      transform: translateZ(15px);
    }
    .menu-item.active {
      background: #007AFF;
      color: #FFFFFF;
    }
    .menu-item.bottom {
      margin-top: auto;
    }
    #content {
      flex: 1;
      margin-left: 250px;
      padding: 5px 10px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      transform: translateZ(5px);
    }
    #welcome-text {
      font-size: 2rem;
      font-weight: 700;
      color: #007AFF;
      text-align: center;
      margin-bottom: 1rem;
      transform: translateZ(10px);
    }
    #welcome-subtext {
      font-size: 1.2rem;
      color: #1C2526;
      text-align: center;
      max-width: 600px;
      transform: translateZ(5px);
    }
    #modal-overlay {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.3);
      z-index: 999;
      animation: fadeInOverlay 0.3s ease;
    }
    @keyframes fadeInOverlay {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    #age-modal {
      display: none;
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) translateZ(20px);
      width: 90%;
      max-width: 500px;
      background: rgba(255, 255, 255, 0.95);
      border-radius: 16px;
      padding: 1.5rem;
      box-shadow: 0 8px 40px rgba(0, 0, 0, 0.15);
      z-index: 1000;
      animation: popIn 0.4s ease-out;
    }
    @keyframes popIn {
      from { transform: translate(-50%, -50%) translateZ(0) scale(0.95); opacity: 0; }
      to { transform: translate(-50%, -50%) translateZ(20px) scale(1); opacity: 1; }
    }
    #age-modal h2 {
      font-size: 1.2rem;
      color: #007AFF;
      text-align: center;
      font-weight: 600;
      margin-bottom: 1rem;
      transform: translateZ(10px);
    }
    #age-form {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }
    #age-form p {
      padding: 0.75rem;
      border: 1px solid #D1D1D6;
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.8);
      color: #1C2526;
      font-size: 0.95rem;
      transform: translateZ(5px);
    }
    #age-form button {
      padding: 0.75rem;
      border: none;
      border-radius: 12px;
      background: #007AFF;
      color: #FFFFFF;
      font-size: 0.95rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.3s ease;
      transform: translateZ(5px);
    }
    #age-form button:hover {
      transform: translateZ(10px);
      box-shadow: 0 0 15px rgba(0, 122, 255, 0.5);
    }
    #age-form .close-button {
      background: #FF3B30;
      box-shadow: 0 0 10px rgba(255, 59, 48, 0.3);
    }
    #age-form .close-button:hover {
      box-shadow: 0 0 15px rgba(255, 59, 48, 0.5);
    }
    @media (max-width: 768px) {
      #sidebar {
        display: none;
      }
      #mobile-menu {
        display: flex;
        justify-content: space-between;
        align-items: center;
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(5px);
        padding: 0.5rem 1rem;
        z-index: 100;
        box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
        transform: translateZ(20px);
      }
      #hamburger {
        display: block;
        width: 30px;
        height: 30px;
        cursor: pointer;
        transform: translateZ(10px);
      }
      #mobile-menu-content {
        display: flex;
        transform: translateX(100%);
      }
      #content {
        margin-left: 0;
        padding: 5px 10px;
      }
      #welcome-text {
        font-size: 1.5rem;
      }
      #welcome-subtext {
        font-size: 1rem;
      }
      #age-modal {
        width: 95%;
        padding: 1rem;
      }
    }
    @media (max-width: 480px) {
      #welcome-text {
        font-size: 1.2rem;
      }
      #welcome-subtext {
        font-size: 0.9rem;
      }
      #age-modal {
        width: 100%;
        border-radius: 0;
      }
    }
  </style>
</head>

  <script>
    // Particle background
    const canvas = document.getElementById('particle-canvas');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    const particles = [];
    const particleCount = 50;

    class Particle {
      constructor() {
        this.x = Math.random() * canvas.width;
        this.y = Math.random() * canvas.height;
        this.size = Math.random() * 2 + 1;
        this.speedX = Math.random() * 0.2 - 0.1;
        this.speedY = Math.random() * 0.2 - 0.1;
        this.opacity = Math.random() * 0.3 + 0.2;
      }
      update() {
        this.x += this.speedX;
        this.y += this.speedY;
        if (this.x < 0 || this.x > canvas.width) this.speedX *= -1;
        if (this.y < 0 || this.y > canvas.height) this.speedY *= -1;
      }
      draw() {
        ctx.fillStyle = `rgba(0, 122, 255, ${this.opacity})`;
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        ctx.fill();
      }
    }

    function initParticles() {
      for (let i = 0; i < particleCount; i++) {
        particles.push(new Particle());
      }
    }

    function animateParticles() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      particles.forEach(particle => {
        particle.update();
        particle.draw();
      });
      requestAnimationFrame(animateParticles);
    }

    window.addEventListener('resize', () => {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    });

    initParticles();
    animateParticles();

    // Age verification
    const modalOverlay = document.getElementById('modal-overlay');
    const ageModal = document.getElementById('age-modal');
    const confirmAge = document.getElementById('confirm-age');
    const closeAge = document.getElementById('close-age');
    const hamburger = document.getElementById('hamburger');
    const mobileMenuContent = document.getElementById('mobile-menu-content');

    if (!sessionStorage.getItem('ageVerified')) {
      ageModal.style.display = 'block';
      modalOverlay.style.display = 'block';
    }

    confirmAge.addEventListener('click', () => {
      sessionStorage.setItem('ageVerified', 'true');
      ageModal.style.display = 'none';
      modalOverlay.style.display = 'none';
    });

    closeAge.addEventListener('click', () => {
      window.location.href = 'https://www.example.com';
    });

    modalOverlay.addEventListener('click', () => {
      ageModal.style.display = 'none';
      modalOverlay.style.display = 'none';
      mobileMenuContent.classList.remove('active');
    });

    hamburger.addEventListener('click', () => {
      mobileMenuContent.classList.toggle('active');
    });
  </script>
