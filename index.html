<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Night Hub - Anonymous Chat</title>
  <style>
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: linear-gradient(135deg, #1a1a1a, #2c2c2c);
      color: #e0e0e0;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      padding: 10px;
    }
    #chat-container {
      width: 100%;
      max-width: 500px;
      background: #2a2a2a;
      border-radius: 15px;
      padding: 20px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
    }
    h1 {
      text-align: center;
      font-size: 1.8rem;
      margin-bottom: 20px;
      color: #bb86fc;
    }
    #chat-log {
      height: 400px;
      overflow-y: auto;
      background: #333;
      border-radius: 10px;
      padding: 15px;
      margin-bottom: 15px;
      border: 1px solid #444;
    }
    #chat-log p {
      margin: 8px 0;
      padding: 8px 12px;
      border-radius: 8px;
      opacity: 0;
      animation: fadeIn 0.5s ease forwards;
    }
    #chat-log .you {
      background: #6200ea;
      color: #fff;
      margin-left: 20%;
      margin-right: 10px;
    }
    #chat-log .stranger {
      background: #3700b3;
      color: #e0e0e0;
      margin-right: 20%;
      margin-left: 10px;
    }
    #typing-indicator {
      font-style: italic;
      color: #888;
      margin: 5px 0;
      display: none;
    }
    #chat-input {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 8px;
      background: #444;
      color: #e0e0e0;
      font-size: 1rem;
      margin-bottom: 10px;
    }
    #chat-input:focus {
      outline: none;
      box-shadow: 0 0 5px #bb86fc;
    }
    .button-group {
      display: flex;
      gap: 10px;
    }
    button {
      flex: 1;
      padding: 12px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      background: #6200ea;
      color: #fff;
      font-size: 1rem;
      transition: background 0.2s;
    }
    button:hover {
      background: #3700b3;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @media (max-width: 600px) {
      #chat-container {
        padding: 15px;
      }
      h1 {
        font-size: 1.5rem;
      }
      #chat-log {
        height: 300px;
      }
    }
  </style>
</head>
<body>
  <div id="chat-container">
    <h1>Night Hub</h1>
    <div id="chat-log"></div>
    <div id="typing-indicator">Stranger is typing...</div>
    <input id="chat-input" type="text" placeholder="Type your message..." disabled>
    <div class="button-group">
      <button id="start-chat">Start Chat</button>
      <button id="end-chat" style="display:none;">End Chat</button>
      <button id="report-user" style="display:none;">Report User</button>
    </div>
  </div>
  <audio id="message-sound" src="/assets/Notification.mp3"></audio>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.5/socket.io.js"></script>
  <script>
    const socket = io('https://nighthub-backend.onrender.com', {
      transports: ['websocket'],
      reconnectionAttempts: 5
    });
    const chatLog = document.getElementById('chat-log');
    const chatInput = document.getElementById('chat-input');
    const startChatBtn = document.getElementById('start-chat');
    const endChatBtn = document.getElementById('end-chat');
    const reportUserBtn = document.getElementById('report-user');
    const typingIndicator = document.getElementById('typing-indicator');
    const messageSound = document.getElementById('message-sound');
    let isTyping = false;
    let typingTimeout;

    socket.on('connect', () => {
      console.log('Connected to backend, Socket ID:', socket.id);
      chatLog.innerHTML += '<p>Connected to server.</p>';
      chatLog.scrollTop = chatLog.scrollHeight;
    });

    socket.on('connect_error', (err) => {
      console.error('Connection error:', err.message);
      chatLog.innerHTML += `<p>Error: Failed to connect to server - ${err.message}</p>`;
      chatLog.scrollTop = chatLog.scrollHeight;
    });

    startChatBtn.addEventListener('click', () => {
      console.log('Start chat clicked, Socket ID:', socket.id);
      socket.emit('join');
      startChatBtn.style.display = 'none';
      endChatBtn.style.display = 'inline';
      reportUserBtn.style.display = 'inline';
      chatInput.disabled = false;
      chatInput.focus();
      chatLog.innerHTML += '<p>Connecting to a stranger...</p>';
      chatLog.scrollTop = chatLog.scrollHeight;
    });

    endChatBtn.addEventListener('click', () => {
      console.log('End chat clicked, Socket ID:', socket.id);
      socket.emit('leave');
      startChatBtn.style.display = 'inline';
      endChatBtn.style.display = 'none';
      reportUserBtn.style.display = 'none';
      chatInput.disabled = true;
      chatInput.value = '';
      typingIndicator.style.display = 'none';
      chatLog.innerHTML += '<p>Chat ended.</p>';
      chatLog.scrollTop = chatLog.scrollHeight;
    });

    reportUserBtn.addEventListener('click', () => {
      console.log('Report user clicked, Socket ID:', socket.id);
      socket.emit('report', { timestamp: new Date().toISOString() });
      chatLog.innerHTML += '<p>User reported to moderators.</p>';
      chatLog.scrollTop = chatLog.scrollHeight;
    });

    chatInput.addEventListener('input', () => {
      if (chatInput.value.trim() && !isTyping) {
        isTyping = true;
        socket.emit('typing', true);
      } else if (!chatInput.value.trim() && isTyping) {
        isTyping = false;
        socket.emit('typing', false);
      }
      clearTimeout(typingTimeout);
      typingTimeout = setTimeout(() => {
        if (isTyping) {
          isTyping = false;
          socket.emit('typing', false);
        }
      }, 2000);
    });

    chatInput.addEventListener('keypress', (e) => {
      if (e.key === 'Enter' && chatInput.value.trim()) {
        console.log('Sending message:', chatInput.value, 'Socket ID:', socket.id);
        socket.emit('message', chatInput.value);
        chatLog.innerHTML += `<p class="you"><strong>You:</strong> ${chatInput.value}</p>`;
        chatInput.value = '';
        isTyping = false;
        socket.emit('typing', false);
        chatLog.scrollTop = chatLog.scrollHeight;
      }
    });

    socket.on('message', (msg) => {
      console.log('Received message:', msg, 'Socket ID:', socket.id);
      chatLog.innerHTML += `<p class="stranger"><strong>Stranger:</strong> ${msg}</p>`;
      messageSound.play().catch(err => console.error('Audio playback error:', err));
      chatLog.scrollTop = chatLog.scrollHeight;
    });

    socket.on('typing', (isTyping) => {
      console.log('Typing status:', isTyping, 'Socket ID:', socket.id);
      typingIndicator.style.display = isTyping ? 'block' : 'none';
      chatLog.scrollTop = chatLog.scrollHeight;
    });

    socket.on('paired', () => {
      console.log('Paired with a stranger, Socket ID:', socket.id);
      chatLog.innerHTML += '<p>Connected to a stranger!</p>';
      chatLog.scrollTop = chatLog.scrollHeight;
    });

    socket.on('disconnected', () => {
      console.log('Stranger disconnected, Socket ID:', socket.id);
      chatLog.innerHTML += '<p>Stranger disconnected.</p>';
      startChatBtn.style.display = 'inline';
      endChatBtn.style.display = 'none';
      reportUserBtn.style.display = 'none';
      chatInput.disabled = true;
      typingIndicator.style.display = 'none';
      chatLog.scrollTop = chatLog.scrollHeight;
    });

    socket.on('error', (msg) => {
      console.error('Server error:', msg, 'Socket ID:', socket.id);
      chatLog.innerHTML += `<p>Error: ${msg}</p>`;
      chatLog.scrollTop = chatLog.scrollHeight;
    });
  </script>
</body>
</html>
