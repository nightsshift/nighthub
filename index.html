<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Night Hub - Anonymous Chat</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Roboto+Mono:wght@400&display=swap" rel="stylesheet">
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    body {
      font-family: 'Orbitron', sans-serif;
      background: linear-gradient(135deg, #0a0a0a, #1c2526);
      color: #e0e0e0;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
      overflow-x: hidden;
      animation: gradientShift 15s ease infinite;
      background-size: 200% 200%;
    }
    @keyframes gradientShift {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }
    #chat-container {
      width: 100%;
      max-width: 600px;
      background: rgba(10, 10, 10, 0.9);
      border-radius: 12px;
      padding: 25px;
      box-shadow: 0 0 30px rgba(187, 134, 252, 0.4), 0 0 10px rgba(2, 136, 209, 0.2);
      backdrop-filter: blur(8px);
      position: relative;
      overflow: hidden;
    }
    h1 {
      font-size: 2.2rem;
      color: #bb86fc;
      text-align: center;
      text-transform: uppercase;
      letter-spacing: 3px;
      margin-bottom: 20px;
      text-shadow: 0 0 15px rgba(187, 134, 252, 0.6);
      animation: glowPulse 2s ease-in-out infinite;
    }
    @keyframes glowPulse {
      0% { text-shadow: 0 0 10px rgba(187, 134, 252, 0.4); }
      50% { text-shadow: 0 0 20px rgba(187, 134, 252, 0.8); }
      100% { text-shadow: 0 0 10px rgba(187, 134, 252, 0.4); }
    }
    .top-left-controls {
      position: absolute;
      top: 15px;
      left: 15px;
      display: flex;
      align-items: center;
    }
    .top-right-controls {
      position: absolute;
      top: 15px;
      right: 15px;
      display: flex;
      align-items: center;
    }
    #safe-mode-toggle {
      display: flex;
      align-items: center;
      font-size: 0.85rem;
      color: #e0e0e0;
    }
    #safe-mode-toggle input {
      display: none;
    }
    #safe-mode-toggle label {
      cursor: pointer;
      padding: 6px 12px;
      border-radius: 20px;
      background: linear-gradient(45deg, #6200ea, #7b1fa2);
      transition: all 0.3s ease;
      box-shadow: 0 0 8px rgba(98, 0, 234, 0.3);
    }
    #safe-mode-toggle input:checked + label {
      background: linear-gradient(45deg, #0288d1, #01579b);
      box-shadow: 0 0 8px rgba(2, 136, 209, 0.5);
    }
    #help-icon, #vault-button {
      width: 32px;
      height: 32px;
      display: flex;
      justify-content: center;
      align-items: center;
      border-radius: 50%;
      background: linear-gradient(45deg, #bb86fc, #6200ea);
      color: #fff;
      font-size: 1.2rem;
      text-align: center;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 0 8px rgba(187, 134, 252, 0.3);
      margin-left: 10px;
    }
    #help-icon:hover, #vault-button:hover {
      transform: scale(1.1);
      box-shadow: 0 0 15px rgba(187, 134, 252, 0.6);
    }
    #tags-modal, #contact-modal, #vault-modal {
      display: none;
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) scale(0.8);
      width: 90%;
      max-width: 450px;
      background: rgba(10, 10, 10, 0.95);
      border: 2px solid #bb86fc;
      border-radius: 12px;
      padding: 25px;
      box-shadow: 0 0 30px rgba(187, 134, 252, 0.4);
      backdrop-filter: blur(8px);
      z-index: 1000;
      animation: slideIn 0.3s ease forwards;
    }
    @keyframes slideIn {
      from { transform: translate(-50%, -50%) scale(0.8); opacity: 0; }
      to { transform: translate(-50%, -50%) scale(1); opacity: 1; }
    }
    #tags-modal h2, #contact-modal h2, #vault-modal h2 {
      font-size: 1.6rem;
      color: #bb86fc;
      margin-bottom: 20px;
      text-align: center;
      text-shadow: 0 0 10px rgba(187, 134, 252, 0.5);
    }
    #tags-form, #contact-form, #vault-form {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    #tags-form input, #contact-form input, #contact-form textarea, #vault-form textarea {
      padding: 12px;
      border: 1px solid #bb86fc;
      border-radius: 8px;
      background: rgba(30, 30, 30, 0.8);
      color: #e0e0e0;
      font-family: 'Roboto Mono', monospace;
      font-size: 0.95rem;
      transition: all 0.3s ease;
    }
    #tags-form textarea, #contact-form textarea, #vault-form textarea {
      resize: vertical;
      min-height: 80px;
    }
    #tags-form input:focus, #contact-form input:focus, #contact-form textarea:focus, #vault-form textarea:focus {
      outline: none;
      border-color: #0288d1;
      box-shadow: 0 0 12px rgba(2, 136, 209, 0.5);
    }
    #tags-form button, #contact-form button, #vault-form button {
      padding: 12px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      background: linear-gradient(45deg, #bb86fc, #6200ea);
      color: #fff;
      font-size: 0.95rem;
      text-transform: uppercase;
      transition: all 0.3s ease;
    }
    #tags-form button:hover, #contact-form button:hover, #vault-form button:hover {
      transform: scale(1.05);
      box-shadow: 0 0 15px rgba(187, 134, 252, 0.6);
    }
    #tags-form .close-button, #contact-form .close-button, #vault-form .close-button {
      background: linear-gradient(45deg, #ff5252, #d32f2f);
    }
    #tags-form .close-button:hover, #contact-form .close-button:hover, #vault-form .close-button:hover {
      box-shadow: 0 0 15px rgba(255, 82, 82, 0.6);
    }
    #trending-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 15px;
    }
    .trending-tag {
      padding: 6px 12px;
      border-radius: 20px;
      background: linear-gradient(45deg, #0288d1, #01579b);
      color: #e0e0e0;
      font-size: 0.85rem;
      cursor: pointer;
      transition: all 0.3s ease;
    }
    .trending-tag:hover {
      transform: scale(1.05);
      box-shadow: 0 0 8px rgba(2, 136, 209, 0.5);
    }
    #modal-overlay {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.8);
      z-index: 999;
      backdrop-filter: blur(2px);
    }
    #chat-log {
      height: 400px;
      overflow-y: auto;
      background: rgba(20, 20, 20, 0.8);
      border-radius: 10px;
      padding: 20px;
      margin-bottom: 15px;
      border: 1px solid #bb86fc;
      box-shadow: inset 0 0 10px rgba(187, 134, 252, 0.2);
      scrollbar-width: thin;
      scrollbar-color: #bb86fc #1e1e1e;
    }
    #chat-log::-webkit-scrollbar {
      width: 8px;
    }
    #chat-log::-webkit-scrollbar-track {
      background: #1e1e1e;
    }
    #chat-log::-webkit-scrollbar-thumb {
      background: #bb86fc;
      border-radius: 4px;
    }
    #chat-log p {
      margin: 10px 0;
      padding: 12px 18px;
      border-radius: 10px;
      opacity: 0;
      animation: fadeIn 0.5s ease forwards;
      font-family: 'Roboto Mono', monospace;
      font-size: 0.95rem;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
      position: relative;
      user-select: text;
    }
    #chat-log p:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
    }
    #chat-log .you {
      background: linear-gradient(45deg, #6200ea, #7b1fa2);
      color: #fff;
      margin-left: 20%;
      margin-right: 10px;
      box-shadow: 0 2px 10px rgba(98, 0, 234, 0.5);
    }
    #chat-log .stranger {
      background: linear-gradient(45deg, #0288d1, #01579b);
      color: #e0e0e0;
      margin-right: 20%;
      margin-left: 10px;
      box-shadow: 0 2px 10px rgba(2, 136, 209, 0.5);
    }
    .save-quote-btn {
      display: none;
      position: absolute;
      right: 10px;
      top: 10px;
      padding: 5px 10px;
      border-radius: 5px;
      background: linear-gradient(45deg, #4caf50, #2e7d32);
      color: #fff;
      font-size: 0.8rem;
      cursor: pointer;
      transition: all 0.3s ease;
    }
    #chat-log p:hover .save-quote-btn {
      display: block;
    }
    .save-quote-btn:hover {
      transform: scale(1.05);
      box-shadow: 0 0 8px rgba(76, 175, 80, 0.5);
    }
    #vault-gallery {
      max-height: 300px;
      overflow-y: auto;
      padding: 10px;
      background: rgba(20, 20, 20, 0.8);
      border-radius: 10px;
      border: 1px solid #bb86fc;
      scrollbar-width: thin;
      scrollbar-color: #bb86fc #1e1e1e;
    }
    #vault-gallery::-webkit-scrollbar {
      width: 8px;
    }
    #vault-gallery::-webkit-scrollbar-track {
      background: #1e1e1e;
    }
    #vault-gallery::-webkit-scrollbar-thumb {
      background: #bb86fc;
      border-radius: 4px;
    }
    .quote-entry {
      padding: 12px;
      margin-bottom: 10px;
      background: linear-gradient(45deg, #0288d1, #01579b);
      border-radius: 8px;
      color: #e0e0e0;
      font-family: 'Roboto Mono', monospace;
      font-size: 0.95rem;
      position: relative;
    }
    .quote-text {
      margin-bottom: 5px;
    }
    .quote-meta {
      font-size: 0.8rem;
      color: #bb86fc;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .vote-buttons {
      display: flex;
      gap: 5px;
    }
    .vote-btn {
      padding: 5px 10px;
      border-radius: 5px;
      background: linear-gradient(45deg, #6200ea, #7b1fa2);
      color: #fff;
      font-size: 0.8rem;
      cursor: pointer;
      transition: all 0.3s ease;
    }
    .vote-btn:hover {
      transform: scale(1.05);
      box-shadow: 0 0 8px rgba(98, 0, 234, 0.5);
    }
    .vote-btn.upvote {
      background: linear-gradient(45deg, #4caf50, #2e7d32);
    }
    .vote-btn.downvote {
      background: linear-gradient(45deg, #ff5252, #d32f2f);
    }
    #typing-indicator {
      font-size: 0.9rem;
      color: #bb86fc;
      margin: 10px 15px;
      display: none;
      animation: pulse 1.5s infinite;
      font-family: 'Roboto Mono', monospace;
    }
    #countdown-timer {
      display: none;
      text-align: center;
      font-size: 1rem;
      color: #ff5252;
      margin: 10px 0;
      text-shadow: 0 0 8px rgba(255, 82, 82, 0.5);
      font-family: 'Roboto Mono', monospace;
    }
    #chat-input {
      width: 100%;
      padding: 12px;
      border: 1px solid #bb86fc;
      border-radius: 8px;
      background: rgba(30, 30, 30, 0.8);
      color: #e0e0e0;
      font-family: 'Roboto Mono', monospace;
      font-size: 1rem;
      margin-bottom: 15px;
      transition: all 0.3s ease;
    }
    #chat-input:focus {
      outline: none;
      border-color: #0288d1;
      box-shadow: 0 0 12px rgba(2, 136, 209, 0.5);
    }
    .button-group {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
      gap: 12px;
    }
    button {
      padding: 12px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      background: linear-gradient(45deg, #bb86fc, #6200ea);
      color: #fff;
      font-size: 0.95rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      transition: all 0.3s ease;
      box-shadow: 0 2px 10px rgba(187, 134, 252, 0.3);
    }
    button:hover {
      transform: scale(1.05);
      box-shadow: 0 0 15px rgba(187, 134, 252, 0.6);
    }
    button:active {
      transform: scale(1);
    }
    #cancel-disconnect {
      background: linear-gradient(45deg, #ff5252, #d32f2f);
    }
    #cancel-disconnect:hover {
      box-shadow: 0 0 15px rgba(255, 82, 82, 0.6);
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px) scale(0.95); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }
    @keyframes pulse {
      0% { opacity: 0.6; }
      50% { opacity: 1; }
      100% { opacity: 0.6; }
    }
    @media (max-width: 600px) {
      #chat-container {
        padding: 20px;
        border-width: 1px;
      }
      h1 {
        font-size: 1.8rem;
      }
      #chat-log {
        height: 300px;
      }
      #chat-input {
        font-size: 0.95rem;
      }
      button {
        font-size: 0.9rem;
      }
      .top-left-controls, .top-right-controls {
        top: 10px;
        font-size: 0.8rem;
      }
      .top-left-controls {
        left: 10px;
      }
      .top-right-controls {
        right: 10px;
      }
      #help-icon, #vault-button {
        width: 28px;
        height: 28px;
        font-size: 1rem;
      }
      #tags-modal, #contact-modal, #vault-modal {
        padding: 20px;
      }
      #tags-modal h2, #contact-modal h2, #vault-modal h2 {
        font-size: 1.4rem;
      }
    }
  </style>
</head>
<body>
  <div id="modal-overlay"></div>
  <div id="tags-modal">
    <h2>Select Your Interests</h2>
    <div id="tags-form">
      <div id="trending-tags"></div>
      <input id="tags-input" type="text" placeholder="Enter tags (e.g., coding, movies, separated by commas)">
      <button id="submit-tags">Join Chat</button>
      <button class="close-button" id="close-tags">Close</button>
    </div>
  </div>
  <div id="contact-modal">
    <h2>Contact Us</h2>
    <div id="contact-form">
      <input type="text" id="contact-name" placeholder="Name (optional)">
      <input type="email" id="contact-email" placeholder="Email (optional)">
      <textarea id="contact-message" placeholder="Your message (required)"></textarea>
      <button id="submit-contact">Submit</button>
      <button class="close-button" id="close-contact">Close</button>
    </div>
  </div>
  <div id="vault-modal">
    <h2>Vault of Quotes</h2>
    <div id="vault-gallery"></div>
    <div id="vault-form">
      <button class="close-button" id="close-vault">Close</button>
    </div>
  </div>
  <div id="chat-container">
    <h1>Night Hub</h1>
    <div class="top-left-controls">
      <div id="help-icon" title="Contact Us">?</div>
      <div id="vault-button" title="View Vault">📜</div>
    </div>
    <div class="top-right-controls">
      <div id="safe-mode-toggle">
        <input type="checkbox" id="safe-mode" checked>
        <label for="safe-mode">Safe Mode</label>
      </div>
    </div>
    <div id="chat-log"></div>
    <div id="typing-indicator">Stranger is typing...</div>
    <div id="countdown-timer">Disconnecting in <span id="countdown">5</span> seconds...</div>
    <input id="chat-input" type="text" placeholder="Type your message..." disabled>
    <div class="button-group">
      <button id="start-chat">Start Chat</button>
      <button id="end-chat" style="display:none;">End Chat</button>
      <button id="report-user" style="display:none;">Report User</button>
      <button id="cancel-disconnect" style="display:none;">Cancel Disconnect</button>
    </div>
  </div>
  <audio id="message-sound" src="/assets/Notification.mp3"></audio>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.5/socket.io.js"></script>
  <script>
    // Initialize Socket.IO connection
    const socket = io('https://nighthub-backend.onrender.com', {
      transports: ['websocket'],
      reconnectionAttempts: 5
    });

    // DOM elements
    const chatLog = document.getElementById('chat-log');
    const chatInput = document.getElementById('chat-input');
    const startChatBtn = document.getElementById('start-chat');
    const endChatBtn = document.getElementById('end-chat');
    const reportUserBtn = document.getElementById('report-user');
    const cancelDisconnectBtn = document.getElementById('cancel-disconnect');
    const typingIndicator = document.getElementById('typing-indicator');
    const countdownTimer = document.getElementById('countdown-timer');
    const countdownSpan = document.getElementById('countdown');
    const messageSound = document.getElementById('message-sound');
    const safeModeToggle = document.getElementById('safe-mode');
    const helpIcon = document.getElementById('help-icon');
    const vaultButton = document.getElementById('vault-button');
    const tagsModal = document.getElementById('tags-modal');
    const contactModal = document.getElementById('contact-modal');
    const vaultModal = document.getElementById('vault-modal');
    const modalOverlay = document.getElementById('modal-overlay');
    const tagsForm = document.getElementById('tags-form');
    const contactForm = document.getElementById('contact-form');
    const tagsInput = document.getElementById('tags-input');
    const submitTags = document.getElementById('submit-tags');
    const closeTags = document.getElementById('close-tags');
    const contactName = document.getElementById('contact-name');
    const contactEmail = document.getElementById('contact-email');
    const contactMessage = document.getElementById('contact-message');
    const submitContact = document.getElementById('submit-contact');
    const closeContact = document.getElementById('close-contact');
    const closeVault = document.getElementById('close-vault');
    const trendingTags = document.getElementById('trending-tags');
    const vaultGallery = document.getElementById('vault-gallery');

    // State
    let isTyping = false;
    let typingTimeout;
    let selectedText = '';

    // Sanitize input to prevent XSS
    function sanitizeInput(input) {
      const div = document.createElement('div');
      div.textContent = input;
      return div.innerHTML;
    }

    // Fetch trending tags
    function fetchTrendingTags() {
      socket.emit('get_trending_tags');
    }

    // Render trending tags
    socket.on('trending_tags', (tags) => {
      trendingTags.innerHTML = '';
      tags.forEach(tag => {
        const tagBtn = document.createElement('div');
        tagBtn.className = 'trending-tag';
        tagBtn.textContent = tag;
        tagBtn.addEventListener('click', () => {
          const currentTags = tagsInput.value.split(',').map(t => t.trim()).filter(t => t);
          if (!currentTags.includes(tag)) {
            tagsInput.value = [...currentTags, tag].join(', ');
          }
        });
        trendingTags.appendChild(tagBtn);
      });
    });

    // Fetch vault quotes
    function fetchVaultQuotes() {
      socket.emit('get_vault_quotes');
    }

    // Render vault quotes
    socket.on('vault_quotes', (quotes) => {
      vaultGallery.innerHTML = '';
      quotes.sort((a, b) => b.votes - a.votes); // Sort by votes descending
      quotes.forEach(quote => {
        const quoteEntry = document.createElement('div');
        quoteEntry.className = 'quote-entry';
        quoteEntry.innerHTML = `
          <div class="quote-text">${sanitizeInput(quote.text)}</div>
          <div class="quote-meta">
            <span>${new Date(quote.timestamp).toLocaleString()}</span>
            <div class="vote-buttons">
              <button class="vote-btn upvote" data-id="${quote.id}">↑ ${quote.votes}</button>
              <button class="vote-btn downvote" data-id="${quote.id}">↓</button>
            </div>
          </div>
        `;
        vaultGallery.appendChild(quoteEntry);
      });

      // Add vote button listeners
      document.querySelectorAll('.vote-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          const quoteId = btn.dataset.id;
          const voteType = btn.classList.contains('upvote') ? 'upvote' : 'downvote';
          socket.emit('vote_quote', { quoteId, voteType });
        });
      });
    });

    // Socket.IO event handlers
    socket.on('connect', () => {
      console.log('Connected to backend, Socket ID:', socket.id);
      chatLog.innerHTML += '<p>Connected to server.</p>';
      chatLog.scrollTop = chatLog.scrollHeight;
      fetchTrendingTags();
      fetchVaultQuotes();
    });

    socket.on('connect_error', (err) => {
      console.error('Connection error:', err.message);
      chatLog.innerHTML += `<p style="color: #ff5252;">Error: Failed to connect to server - ${err.message}</p>`;
      chatLog.scrollTop = chatLog.scrollHeight;
    });

    socket.on('message', (msg) => {
      console.log('Received message:', msg, 'Socket ID:', socket.id);
      const msgElement = document.createElement('p');
      msgElement.className = 'stranger';
      msgElement.innerHTML = `<strong>Stranger:</strong> ${sanitizeInput(msg)}<button class="save-quote-btn">Save to Vault</button>`;
      chatLog.appendChild(msgElement);
      messageSound.play().catch(err => console.error('Audio playback error:', err));
      chatLog.scrollTop = chatLog.scrollHeight;

      // Add save quote listener
      msgElement.querySelector('.save-quote-btn').addEventListener('click', () => {
        const selected = window.getSelection().toString().trim() || msg;
        if (selected) {
          socket.emit('save_quote', selected);
        }
      });
    });

    socket.on('typing', (isTyping) => {
      console.log('Typing status:', isTyping, 'Socket ID:', socket.id);
      typingIndicator.style.display = isTyping ? 'block' : 'none';
      chatLog.scrollTop = chatLog.scrollHeight;
    });

    socket.on('countdown', (seconds) => {
      console.log('Countdown:', seconds, 'Socket ID:', socket.id);
      countdownSpan.textContent = seconds;
      countdownTimer.style.display = 'block';
    });

    socket.on('countdown_cancelled', () => {
      console.log('Countdown cancelled, Socket ID:', socket.id);
      countdownTimer.style.display = 'none';
      cancelDisconnectBtn.style.display = 'none';
      endChatBtn.style.display = 'inline';
      reportUserBtn.style.display = 'inline';
      chatInput.disabled = false;
      chatInput.focus();
    });

    socket.on('paired', () => {
      console.log('Paired with a stranger, Socket ID:', socket.id);
      chatLog.innerHTML += '<p>Connected to a stranger!</p>';
      safeModeToggle.checked = true;
      chatLog.scrollTop = chatLog.scrollHeight;
    });

    socket.on('disconnected', () => {
      console.log('Stranger disconnected, Socket ID:', socket.id);
      chatLog.innerHTML += '<p>Stranger disconnected.</p>';
      startChatBtn.style.display = 'inline';
      endChatBtn.style.display = 'none';
      reportUserBtn.style.display = 'none';
      cancelDisconnectBtn.style.display = 'none';
      countdownTimer.style.display = 'none';
      chatInput.disabled = true;
      typingIndicator.style.display = 'none';
      chatLog.scrollTop = chatLog.scrollHeight;
    });

    socket.on('error', (msg) => {
      console.error('Server error:', msg, 'Socket ID:', socket.id);
      chatLog.innerHTML += `<p style="color: #ff5252;">Error: ${msg}</p>`;
      chatLog.scrollTop = chatLog.scrollHeight;
      if (msg.includes('banned')) {
        startChatBtn.style.display = 'none';
        endChatBtn.style.display = 'none';
        reportUserBtn.style.display = 'none';
        cancelDisconnectBtn.style.display = 'none';
        chatInput.disabled = true;
      }
    });

    socket.on('request_success', (msg) => {
      console.log('Request success:', msg, 'Socket ID:', socket.id);
      chatLog.innerHTML += `<p style="color: #4caf50;">${msg}</p>`;
      chatLog.scrollTop = chatLog.scrollHeight;
      contactModal.style.display = 'none';
      modalOverlay.style.display = 'none';
    });

    socket.on('quote_saved', (msg) => {
      console.log('Quote saved:', msg, 'Socket ID:', socket.id);
      chatLog.innerHTML += `<p style="color: #4caf50;">${msg}</p>`;
      chatLog.scrollTop = chatLog.scrollHeight;
      fetchVaultQuotes();
    });

    // DOM event listeners
    startChatBtn.addEventListener('click', () => {
      console.log('Start chat clicked, Socket ID:', socket.id);
      tagsModal.style.display = 'block';
      modalOverlay.style.display = 'block';
      tagsInput.focus();
    });

    submitTags.addEventListener('click', () => {
      const tags = tagsInput.value.split(',').map(t => sanitizeInput(t.trim())).filter(t => t);
      if (tags.length === 0) {
        chatLog.innerHTML += `<p style="color: #ff5252;">Error: At least one tag is required.</p>`;
        chatLog.scrollTop = chatLog.scrollHeight;
        return;
      }
      console.log('Submitting tags:', tags, 'Socket ID:', socket.id);
      socket.emit('join', tags);
      tagsModal.style.display = 'none';
      modalOverlay.style.display = 'none';
      startChatBtn.style.display = 'none';
      endChatBtn.style.display = 'inline';
      reportUserBtn.style.display = 'inline';
      chatInput.disabled = false;
      chatInput.focus();
      chatLog.innerHTML += '<p>Connecting to a stranger...</p>';
      chatLog.scrollTop = chatLog.scrollHeight;
    });

    closeTags.addEventListener('click', () => {
      tagsModal.style.display = 'none';
      modalOverlay.style.display = 'none';
    });

    endChatBtn.addEventListener('click', () => {
      console.log('End chat clicked, Socket ID:', socket.id);
      socket.emit('leave');
      endChatBtn.style.display = 'none';
      cancelDisconnectBtn.style.display = 'inline';
      countdownTimer.style.display = 'block';
      chatInput.disabled = true;
    });

    cancelDisconnectBtn.addEventListener('click', () => {
      console.log('Cancel disconnect clicked, Socket ID:', socket.id);
      socket.emit('cancel_disconnect');
      cancelDisconnectBtn.style.display = 'none';
      endChatBtn.style.display = 'inline';
      countdownTimer.style.display = 'none';
      chatInput.disabled = false;
      chatInput.focus();
    });

    reportUserBtn.addEventListener('click', () => {
      console.log('Report user clicked, Socket ID:', socket.id);
      socket.emit('report', { timestamp: new Date().toISOString() });
      chatLog.innerHTML += '<p>User reported to moderators.</p>';
      chatLog.scrollTop = chatLog.scrollHeight;
    });

    safeModeToggle.addEventListener('change', () => {
      const safeMode = safeModeToggle.checked;
      console.log('Safe Mode toggled:', safeMode, 'Socket ID:', socket.id);
      socket.emit('toggle_safe_mode', safeMode);
    });

    helpIcon.addEventListener('click', () => {
      console.log('Help icon clicked, Socket ID:', socket.id);
      contactModal.style.display = 'block';
      modalOverlay.style.display = 'block';
      contactName.value = '';
      contactEmail.value = '';
      contactMessage.value = '';
      contactMessage.focus();
    });

    vaultButton.addEventListener('click', () => {
      console.log('Vault button clicked, Socket ID:', socket.id);
      vaultModal.style.display = 'block';
      modalOverlay.style.display = 'block';
      fetchVaultQuotes();
    });

    closeContact.addEventListener('click', () => {
      contactModal.style.display = 'none';
      modalOverlay.style.display = 'none';
    });

    closeVault.addEventListener('click', () => {
      vaultModal.style.display = 'none';
      modalOverlay.style.display = 'none';
    });

    modalOverlay.addEventListener('click', () => {
      tagsModal.style.display = 'none';
      contactModal.style.display = 'none';
      vaultModal.style.display = 'none';
      modalOverlay.style.display = 'none';
    });

    submitContact.addEventListener('click', () => {
      console.log('Submit contact clicked, Socket ID:', socket.id);
      const request = {
        name: sanitizeInput(contactName.value.trim()),
        email: sanitizeInput(contactEmail.value.trim()),
        message: sanitizeInput(contactMessage.value.trim())
      };
      socket.emit('submit_request', request);
    });

    chatInput.addEventListener('input', () => {
      if (chatInput.value.trim() && !isTyping) {
        isTyping = true;
        socket.emit('typing', true);
      } else if (!chatInput.value.trim() && isTyping) {
        isTyping = false;
        socket.emit('typing', false);
      }
      clearTimeout(typingTimeout);
      typingTimeout = setTimeout(() => {
        if (isTyping) {
          isTyping = false;
          socket.emit('typing', false);
        }
      }, 2000);
    });

    chatInput.addEventListener('keypress', (e) => {
      if (e.key === 'Enter' && chatInput.value.trim()) {
        console.log('Sending message:', chatInput.value, 'Socket ID:', socket.id);
        const msg = sanitizeInput(chatInput.value);
        socket.emit('message', msg);
        const msgElement = document.createElement('p');
        msgElement.className = 'you';
        msgElement.innerHTML = `<strong>You:</strong> ${msg}<button class="save-quote-btn">Save to Vault</button>`;
        chatLog.appendChild(msgElement);
        chatInput.value = '';
        isTyping = false;
        socket.emit('typing', false);
        chatLog.scrollTop = chatLog.scrollHeight;

        // Add save quote listener
        msgElement.querySelector('.save-quote-btn').addEventListener('click', () => {
          const selected = window.getSelection().toString().trim() || msg;
          if (selected) {
            socket.emit('save_quote', selected);
          }
        });
      }
    });
  </script>
</body>
</html>
