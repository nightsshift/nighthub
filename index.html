<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Night Hub - Anonymous Chat</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Roboto+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
    }
    body {
      font-family: 'Orbitron', sans-serif;
      background: linear-gradient(135deg, #0a0a0a 0%, #1a1f26 50%, #0a0a0a 100%);
      color: #e0e0e0;
      min-height: 100dvh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 1rem;
      overflow: hidden;
      position: relative;
      animation: gradientShift 20s ease infinite;
      background-size: 200% 200%;
    }
    #particles {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -1;
      pointer-events: none;
    }
    @keyframes gradientShift {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }
    #chat-container {
      width: 100%;
      max-width: 650px;
      background: rgba(10, 10, 10, 0.85);
      border-radius: 16px;
      padding: 1.5rem;
      box-shadow: 0 0 40px rgba(187, 134, 252, 0.5), 0 0 15px rgba(2, 136, 209, 0.3);
      backdrop-filter: blur(10px);
      position: relative;
      z-index: 1;
      animation: fadeInContainer 1s ease-out;
    }
    @keyframes fadeInContainer {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    h1 {
      font-size: 2rem;
      color: #bb86fc;
      text-align: center;
      text-transform: uppercase;
      letter-spacing: 4px;
      margin-bottom: 1.5rem;
      text-shadow: 0 0 20px rgba(187, 134, 252, 0.8);
      animation: neonFlicker 3s infinite alternate;
    }
    @keyframes neonFlicker {
      0%, 100% { text-shadow: 0 0 10px #bb86fc, 0 0 20px #bb86fc; }
      50% { text-shadow: 0 0 15px #bb86fc, 0 0 30px #bb86fc; }
    }
    .top-controls {
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: absolute;
      top: 1rem;
      left: 1rem;
      right: 1rem;
    }
    .control-group {
      display: flex;
      gap: 0.5rem;
    }
    #safe-mode-toggle {
      display: flex;
      align-items: center;
      font-size: 0.9rem;
      color: #e0e0e0;
    }
    #safe-mode-toggle input {
      display: none;
    }
    #safe-mode-toggle label {
      cursor: pointer;
      padding: 0.5rem 1rem;
      border-radius: 20px;
      background: linear-gradient(45deg, #6200ea, #7b1fa2);
      transition: all 0.3s ease;
      box-shadow: 0 0 10px rgba(98, 0, 234, 0.4);
      font-family: 'Roboto Mono', monospace;
    }
    #safe-mode-toggle input:checked + label {
      background: linear-gradient(45deg, #0288d1, #01579b);
      box-shadow: 0 0 10px rgba(2, 136, 209, 0.6);
    }
    #help-icon {
      width: 2.5rem;
      height: 2.5rem;
      display: flex;
      justify-content: center;
      align-items: center;
      border-radius: 50%;
      background: linear-gradient(45deg, #bb86fc, #6200ea);
      color: #fff;
      font-size: 1.2rem;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 0 12px rgba(187, 134, 252, 0.5);
      will-change: transform;
    }
    #help-icon:hover {
      transform: scale(1.15) rotate(5deg);
      box-shadow: 0 0 20px rgba(187, 134, 252, 0.8);
    }
    #modal-overlay {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.85);
      z-index: 999;
      backdrop-filter: blur(5px);
      animation: fadeInOverlay 0.3s ease;
    }
    @keyframes fadeInOverlay {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    #tags-modal, #contact-modal, #admin-modal {
      display: none;
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) scale(0.9);
      width: 90%;
      max-width: 800px;
      background: rgba(15, 15, 15, 0.9);
      border: 2px solid #bb86fc;
      border-radius: 16px;
      padding: 1.5rem;
      box-shadow: 0 0 50px rgba(187, 134, 252, 0.6);
      backdrop-filter: blur(12px);
      z-index: 1000;
      animation: popIn 0.4s ease-out forwards;
      max-height: 90vh;
      overflow-y: auto;
    }
    @keyframes popIn {
      from { transform: translate(-50%, -50%) scale(0.9); opacity: 0; }
      to { transform: translate(-50%, -50%) scale(1); opacity: 1; }
    }
    #tags-modal h2, #contact-modal h2, #admin-modal h2 {
      font-size: 1.5rem;
      color: #bb86fc;
      text-align: center;
      text-shadow: 0 0 15px rgba(187, 134, 252, 0.7);
      margin-bottom: 1rem;
    }
    #tags-form, #contact-form, #admin-content {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }
    #tags-form input, #contact-form input, #contact-form textarea {
      padding: 0.75rem;
      border: 1px solid #bb86fc;
      border-radius: 8px;
      background: rgba(30, 30, 30, 0.9);
      color: #e0e0e0;
      font-family: 'Roboto Mono', monospace;
      font-size: 0.95rem;
      transition: all 0.3s ease;
    }
    #tags-form textarea, #contact-form textarea {
      resize: vertical;
      min-height: 100px;
    }
    #tags-form input:focus, #contact-form input:focus, #contact-form textarea:focus {
      outline: none;
      border-color: #0288d1;
      box-shadow: 0 0 15px rgba(2, 136, 209, 0.6);
    }
    #tags-form button, #contact-form button, #admin-content button {
      padding: 0.75rem;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      background: linear-gradient(45deg, #bb86fc, #6200ea);
      color: #fff;
      font-size: 0.95rem;
      text-transform: uppercase;
      font-family: 'Orbitron', sans-serif;
      transition: all 0.3s ease;
      box-shadow: 0 0 12px rgba(187, 134, 252, 0.5);
    }
    #tags-form button:hover, #contact-form button:hover, #admin-content button:hover {
      transform: scale(1.05);
      box-shadow: 0 0 20px rgba(187, 134, 252, 0.8);
      animation: pulseButton 1.5s infinite;
    }
    @keyframes pulseButton {
      0% { box-shadow: 0 0 12px rgba(187, 134, 252, 0.5); }
      50% { box-shadow: 0 0 20px rgba(187, 134, 252, 0.8); }
      100% { box-shadow: 0 0 12px rgba(187, 134, 252, 0.5); }
    }
    #tags-form .close-button, #contact-form .close-button, #admin-content .close-button {
      background: linear-gradient(45deg, #ff5252, #d32f2f);
    }
    #tags-form .close-button:hover, #contact-form .close-button:hover, #admin-content .close-button:hover {
      box-shadow: 0 0 20px rgba(255, 82, 82, 0.8);
    }
    #trending-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      margin-bottom: 1rem;
    }
    .trending-tag {
      padding: 0.5rem 1rem;
      border-radius: 20px;
      background: linear-gradient(45deg, #0288d1, #01579b);
      color: #e0e0e0;
      font-size: 0.85rem;
      cursor: pointer;
      transition: all 0.3s ease;
      font-family: 'Roboto Mono', monospace;
    }
    .trending-tag:hover {
      transform: scale(1.1);
      box-shadow: 0 0 12px rgba(2, 136, 209, 0.7);
    }
    #chat-log {
      height: 50vh;
      max-height: 450px;
      overflow-y: auto;
      background: rgba(20, 20, 20, 0.9);
      border-radius: 12px;
      padding: 1rem;
      margin-bottom: 1rem;
      border: 1px solid #bb86fc;
      box-shadow: inset 0 0 15px rgba(187, 134, 252, 0.3);
      scrollbar-width: thin;
      scrollbar-color: #bb86fc #1e1e1e;
      -webkit-overflow-scrolling: touch;
    }
    #chat-log::-webkit-scrollbar {
      width: 6px;
    }
    #chat-log::-webkit-scrollbar-track {
      background: #1e1e1e;
    }
    #chat-log::-webkit-scrollbar-thumb {
      background: #bb86fc;
      border-radius: 3px;
    }
    #chat-log p {
      margin: 0.5rem 0;
      padding: 0.75rem 1rem;
      border-radius: 10px;
      opacity: 0;
      animation: fadeInMessage 0.5s ease forwards;
      font-family: 'Roboto Mono', monospace;
      font-size: 0.95rem;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
      position: relative;
      user-select: text;
    }
    @keyframes fadeInMessage {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    #chat-log p:hover {
      transform: translateY(-2px);
      box-shadow: 0 5px 15px rgba(0, 0, 0, 0.4);
    }
    #chat-log .you {
      background: linear-gradient(45deg, #6200ea, #7b1fa2);
      color: #fff;
      margin-left: 15%;
      margin-right: 1rem;
      box-shadow: 0 3px 12px rgba(98, 0, 234, 0.6);
    }
    #chat-log .stranger {
      background: linear-gradient(45deg, #0288d1, #01579b);
      color: #e0e0e0;
      margin-right: 15%;
      margin-left: 1rem;
      box-shadow: 0 3px 12px rgba(2, 136, 209, 0.6);
    }
    #typing-indicator {
      font-size: 0.9rem;
      color: #bb86fc;
      margin: 0.5rem 1rem;
      display: none;
      animation: pulse 1.5s infinite;
      font-family: 'Roboto Mono', monospace;
    }
    #countdown-timer {
      display: none;
      text-align: center;
      font-size: 1rem;
      color: #ff5252;
      margin: 0.5rem 0;
      text-shadow: 0 0 10px rgba(255, 82, 82, 0.6);
      font-family: 'Roboto Mono', monospace;
    }
    #chat-input {
      width: 100%;
      padding: 0.75rem;
      border: 1px solid #bb86fc;
      border-radius: 8px;
      background: rgba(30, 30, 30, 0.9);
      color: #e0e0e0;
      font-family: 'Roboto Mono', monospace;
      font-size: 1rem;
      margin-bottom: 1rem;
      transition: all 0.3s ease;
    }
    #chat-input:focus {
      outline: none;
      border-color: #0288d1;
      box-shadow: 0 0 15px rgba(2, 136, 209, 0.6);
    }
    .button-group {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
      gap: 0.75rem;
    }
    button {
      padding: 0.75rem;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      background: linear-gradient(45deg, #bb86fc, #6200ea);
      color: #fff;
      font-size: 0.95rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      font-family: 'Orbitron', sans-serif;
      transition: all 0.3s ease;
      box-shadow: 0 3px 12px rgba(187, 134, 252, 0.5);
    }
    button:hover {
      transform: scale(1.05);
      box-shadow: 0 0 20px rgba(187, 134, 252, 0.8);
      animation: pulseButton 1.5s infinite;
    }
    button:active {
      transform: scale(0.95);
    }
    #cancel-disconnect {
      background: linear-gradient(45deg, #ff5252, #d32f2f);
    }
    #cancel-disconnect:hover {
      box-shadow: 0 0 20px rgba(255, 82, 82, 0.8);
    }
    #admin-content table {
      width: 100%;
      border-collapse: collapse;
      font-family: 'Roboto Mono', monospace;
      font-size: 0.9rem;
    }
    #admin-content th, #admin-content td {
      padding: 0.5rem;
      border: 1px solid #bb86fc;
      text-align: left;
    }
    #admin-content th {
      background: linear-gradient(45deg, #6200ea, #7b1fa2);
      color: #fff;
    }
    #admin-content td {
      background: rgba(30, 30, 30, 0.9);
    }
    #admin-content .ban-button {
      background: linear-gradient(45deg, #ff5252, #d32f2f);
    }
    #admin-content .unban-button {
      background: linear-gradient(45deg, #4caf50, #2e7d32);
    }
    #admin-content .observe-button {
      background: linear-gradient(45deg, #0288d1, #01579b);
    }
    #admin-content .flagged {
      background: rgba(255, 82, 82, 0.3);
    }
    #admin-chat-log {
      height: 200px;
      overflow-y: auto;
      background: rgba(20, 20, 20, 0.9);
      border-radius: 12px;
      padding: 1rem;
      margin: 1rem 0;
      border: 1px solid #bb86fc;
      scrollbar-width: thin;
      scrollbar-color: #bb86fc #1e1e1e;
    }
    #admin-chat-log::-webkit-scrollbar {
      width: 6px;
    }
    #admin-chat-log::-webkit-scrollbar-track {
      background: #1e1e1e;
    }
    #admin-chat-log::-webkit-scrollbar-thumb {
      background: #bb86fc;
      border-radius: 3px;
    }
    #admin-chat-log p {
      margin: 0.5rem 0;
      font-family: 'Roboto Mono', monospace;
      font-size: 0.9rem;
      color: #e0e0e0;
    }
    #stats-section {
      display: flex;
      flex-wrap: wrap;
      gap: 1rem;
      margin-bottom: 1rem;
    }
    .stat-card {
      flex: 1;
      min-width: 150px;
      background: rgba(30, 30, 30, 0.9);
      padding: 1rem;
      border-radius: 8px;
      border: 1px solid #bb86fc;
      text-align: center;
      font-family: 'Roboto Mono', monospace;
      font-size: 0.9rem;
    }
    .stat-card h3 {
      color: #bb86fc;
      margin-bottom: 0.5rem;
    }
    @media (max-width: 768px) {
      body {
        padding: 0.5rem;
      }
      #chat-container, #admin-modal {
        padding: 1rem;
        border-radius: 12px;
      }
      h1 {
        font-size: 1.5rem;
        letter-spacing: 2px;
      }
      #chat-log, #admin-chat-log {
        height: 40vh;
        max-height: 350px;
      }
      #chat-log p, #admin-chat-log p {
        font-size: 0.85rem;
        padding: 0.5rem 0.75rem;
      }
      #chat-input {
        font-size: 0.9rem;
        padding: 0.6rem;
      }
      .button-group {
        grid-template-columns: 1fr;
      }
      button {
        font-size: 0.9rem;
        padding: 0.6rem;
      }
      .top-controls {
        top: 0.5rem;
        left: 0.5rem;
        right: 0.5rem;
      }
      #safe-mode-toggle label {
        font-size: 0.8rem;
        padding: 0.4rem 0.8rem;
      }
      #help-icon {
        width: 2rem;
        height: 2rem;
        font-size: 1rem;
      }
      #tags-modal, #contact-modal, #admin-modal {
        width: 95%;
        padding: 1rem;
        max-height: 90vh;
        overflow-y: auto;
      }
      #tags-modal h2, #contact-modal h2, #admin-modal h2 {
        font-size: 1.2rem;
      }
      #tags-form input, #contact-form input, #contact-form textarea {
        font-size: 0.85rem;
        padding: 0.6rem;
      }
      #tags-form button, #contact-form button, #admin-content button {
        font-size: 0.9rem;
        padding: 0.6rem;
      }
      .trending-tag {
        font-size: 0.8rem;
        padding: 0.4rem 0.8rem;
      }
      #admin-content table {
        font-size: 0.8rem;
      }
      .stat-card {
        min-width: 120px;
        font-size: 0.8rem;
      }
    }
    @media (max-width: 480px) {
      h1 {
        font-size: 1.2rem;
      }
      #chat-log, #admin-chat-log {
        height: 35vh;
        max-height: 300px;
      }
      #chat-input {
        font-size: 0.85rem;
      }
      button {
        font-size: 0.85rem;
      }
      #safe-mode-toggle label {
        font-size: 0.75rem;
      }
      #help-icon {
        width: 1.8rem;
        height: 1.8rem;
        font-size: 0.9rem;
      }
      #tags-modal, #contact-modal, #admin-modal {
        padding: 0.75rem;
      }
      #tags-modal h2, #contact-modal h2, #admin-modal h2 {
        font-size: 1rem;
      }
    }
  </style>
</head>
<body>
  <canvas id="particles"></canvas>
  <div id="modal-overlay"></div>
  <div id="tags-modal">
    <h2>Select Your Interests</h2>
    <div id="tags-form">
      <div id="trending-tags"></div>
      <input id="tags-input" type="text" placeholder="Enter tags (e.g., coding, movies, separated by commas)">
      <button id="submit-tags">Join Chat</button>
      <button class="close-button" id="close-tags">Close</button>
    </div>
  </div>
  <div id="contact-modal">
    <h2>Contact Us</h2>
    <div id="contact-form">
      <input type="text" id="contact-name" placeholder="Name (optional)">
      <input type="email" id="contact-email" placeholder="Email (optional)">
      <textarea id="contact-message" placeholder="Your message (required)"></textarea>
      <button id="submit-contact">Submit</button>
      <button class="close-button" id="close-contact">Close</button>
    </div>
  </div>
  <div id="admin-modal">
    <h2>Admin Dashboard</h2>
    <div id="admin-content">
      <div id="stats-section">
        <div class="stat-card">
          <h3>Online Users</h3>
          <p id="online-users">0</p>
        </div>
        <div class="stat-card">
          <h3>Active Chats</h3>
          <p id="active-chats">0</p>
        </div>
        <div class="stat-card">
          <h3>Messages Sent</h3>
          <p id="messages-sent">0</p>
        </div>
        <div class="stat-card">
          <h3>Reports Filed</h3>
          <p id="reports-filed">0</p>
        </div>
      </div>
      <h3>User Management</h3>
      <table id="user-table">
        <thead>
          <tr>
            <th>User ID</th>
            <th>Socket ID</th>
            <th>Reports</th>
            <th>Ban Status</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="user-table-body"></tbody>
      </table>
      <h3>Live Chats</h3>
      <table id="chat-table">
        <thead>
          <tr>
            <th>Pair ID</th>
            <th>User IDs</th>
            <th>Reports</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="chat-table-body"></tbody>
      </table>
      <div id="admin-chat-log"></div>
      <button class="close-button" id="close-admin">Close</button>
    </div>
  </div>
  <div id="chat-container">
    <h1>Night Hub</h1>
    <div class="top-controls">
      <div class="control-group">
        <div id="help-icon" title="Contact Us">?</div>
      </div>
      <div class="control-group">
        <div id="safe-mode-toggle">
          <input type="checkbox" id="safe-mode" checked>
          <label for="safe-mode">Safe Mode</label>
        </div>
      </div>
    </div>
    <div id="chat-log"></div>
    <div id="typing-indicator">Stranger is typing...</div>
    <div id="countdown-timer">Disconnecting in <span id="countdown">5</span> seconds...</div>
    <input id="chat-input" type="text" placeholder="Type your message..." disabled>
    <div class="button-group">
      <button id="start-chat">Start Chat</button>
      <button id="end-chat" style="display:none;">End Chat</button>
      <button id="report-user" style="display:none;">Report User</button>
      <button id="cancel-disconnect" style="display:none;">Cancel Disconnect</button>
    </div>
  </div>
  <audio id="message-sound" src="/assets/Notification.mp3"></audio>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.5/socket.io.js"></script>
  <script>
    // Particle background effect
    const canvas = document.getElementById('particles');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    const particles = [];
    const particleCount = 100;

    class Particle {
      constructor() {
        this.x = Math.random() * canvas.width;
        this.y = Math.random() * canvas.height;
        this.size = Math.random() * 2 + 0.5;
        this.speedX = Math.random() * 0.2 - 0.1;
        this.speedY = Math.random() * 0.2 - 0.1;
        this.opacity = Math.random() * 0.5 + 0.2;
      }
      update() {
        this.x += this.speedX;
        this.y += this.speedY;
        if (this.x < 0 || this.x > canvas.width) this.speedX *= -1;
        if (this.y < 0 || this.y > canvas.height) this.speedY *= -1;
        this.opacity += Math.random() * 0.02 - 0.01;
        if (this.opacity < 0.2) this.opacity = 0.2;
        if (this.opacity > 0.7) this.opacity = 0.7;
      }
      draw() {
        ctx.fillStyle = `rgba(187, 134, 252, ${this.opacity})`;
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        ctx.fill();
      }
    }

    function initParticles() {
      for (let i = 0; i < particleCount; i++) {
        particles.push(new Particle());
      }
    }

    function animateParticles() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      particles.forEach(p => {
        p.update();
        p.draw();
      });
      requestAnimationFrame(animateParticles);
    }

    window.addEventListener('resize', () => {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    });

    initParticles();
    animateParticles();

    // Socket.IO connection
    const socket = io('https://nighthub-backend.onrender.com', {
      transports: ['websocket'],
      reconnectionAttempts: 5
    });

    // DOM elements
    const chatLog = document.getElementById('chat-log');
    const chatInput = document.getElementById('chat-input');
    const startChatBtn = document.getElementById('start-chat');
    const endChatBtn = document.getElementById('end-chat');
    const reportUserBtn = document.getElementById('report-user');
    const cancelDisconnectBtn = document.getElementById('cancel-disconnect');
    const typingIndicator = document.getElementById('typing-indicator');
    const countdownSpan = document.getElementById('countdown');
    const countdownTimer = document.getElementById('countdown-timer');
    const messageSound = document.getElementById('message-sound');
    const safeModeToggle = document.getElementById('safe-mode');
    const helpIcon = document.getElementById('help-icon');
    const tagsModal = document.getElementById('tags-modal');
    const contactModal = document.getElementById('contact-modal');
    const adminModal = document.getElementById('admin-modal');
    const modalOverlay = document.getElementById('modal-overlay');
    const tagsForm = document.getElementById('tags-form');
    const contactForm = document.getElementById('contact-form');
    const tagsInput = document.getElementById('tags-input');
    const submitTags = document.getElementById('submit-tags');
    const closeTags = document.getElementById('close-tags');
    const contactName = document.getElementById('contact-name');
    const contactEmail = document.getElementById('contact-email');
    const contactMessage = document.getElementById('contact-message');
    const submitContact = document.getElementById('submit-contact');
    const closeContact = document.getElementById('close-contact');
    const closeAdmin = document.getElementById('close-admin');
    const userTableBody = document.getElementById('user-table-body');
    const chatTableBody = document.getElementById('chat-table-body');
    const adminChatLog = document.getElementById('admin-chat-log');
    const onlineUsers = document.getElementById('online-users');
    const activeChats = document.getElementById('active-chats');
    const messagesSent = document.getElementById('messages-sent');
    const reportsFiled = document.getElementById('reports-filed');
    const trendingTags = document.getElementById('trending-tags');

    // State
    let isTyping = false;
    let typingTimeout;
    let currentObservedPairId = null;

    // Sanitize input
    function sanitizeInput(input) {
      const div = document.createElement('div');
      div.textContent = input;
      return div.innerHTML;
    }

    // Fetch trending tags
    function fetchTrendingTags() {
      socket.emit('get_trending_tags');
    }

    // Render trending tags
    socket.on('trending_tags', (tags) => {
      trendingTags.innerHTML = '';
      tags.forEach(tag => {
        const tagBtn = document.createElement('div');
        tagBtn.className = 'trending-tag';
        tagBtn.textContent = tag;
        tagBtn.addEventListener('click', () => {
          const currentTags = tagsInput.value.split(',').map(t => t.trim()).filter(t => t);
          if (!currentTags.includes(tag)) {
            tagsInput.value = [...currentTags, tag].join(', ');
          }
        });
        trendingTags.appendChild(tagBtn);
      });
    });

    // Render admin dashboard
    function renderAdminDashboard(data) {
      // Update stats
      onlineUsers.textContent = data.onlineUsers;
      activeChats.textContent = data.activeChats;
      messagesSent.textContent = data.messagesSent;
      reportsFiled.textContent = data.reportsFiled;

      // Update user table
      userTableBody.innerHTML = '';
      data.users.forEach(user => {
        const row = document.createElement('tr');
        row.innerHTML = `
          <td>${sanitizeInput(user.userId)}</td>
          <td>${sanitizeInput(user.socketId)}</td>
          <td>${user.reports}</td>
          <td>${user.isBanned ? `Banned (${user.banDuration === Infinity ? 'Permanent' : `${Math.ceil((user.banEnd - Date.now()) / 60000)} min`})` : 'Not Banned'}</td>
          <td>
            <button class="ban-button" data-userid="${sanitizeInput(user.userId)}" ${user.isBanned ? 'disabled' : ''}>Ban</button>
            <button class="unban-button" data-userid="${sanitizeInput(user.userId)}" ${!user.isBanned ? 'disabled' : ''}>Unban</button>
          </td>
        `;
        userTableBody.appendChild(row);
      });

      // Update chat table
      chatTableBody.innerHTML = '';
      data.chats.forEach(chat => {
        const row = document.createElement('tr');
        row.className = chat.reports >= 5 ? 'flagged' : '';
        row.innerHTML = `
          <td>${sanitizeInput(chat.pairId)}</td>
          <td>${sanitizeInput(chat.userIds.join(', '))}</td>
          <td>${chat.reports}</td>
          <td>
            <button class="observe-button" data-pairid="${sanitizeInput(chat.pairId)}">Observe</button>
          </td>
        `;
        chatTableBody.appendChild(row);
      });

      // Add event listeners for ban/unban
      document.querySelectorAll('.ban-button').forEach(btn => {
        btn.addEventListener('click', () => {
          const userId = btn.dataset.userid;
          socket.emit('admin_ban', { userId, duration: 30 * 60 * 1000 }); // 30 min ban
        });
      });
      document.querySelectorAll('.unban-button').forEach(btn => {
        btn.addEventListener('click', () => {
          const userId = btn.dataset.userid;
          socket.emit('admin_unban', { userId });
        });
      });

      // Add event listeners for observe
      document.querySelectorAll('.observe-button').forEach(btn => {
        btn.addEventListener('click', () => {
          const pairId = btn.dataset.pairid;
          if (currentObservedPairId) {
            socket.emit('admin_leave_chat', { pairId: currentObservedPairId });
          }
          socket.emit('admin_observe_chat', { pairId });
          currentObservedPairId = pairId;
          adminChatLog.innerHTML = `<p>Observing chat ${sanitizeInput(pairId)}...</p>`;
        });
      });
    }

    // Socket.IO event handlers
    socket.on('connect', () => {
      console.log('Connected to backend, Socket ID:', socket.id);
      chatLog.innerHTML += '<p>Connected to server.</p>';
      chatLog.scrollTop = chatLog.scrollHeight;
      fetchTrendingTags();
    });

    socket.on('connect_error', (err) => {
      console.error('Connection error:', err.message);
      chatLog.innerHTML += `<p style="color: #ff5252;">Error: Failed to connect to server - ${err.message}</p>`;
      chatLog.scrollTop = chatLog.scrollHeight;
    });

    socket.on('message', (msg) => {
      console.log('Received message:', msg, 'Socket ID:', socket.id);
      const msgElement = document.createElement('p');
      msgElement.className = 'stranger';
      msgElement.innerHTML = `<strong>Stranger:</strong> ${sanitizeInput(msg)}`;
      chatLog.appendChild(msgElement);
      messageSound.play().catch(err => console.error('Audio playback error:', err));
      chatLog.scrollTop = chatLog.scrollHeight;
    });

    socket.on('typing', (isTyping) => {
      console.log('Typing status:', isTyping, 'Socket ID:', socket.id);
      typingIndicator.style.display = isTyping ? 'block' : 'none';
      chatLog.scrollTop = chatLog.scrollHeight;
    });

    socket.on('countdown', (seconds) => {
      console.log('Countdown:', seconds, 'Socket ID:', socket.id);
      countdownSpan.textContent = seconds;
      countdownTimer.style.display = 'block';
    });

    socket.on('countdown_cancelled', () => {
      console.log('Countdown cancelled, Socket ID:', socket.id);
      countdownTimer.style.display = 'none';
      cancelDisconnectBtn.style.display = 'none';
      endChatBtn.style.display = 'inline';
      reportUserBtn.style.display = 'inline';
      chatInput.disabled = false;
      chatInput.focus();
    });

    socket.on('paired', () => {
      console.log('Paired with a stranger, Socket ID:', socket.id);
      chatLog.innerHTML += '<p>Connected to a stranger!</p>';
      safeModeToggle.checked = true;
      chatLog.scrollTop = chatLog.scrollHeight;
    });

    socket.on('disconnected', () => {
      console.log('Stranger disconnected, Socket ID:', socket.id);
      chatLog.innerHTML += '<p>Stranger disconnected.</p>';
      startChatBtn.style.display = 'inline';
      endChatBtn.style.display = 'none';
      reportUserBtn.style.display = 'none';
      cancelDisconnectBtn.style.display = 'none';
      countdownTimer.style.display = 'none';
      chatInput.disabled = true;
      typingIndicator.style.display = 'none';
      chatLog.scrollTop = chatLog.scrollHeight;
    });

    socket.on('error', (msg) => {
      console.error('Server error:', msg, 'Socket ID:', socket.id);
      chatLog.innerHTML += `<p style="color: #ff5252;">Error: ${msg}</p>`;
      chatLog.scrollTop = chatLog.scrollHeight;
      if (msg.includes('banned')) {
        startChatBtn.style.display = 'none';
        endChatBtn.style.display = 'none';
        reportUserBtn.style.display = 'none';
        cancelDisconnectBtn.style.display = 'none';
        chatInput.disabled = true;
      }
    });

    socket.on('request_success', (msg) => {
      console.log('Request success:', msg, 'Socket ID:', socket.id);
      chatLog.innerHTML += `<p style="color: #4caf50;">${msg}</p>`;
      chatLog.scrollTop = chatLog.scrollHeight;
      contactModal.style.display = 'none';
      modalOverlay.style.display = 'none';
    });

    socket.on('admin_data', (data) => {
      console.log('Received admin data:', data);
      renderAdminDashboard(data);
    });

    socket.on('admin_message', ({ pairId, userId, message }) => {
      if (pairId === currentObservedPairId) {
        const msgElement = document.createElement('p');
        msgElement.innerHTML = `<strong>User ${sanitizeInput(userId.slice(0, 8))}:</strong> ${sanitizeInput(message)}`;
        adminChatLog.appendChild(msgElement);
        adminChatLog.scrollTop = adminChatLog.scrollHeight;
      }
    });

    // DOM event listeners
    startChatBtn.addEventListener('click', () => {
      console.log('Start Chat clicked, Socket ID:', socket.id);
      tagsModal.style.display = 'block';
      modalOverlay.style.display = 'block';
      tagsInput.focus();
    });

    submitTags.addEventListener('click', () => {
      const tags = tagsInput.value.split(',').map(t => sanitizeInput(t.trim())).filter(t => t);
      if (tags.includes('ekandmc')) {
        console.log('Admin access requested, Socket ID:', socket.id);
        socket.emit('admin_login', { key: 'ekandmc' });
        tagsModal.style.display = 'none';
        modalOverlay.style.display = 'block';
        adminModal.style.display = 'block';
        tagsInput.value = '';
        return;
      }
      if (tags.length === 0) {
        chatLog.innerHTML += `<p style="color: #ff5252;">Error: At least one tag is required.</p>`;
        chatLog.scrollTop = chatLog.scrollHeight;
        return;
      }
      console.log('Submitting tags:', tags, 'Socket ID:', socket.id);
      socket.emit('join', tags);
      tagsModal.style.display = 'none';
      modalOverlay.style.display = 'none';
      startChatBtn.style.display = 'none';
      endChatBtn.style.display = 'inline';
      reportUserBtn.style.display = 'inline';
      chatInput.disabled = false;
      chatInput.focus();
      chatLog.innerHTML += '<p>Connecting to a stranger...</p>';
      chatLog.scrollTop = chatLog.scrollHeight;
    });

    closeTags.addEventListener('click', () => {
      tagsModal.style.display = 'none';
      modalOverlay.style.display = 'none';
    });

    endChatBtn.addEventListener('click', () => {
      console.log('End Chat clicked, Socket ID:', socket.id);
      socket.emit('leave');
      endChatBtn.style.display = 'none';
      cancelDisconnectBtn.style.display = 'inline';
      countdownTimer.style.display = 'block';
      chatInput.disabled = true;
    });

    cancelDisconnectBtn.addEventListener('click', () => {
      console.log('Cancel Disconnect clicked, Socket ID:', socket.id);
      socket.emit('cancel_disconnect');
      cancelDisconnectBtn.style.display = 'none';
      endChatBtn.style.display = 'inline';
      countdownTimer.style.display = 'none';
      chatInput.disabled = false;
      chatInput.focus();
    });

    reportUserBtn.addEventListener('click', () => {
      console.log('Report User clicked, Socket ID:', socket.id);
      socket.emit('report', { timestamp: new Date().toISOString() });
      chatLog.innerHTML += '<p>User reported to moderators.</p>';
      chatLog.scrollTop = chatLog.scrollHeight;
    });

    safeModeToggle.addEventListener('change', () => {
      const safeMode = safeModeToggle.checked;
      console.log('Safe Mode toggled:', safeMode, 'Socket ID:', socket.id);
      socket.emit('toggle_safe_mode', safeMode);
    });

    helpIcon.addEventListener('click', () => {
      console.log('Help Icon clicked, Socket ID:', socket.id);
      contactModal.style.display = 'block';
      modalOverlay.style.display = 'block';
      contactName.value = '';
      contactEmail.value = '';
      contactMessage.value = '';
      contactMessage.focus();
    });

    closeContact.addEventListener('click', () => {
      contactModal.style.display = 'none';
      modalOverlay.style.display = 'none';
    });

    closeAdmin.addEventListener('click', () => {
      if (currentObservedPairId) {
        socket.emit('admin_leave_chat', { pairId: currentObservedPairId });
        currentObservedPairId = null;
      }
      adminModal.style.display = 'none';
      modalOverlay.style.display = 'none';
    });

    modalOverlay.addEventListener('click', () => {
      tagsModal.style.display = 'none';
      contactModal.style.display = 'none';
      adminModal.style.display = 'none';
      if (currentObservedPairId) {
        socket.emit('admin_leave_chat', { pairId: currentObservedPairId });
        currentObservedPairId = null;
      }
      modalOverlay.style.display = 'none';
    });

    submitContact.addEventListener('click', () => {
      console.log('Submit Contact clicked, Socket ID:', socket.id);
      const request = {
        name: sanitizeInput(contactName.value.trim()),
        email: sanitizeInput(contactEmail.value.trim()),
        message: sanitizeInput(contactMessage.value.trim())
      };
      socket.emit('submit_request', request);
    });

    chatInput.addEventListener('input', () => {
      if (chatInput.value.trim() && !isTyping) {
        isTyping = true;
        socket.emit('typing', true);
      } else if (!chatInput.value.trim() && isTyping) {
        isTyping = false;
        socket.emit('typing', false);
      }
      clearTimeout(typingTimeout);
      typingTimeout = setTimeout(() => {
        if (isTyping) {
          isTyping = false;
          socket.emit('typing', false);
        }
      }, 2000);
    });

    chatInput.addEventListener('keypress', (e) => {
      if (e.key === 'Enter' && chatInput.value.trim()) {
        console.log('Sending message:', chatInput.value, 'Socket ID:', socket.id);
        const msg = sanitizeInput(chatInput.value);
        socket.emit('message', msg);
        const msgElement = document.createElement('p');
        msgElement.className = 'you';
        msgElement.innerHTML = `<strong>You:</strong> ${msg}`;
        chatLog.appendChild(msgElement);
        chatInput.value = '';
        isTyping = false;
        socket.emit('typing', false);
        chatLog.scrollTop = chatLog.scrollHeight;
      }
    });
  </script>
</body>
</html>
