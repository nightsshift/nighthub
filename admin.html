<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>NightHub - Admin</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
    }
    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(to bottom, #F5F5F7, #E5E5EA);
      color: #1C2526;
      min-height: 100dvh;
      display: flex;
      overflow: hidden;
      position: relative;
      perspective: 500px;
    }
    #particle-canvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -1;
      pointer-events: none;
      opacity: 0.2;
    }
    #sidebar {
      width: 250px;
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(5px);
      height: 100dvh;
      position: fixed;
      left: 0;
      top: 0;
      display: flex;
      flex-direction: column;
      padding: 1rem;
      z-index: 100;
      box-shadow: 2px 0 5px rgba(0, 0, 0, 0.1);
      transform: translateZ(20px);
    }
    #mobile-menu {
      display: none;
    }
    #hamburger {
      display: none;
    }
    #mobile-menu-content {
      display: none;
      position: fixed;
      top: 0;
      right: 0;
      width: 50%;
      height: 100dvh;
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(5px);
      z-index: 101;
      flex-direction: column;
      padding: 1rem;
      transform: translateZ(20px);
      transition: transform 0.3s ease;
    }
    #mobile-menu-content.active {
      transform: translateX(0);
    }
    #logo {
      font-size: 1.5rem;
      font-weight: 700;
      color: #007AFF;
      margin-bottom: 2rem;
      transform: translateZ(10px);
    }
    .menu-item {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.75rem;
      font-size: 1rem;
      font-weight: 500;
      color: #1C2526;
      text-decoration: none;
      border-radius: 8px;
      margin-bottom: 0.5rem;
      transition: all 0.3s ease;
      transform: translateZ(10px);
    }
    .menu-item:hover {
      background: rgba(0, 122, 255, 0.1);
      color: #007AFF;
      transform: translateZ(15px);
    }
    .menu-item.active {
      background: #007AFF;
      color: #FFFFFF;
    }
    .menu-item.bottom {
      margin-top: auto;
    }
    #content {
      flex: 1;
      margin-left: 250px;
      padding: 1rem;
      display: flex;
      flex-direction: column;
      transform: translateZ(5px);
    }
    #admin-container {
      flex: 1;
      max-width: 800px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      transform: translateZ(5px);
    }
    #admin-tabs {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 1rem;
      transform: translateZ(10px);
    }
    .admin-tab {
      padding: 0.5rem 1rem;
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.95);
      color: #1C2526;
      font-size: 0.95rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.3s ease;
      transform: translateZ(5px);
    }
    .admin-tab:hover {
      transform: translateZ(10px);
      box-shadow: 0 0 10px rgba(0, 122, 255, 0.3);
    }
    .admin-tab.active {
      background: #007AFF;
      color: #FFFFFF;
      transform: translateZ(10px);
    }
    #admin-content {
      flex: 1;
      overflow-y: auto;
      scrollbar-width: thin;
      transform: translateZ(5px);
    }
    #admin-content::-webkit-scrollbar {
      width: 6px;
    }
    #admin-content::-webkit-scrollbar-thumb {
      background: rgba(0, 122, 255, 0.3);
      border-radius: 3px;
    }
    #announcement-section, #posts-section, #users-section, #streams-section {
      background: rgba(255, 255, 255, 0.95);
      border-radius: 12px;
      padding: 0.75rem;
      margin-bottom: 0.5rem;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
      transform: translateZ(5px);
      display: none;
    }
    #announcement-section.active, #posts-section.active, #users-section.active, #streams-section.active {
      display: block;
    }
    #announcement-section h2, #posts-section h2, #users-section h2, #streams-section h2 {
      font-size: 1.2rem;
      color: #007AFF;
      margin-bottom: 0.5rem;
      transform: translateZ(10px);
    }
    #announcement-input {
      width: 100%;
      padding: 0.75rem;
      border: 1px solid #D1D1D6;
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.8);
      color: #1C2526;
      font-size: 0.95rem;
      margin-bottom: 0.5rem;
      transition: all 0.3s ease;
      transform: translateZ(5px);
    }
    #announcement-input:focus {
      outline: none;
      border-color: #007AFF;
      box-shadow: 0 0 10px rgba(0, 122, 255, 0.3);
      transform: translateZ(10px);
    }
    #announcement-button {
      padding: 0.75rem;
      border: none;
      border-radius: 12px;
      background: #007AFF;
      color: #FFFFFF;
      font-size: 0.95rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.3s ease;
      transform: translateZ(5px);
    }
    #announcement-button:hover {
      transform: translateZ(10px);
      box-shadow: 0 0 15px rgba(0, 122, 255, 0.5);
    }
    .post-item, .user-item, .stream-item {
      background: rgba(255, 255, 255, 0.8);
      border-radius: 12px;
      padding: 0.5rem;
      margin-bottom: 0.3rem;
      transform: translateZ(5px);
      transition: transform 0.3s ease;
    }
    .post-item:hover, .user-item:hover, .stream-item:hover {
      transform: translateZ(10px);
    }
    .post-item-header, .user-item-header, .stream-item-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 0.85rem;
      margin-bottom: 0.3rem;
      transform: translateZ(5px);
    }
    .post-item-content, .user-item-content, .stream-item-content {
      font-size: 0.9rem;
      color: #1C2526;
      margin-bottom: 0.3rem;
      transform: translateZ(5px);
    }
    .post-item-actions, .user-item-actions, .stream-item-actions {
      display: flex;
      gap: 0.3rem;
      transform: translateZ(5px);
    }
    .action-button {
      padding: 0.5rem 1rem;
      border: none;
      border-radius: 12px;
      font-size: 0.9rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.3s ease;
      transform: translateZ(5px);
    }
    .action-button.delete {
      background: #FF3B30;
      color: #FFFFFF;
    }
    .action-button.ban, .action-button.temp-ban {
      background: #FF9500;
      color: #FFFFFF;
    }
    .action-button.watch {
      background: #34C759;
      color: #FFFFFF;
    }
    .action-button:hover {
      transform: translateZ(10px);
      box-shadow: 0 0 15px rgba(0, 0, 0, 0.3);
    }
    #modal-overlay {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.3);
      z-index: 999;
      animation: fadeInOverlay 0.3s ease;
    }
    @keyframes fadeInOverlay {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    #admin-login-modal {
      display: none;
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) translateZ(20px);
      width: 90%;
      max-width: 500px;
      background: rgba(255, 255, 255, 0.95);
      border-radius: 16px;
      padding: 1.5rem;
      box-shadow: 0 8px 40px rgba(0, 0, 0, 0.15);
      z-index: 1000;
      animation: popIn 0.4s ease-out;
    }
    @keyframes popIn {
      from { transform: translate(-50%, -50%) translateZ(0) scale(0.95); opacity: 0; }
      to { transform: translate(-50%, -50%) translateZ(20px) scale(1); opacity: 1; }
    }
    #admin-login-modal h2 {
      font-size: 1.2rem;
      color: #007AFF;
      text-align: center;
      font-weight: 600;
      margin-bottom: 1rem;
      transform: translateZ(10px);
    }
    #admin-login-form {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }
    #admin-password {
      padding: 0.75rem;
      border: 1px solid #D1D1D6;
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.8);
      color: #1C2526;
      font-size: 0.95rem;
      transition: all 0.3s ease;
      transform: translateZ(5px);
    }
    #admin-password:focus {
      outline: none;
      border-color: #007AFF;
      box-shadow: 0 0 10px rgba(0, 122, 255, 0.3);
      transform: translateZ(10px);
    }
    #admin-login-button, #admin-login-cancel {
      padding: 0.75rem;
      border: none;
      border-radius: 12px;
      font-size: 0.95rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.3s ease;
      transform: translateZ(5px);
    }
    #admin-login-button {
      background: #007AFF;
      color: #FFFFFF;
    }
    #admin-login-cancel {
      background: #FF3B30;
      color: #FFFFFF;
    }
    #admin-login-button:hover, #admin-login-cancel:hover {
      transform: translateZ(10px);
      box-shadow: 0 0 15px rgba(0, 0, 0, 0.3);
    }
    @media (max-width: 768px) {
      #sidebar {
        display: none;
      }
      #mobile-menu {
        display: flex;
        justify-content: space-between;
        align-items: center;
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(5px);
        padding: 0.5rem 1rem;
        z-index: 100;
        box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
        transform: translateZ(20px);
      }
      #hamburger {
        display: block;
        width: 30px;
        height: 30px;
        cursor: pointer;
        transform: translateZ(10px);
      }
      #mobile-menu-content {
        display: flex;
        transform: translateX(100%);
      }
      #content {
        margin-left: 0;
        padding: 1rem;
      }
      #admin-container {
        max-width: 100%;
      }
      .post-item, .user-item, .stream-item {
        padding: 0.4rem;
      }
      .post-item-content, .user-item-content, .stream-item-content {
        font-size: 0.85rem;
      }
      .post-item-header, .user-item-header, .stream-item-header {
        font-size: 0.8rem;
      }
      .action-button {
        font-size: 0.85rem;
        padding: 0.4rem 0.8rem;
      }
      #announcement-input {
        font-size: 0.9rem;
        padding: 0.6rem;
      }
      #announcement-button {
        font-size: 0.9rem;
        padding: 0.6rem;
      }
      #admin-login-modal {
        width: 95%;
        padding: 1rem;
      }
    }
    @media (max-width: 480px) {
      .post-item, .user-item, .stream-item {
        padding: 0.3rem;
      }
      .post-item-content, .user-item-content, .stream-item-content {
        font-size: 0.8rem;
      }
      .post-item-header, .user-item-header, .stream-item-header {
        font-size: 0.75rem;
      }
      .action-button {
        font-size: 0.8rem;
        padding: 0.3rem 0.6rem;
      }
      #announcement-input {
        font-size: 0.85rem;
        padding: 0.5rem;
      }
      #announcement-button {
        font-size: 0.85rem;
        padding: 0.5rem;
      }
      #admin-login-modal {
        width: 100%;
        border-radius: 0;
      }
    }
  </style>
</head>

  <script>
    // Particle background
    const canvas = document.getElementById('particle-canvas');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    const particles = [];
    const particleCount = 50;

    class Particle {
      constructor() {
        this.x = Math.random() * canvas.width;
        this.y = Math.random() * canvas.height;
        this.size = Math.random() * 2 + 1;
        this.speedX = Math.random() * 0.2 - 0.1;
        this.speedY = Math.random() * 0.2 - 0.1;
        this.opacity = Math.random() * 0.3 + 0.2;
      }
      update() {
        this.x += this.speedX;
        this.y += this.speedY;
        if (this.x < 0 || this.x > canvas.width) this.speedX *= -1;
        if (this.y < 0 || this.y > canvas.height) this.speedY *= -1;
      }
      draw() {
        ctx.fillStyle = `rgba(0, 122, 255, ${this.opacity})`;
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        ctx.fill();
      }
    }

    function initParticles() {
      for (let i = 0; i < particleCount; i++) {
        particles.push(new Particle());
      }
    }

    function animateParticles() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      particles.forEach(particle => {
        particle.update();
        particle.draw();
      });
      requestAnimationFrame(animateParticles);
    }

    window.addEventListener('resize', () => {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    });

    initParticles();
    animateParticles();

    // Socket.IO connection
    const socket = io('https://nighthub-backend.onrender.com', {
      transports: ['websocket'],
      reconnectionAttempts: 5
    });

    // DOM elements
    const modalOverlay = document.getElementById('modal-overlay');
    const adminLoginModal = document.getElementById('admin-login-modal');
    const adminPassword = document.getElementById('admin-password');
    const adminLoginButton = document.getElementById('admin-login-button');
    const adminLoginCancel = document.getElementById('admin-login-cancel');
    const adminTabs = document.querySelectorAll('.admin-tab');
    const announcementSection = document.getElementById('announcement-section');
    const postsSection = document.getElementById('posts-section');
    const usersSection = document.getElementById('users-section');
    const streamsSection = document.getElementById('streams-section');
    const announcementInput = document.getElementById('announcement-input');
    const announcementButton = document.getElementById('announcement-button');
    const postsList = document.getElementById('posts-list');
    const usersList = document.getElementById('users-list');
    const streamsList = document.getElementById('streams-list');
    const hamburger = document.getElementById('hamburger');
    const mobileMenuContent = document.getElementById('mobile-menu-content');

    // State
    let posts = [];
    let users = [];
    let streams = [];
    let currentTab = 'announcements';
    let isAuthenticated = false;

    // Utility functions
    function formatTime(timestamp) {
      const date = new Date(timestamp);
      return date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    }

    function sanitizeHTML(str) {
      const div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }

    function showTab(tabName) {
      adminTabs.forEach(tab => tab.classList.remove('active'));
      document.querySelector(`.admin-tab[data-tab="${tabName}"]`).classList.add('active');
      announcementSection.classList.remove('active');
      postsSection.classList.remove('active');
      usersSection.classList.remove('active');
      streamsSection.classList.remove('active');
      document.getElementById(`${tabName}-section`).classList.add('active');
      currentTab = tabName;
      if (isAuthenticated) {
        if (tabName === 'posts') socket.emit('admin_get_posts');
        else if (tabName === 'users') socket.emit('admin_get_users');
        else if (tabName === 'streams') socket.emit('admin_get_streams');
      }
    }

    function renderPosts() {
      postsList.innerHTML = '';
      posts.forEach(post => {
        const postElement = document.createElement('div');
        postElement.className = 'post-item';
        postElement.innerHTML = `
          <div class="post-item-header">
            <span>User_${post.anonymousId}</span>
            <span>${formatTime(post.timestamp)}</span>
          </div>
          <div class="post-item-content">${sanitizeHTML(post.content)}</div>
          <div class="post-item-actions">
            <button class="action-button delete" data-post-id="${post.id}">Delete Post</button>
            ${post.comments.map(comment => `
              <div class="post-item">
                <div class="post-item-header">
                  <span>User_${comment.anonymousId}</span>
                  <span>${formatTime(comment.timestamp)}</span>
                </div>
                <div class="post-item-content">${sanitizeHTML(comment.content)}</div>
                <div class="post-item-actions">
                  <button class="action-button delete" data-comment-id="${comment.id}" data-post-id="${post.id}">Delete Comment</button>
                </div>
              </div>
            `).join('')}
          </div>
        `;
        postsList.appendChild(postElement);
      });
    }

    function renderUsers() {
      usersList.innerHTML = '';
      users.forEach(user => {
        const userElement = document.createElement('div');
        userElement.className = 'user-item';
        userElement.innerHTML = `
          <div class="user-item-header">
            <span>User_${user.anonymousId}</span>
            <span>${user.isBanned ? 'Banned' : 'Active'}</span>
          </div>
          <div class="user-item-content">Last Active: ${formatTime(user.lastActive)}</div>
          <div class="user-item-actions">
            <button class="action-button temp-ban" data-user-id="${user.anonymousId}">Temp Ban (24h)</button>
            <button class="action-button ban" data-user-id="${user.anonymousId}">${user.isBanned ? 'Unban' : 'Perm Ban'}</button>
          </div>
        `;
        usersList.appendChild(userElement);
      });
    }

    function renderStreams() {
      streamsList.innerHTML = '';
      streams.forEach(stream => {
        const streamElement = document.createElement('div');
        streamElement.className = 'stream-item';
        streamElement.innerHTML = `
          <div class="stream-item-header">
            <span>Stream_${stream.id}</span>
            <span>Started: ${formatTime(stream.startTime)}</span>
          </div>
          <div class="stream-item-content">Status: ${stream.status}</div>
          <div class="stream-item-actions">
            <button class="action-button watch" data-stream-id="${stream.id}">Watch Stream</button>
          </div>
        `;
        streamsList.appendChild(streamElement);
      });
    }

    // Socket.IO event handlers
    socket.on('connect', () => {
      console.log('Connected to backend');
      adminLoginModal.style.display = 'block';
      modalOverlay.style.display = 'block';
    });

    socket.on('admin_authenticated', () => {
      isAuthenticated = true;
      adminLoginModal.style.display = 'none';
      modalOverlay.style.display = 'none';
      showTab(currentTab);
    });

    socket.on('admin_posts', (receivedPosts) => {
      posts = receivedPosts;
      renderPosts();
    });

    socket.on('admin_users', (receivedUsers) => {
      users = receivedUsers;
      renderUsers();
    });

    socket.on('admin_streams', (receivedStreams) => {
      streams = receivedStreams;
      renderStreams();
    });

    socket.on('error', (msg) => {
      alert(`Error: ${msg}`);
      if (msg === 'Invalid admin password') {
        adminPassword.value = '';
      }
    });

    socket.on('announcement', (text) => {
      alert(`Announcement: ${text}`);
    });

    // DOM event listeners
    adminLoginButton.addEventListener('click', () => {
      if (adminPassword.value.trim()) {
        socket.emit('admin_login', adminPassword.value);
      } else {
        alert('Please enter a password');
      }
    });

    adminLoginCancel.addEventListener('click', () => {
      adminLoginModal.style.display = 'none';
      modalOverlay.style.display = 'none';
      window.location.href = 'index.html';
    });

    modalOverlay.addEventListener('click', () => {
      adminLoginModal.style.display = 'none';
      modalOverlay.style.display = 'none';
      mobileMenuContent.classList.remove('active');
    });

    adminTabs.forEach(tab => {
      tab.addEventListener('click', () => {
        showTab(tab.dataset.tab);
      });
    });

    announcementButton.addEventListener('click', () => {
      if (announcementInput.value.trim()) {
        socket.emit('admin_announcement', announcementInput.value);
        announcementInput.value = '';
      }
    });

    postsList.addEventListener('click', (e) => {
      const target = e.target.closest('.action-button');
      if (target) {
        const postId = target.dataset.postId;
        const commentId = target.dataset.commentId;
        if (commentId) {
          socket.emit('admin_delete_comment', { postId, commentId });
        } else {
          socket.emit('admin_delete_post', postId);
        }
      }
    });

    usersList.addEventListener('click', (e) => {
      const target = e.target.closest('.action-button');
      if (target) {
        const userId = target.dataset.userId;
        if (target.classList.contains('temp-ban')) {
          socket.emit('admin_temp_ban_user', userId);
        } else if (target.classList.contains('ban')) {
          socket.emit('admin_perm_ban_user', userId);
        }
      }
    });

    streamsList.addEventListener('click', (e) => {
      const target = e.target.closest('.action-button');
      if (target) {
        const streamId = target.dataset.streamId;
        alert(`Watching stream ${streamId} (Placeholder)`);
      }
    });

    hamburger.addEventListener('click', () => {
      mobileMenuContent.classList.toggle('active');
    });
  </script>
</body>
</html>
